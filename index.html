<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archmage Duel: 5 Elemental Phases</title>
    <style>
        body { margin: 0; background: #030206; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { border: 4px solid #9370db; background: #08060f; box-shadow: 0 0 40px rgba(147, 112, 219, 0.3); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATE MATRIX
let gameOver = false;
let victory = false;
let score = 0;
let screenShake = 0;
let gameTime = 0;

// PLAYER WIZARD OBJECT
const player = {
    x: 100, y: 350, w: 35, h: 45,
    speed: 6, health: 100, maxHealth: 100,
    timeZoneActive: 0, timeZoneCooldown: 0
};

// 5-PHASE ELEMENTAL BOSS
const boss = {
    x: 820, y: 280, w: 90, h: 140,
    health: 3500, maxHealth: 3500, // Epic health pool split across 5 phases
    phase: 1, timer: 0, flash: 0
};

let playerSpells = [];
let bossProjectiles = [];
let magicSparks = [];
const keys = {};

// ELEMENTAL PHASE THEME MAP
const phaseThemes = {
    1: { color: "#ff4500", name: "INFERNO PHASE" },  // Fire
    2: { color: "#00bfff", name: "BLIZZARD PHASE" }, // Ice
    3: { color: "#ffcc00", name: "TEMPEST PHASE" },  // Lightning
    4: { color: "#8b5a2b", name: "TERRA PHASE" },    // Earth
    5: { color: "#4b0082", name: "VOID GOD PHASE" }  // Void
};

// SPARK PARTICLES VISUAL JUICE
function spawnSparks(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
        magicSparks.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            alpha: 1,
            color: color
        });
    }
}

// KEYBOARD INPUT ENGINE
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " " && !gameOver && !victory) {
        // Cast Arcane Spell
        playerSpells.push({ x: player.x + player.w, y: player.y + player.h/2, vx: 15 });
        spawnSparks(player.x + player.w, player.y + player.h/2, "#da70d6", 3);
    }
    if (e.key === "Shift" && player.timeZoneCooldown <= 0 && !gameOver && !victory) {
        // Chronos Time-Slow Spell Power
        player.timeZoneActive = 90; // Slows time down for 1.5 seconds
        player.timeZoneCooldown = 240; // 4 second spell cooldown
        screenShake = 6;
        spawnSparks(player.x + player.w/2, player.y + player.h/2, "#00ffff", 20);
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);
// MAIN RUNTIME CALCULATIONS
function update() {
    if (gameOver || victory) return;

    gameTime++;
    if (screenShake > 0) screenShake *= 0.88;
    if (player.timeZoneCooldown > 0) player.timeZoneCooldown--;
    if (player.timeZoneActive > 0) player.timeZoneActive--;
    if (boss.flash > 0) boss.flash--;

    // Standard Movement Logic
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - player.h - 10, player.y));

    // --- AUTOMATIC 5-PHASE SPLITTER ---
    let hpPercent = boss.health / boss.maxHealth;
    let oldPhase = boss.phase;

    if (hpPercent > 0.8) boss.phase = 1;
    else if (hpPercent > 0.6) boss.phase = 2;
    else if (hpPercent > 0.4) boss.phase = 3;
    else if (hpPercent > 0.2) boss.phase = 4;
    else boss.phase = 5;

    // Explode sparks if switching element types
    if (boss.phase !== oldPhase) {
        screenShake = 20;
        spawnSparks(boss.x + boss.w/2, boss.y + boss.h/2, phaseThemes[boss.phase].color, 45);
    }

    // --- TIME SLOW POWER MATRIX ---
    // If player's time spell is active, boss bullets move at 30% speed
    let timeModifier = player.timeZoneActive > 0 ? 0.3 : 1.0;

    // --- ELEMENTAL BOSS SPELL CASTING PATTERNS ---
    boss.timer++;
    let currentTheme = phaseThemes[boss.phase];
    
    // Firing delay speeds up during later phases
    let castDelay = 24;
    if (boss.phase === 2) castDelay = 18;
    if (boss.phase === 3) castDelay = 12;
    if (boss.phase === 4) castDelay = 8;
    if (boss.phase === 5) castDelay = 5; // Demonic spell speed

    if (boss.timer >= castDelay) {
        boss.timer = 0;

        if (boss.phase === 1) {
            // Inferno Fireball: Direct horizontal heavy projectiles
            bossProjectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: -9, vy: 0, r: 9, color: currentTheme.color });
        } 
        else if (boss.phase === 2) {
            // Ice Shards: Up and down variable wave velocity
            bossProjectiles.push({ x: boss.x, y: boss.y + Math.random()*boss.h, vx: -10, vy: (Math.random() - 0.5) * 5, r: 6, color: currentTheme.color });
        } 
        else if (boss.phase === 3) {
            // Tempest Lightning: Instant direct tracking projectiles
            let angle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossProjectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(angle) * 13, vy: Math.sin(angle) * 13, r: 5, color: currentTheme.color });
        } 
        else if (boss.phase === 4) {
            // Terra Earth-Boulders: Large heavy crushing masses moving forward
            bossProjectiles.push({ x: boss.x, y: Math.random() * canvas.height, vx: -7, vy: 0, r: 16, color: currentTheme.color });
        } 
        else if (boss.phase === 5) {
            // Void Phase Special Move: Catastrophic 3-directional track spray
            let centerAngle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossProjectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(centerAngle) * 12, vy: Math.sin(centerAngle) * 12, r: 8, color: "#ffffff" });
            bossProjectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(centerAngle + 0.2) * 10, vy: Math.sin(centerAngle + 0.2) * 10, r: 7, color: currentTheme.color });
            bossProjectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(centerAngle - 0.2) * 10, vy: Math.sin(centerAngle - 0.2) * 10, r: 7, color: currentTheme.color });
        }
    }

    // Boss simple vertical movement code
    boss.y = 280 + Math.sin(gameTime * 0.04) * 160;

    // UPDATE PLAYER SPELLS
    playerSpells.forEach((s, idx) => {
        s.x += s.vx;
        if (s.x > canvas.width) playerSpells.splice(idx, 1);

        // Box collision with boss hitbox
        if (s.x > boss.x && s.x < boss.x + boss.w && s.y > boss.y && s.y < boss.y + boss.h) {
            boss.health -= 12;
            boss.flash = 3;
            score += 15 * boss.phase;
            spawnSparks(s.x, s.y, phaseThemes[boss.phase].color, 5);
            playerSpells.splice(idx, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // UPDATE BOSS SPELLS (Impacted by Time Modifier)
    bossProjectiles.forEach((p, idx) => {
        p.x += p.vx * timeModifier;
        p.y += p.vy * timeModifier;

        if (p.x < -30 || p.x > canvas.width + 30) {
            bossProjectiles.splice(idx, 1);
            return;
        }

        // Circular projectile collision with player rectangle
        if (p.x > player.x && p.x < player.x + player.w && p.y > player.y && p.y < player.y + player.h) {
            player.health -= 6;
            screenShake = 12;
            spawnSparks(p.x, p.y, "#ff3333", 10);
            bossProjectiles.splice(idx, 1);
            if (player.health <= 0) gameOver = true;
        }
    });

    // Particle Trail Decay
    for (let i = magicSparks.length - 1; i >= 0; i--) {
        magicSparks[i].x += magicSparks[i].vx * timeModifier;
        magicSparks[i].y += magicSparks[i].vy * timeModifier;
        magicSparks[i].alpha -= 0.03;
        if (magicSparks[i].alpha <= 0) magicSparks.splice(i, 1);
    }
}
// ENGINE GRAPHICS RENDER PIPELINE
function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Chronos Time Zone Field Ring Distortion Effect
        if (player.timeZoneActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.2)"; ctx.lineWidth = 2;
            ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);
        }

        // Render Sparks Background Layer
        magicSparks.forEach(s => {
            ctx.fillStyle = s.color; ctx.globalAlpha = s.alpha;
            ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Player Wizard Block (Arcane Purple)
        ctx.fillStyle = "#9370db";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // Wizard Hat Decoration trim
        ctx.fillStyle = "#da70d6";
        ctx.fillRect(player.x, player.y, player.w, 8);

        // Draw Boss Archmage Block (Changes color based on current element phase)
        let theme = phaseThemes[boss.phase];
        ctx.fillStyle = boss.flash > 0 ? "#ffffff" : theme.color;
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

        // Draw Player Magic Missiles
        playerSpells.forEach(s => {
            ctx.fillStyle = "#da70d6"; ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();
        });

        // Draw Boss Elemental Spells
        bossProjectiles.forEach(p => {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });

        // USER HUD CONTROLS TERMINAL
        // Player HP
        ctx.fillStyle = "#201010"; ctx.fillRect(25, 25, 240, 15);
        ctx.fillStyle = "#32cd32"; ctx.fillRect(25, 25, Math.max(0, 240 * (player.health / player.maxHealth)), 15);
        ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Courier New'"; ctx.fillText(`MAGE HP: ${Math.max(0, player.health)}%`, 25, 60);
        ctx.fillText(`TIME SPELL: ${player.timeZoneCooldown === 0 ? "READY [SHIFT]" : "CHARGING"}`, 25, 78);

        // 5-Phase Boss HP Meter Assembly
        ctx.fillStyle = "#201010"; ctx.fillRect(580, 25, 395, 20);
        ctx.fillStyle = theme.color; ctx.fillRect(580, 25, Math.max(0, 395 * (boss.health / boss.maxHealth)), 20);
        ctx.fillStyle = "#fff"; ctx.fillText(`ARCHMAGE: ${boss.health} HP`, 580, 65);
        
        // Element Phase Tracker Label
        ctx.fillStyle = theme.color; ctx.font = "bold 14px 'Courier New'";
        ctx.fillText(`[${theme.name} ${boss.phase}/5]`, 810, 85);

        ctx.fillStyle = "#da70d6"; ctx.font = "bold 18px 'Courier New'"; ctx.fillText(`MANA RATING: ${score}`, 25, 115);
    } else {
        ctx.textAlign = "center";
        if (gameOver) {
            ctx.fillStyle = "#ff4500"; ctx.font = "bold 50px Georgia"; ctx.fillText("DIED IN COMBAT / GAME OVER", canvas.width/2, canvas.height/2);
        } else if (victory) {
            ctx.fillStyle = "#00ffff"; ctx.font = "bold 50px Georgia"; ctx.fillText("ARCHMAGE DEFEATED / VICTORY", canvas.width/2, canvas.height/2);
        }
    }
    ctx.restore();
}

// PRIMARY FRAME ENGINE TIMING LOOP
function runLoop() { update(); draw(); requestAnimationFrame(runLoop); }
runLoop();
</script>
</body>
</html>
