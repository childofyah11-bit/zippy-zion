<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 AUDIO HARDWARE</title>
    <style>
        /* --- SYSTEM STYLING & CRT THEME --- */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
            user-select: none;
        }

        /* --- CRT MONITOR SCANLINE OVERLAY --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 99999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* --- HARDWARE CHASSIS LAYOUT --- */
        .console-chassis {
            background: #000;
            border: 8px solid #00ff66;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            box-shadow: 16px 16px 0px #220044;
            box-sizing: border-box;
        }

        .panel-stripe {
            background: #00ff66;
            color: #000;
            padding: 5px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* --- REALTIME CRT GRAPHICS MONITOR --- */
        .monitor-display {
            background: #051105;
            border: 4px solid #ff0055;
            margin-bottom: 15px;
            height: 60px;
            position: relative;
        }

        .monitor-display canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .monitor-tag {
            position: absolute;
            top: 2px;
            left: 6px;
            font-size: 10px;
            color: #ffaa00;
            z-index: 10;
        }

        /* --- HARDWARE CONTROL GRID --- */
        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .module-block {
            border: 4px solid #ffaa00;
            padding: 10px;
            background: #111;
        }

        .module-tag {
            font-size: 11px;
            background: #ffaa00;
            color: #000;
            padding: 2px 6px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        /* --- INDUSTRIAL DIALS AND INPUT SELECTORS --- */
        select, input[type="range"] {
            background: #000;
            color: #ff0055;
            border: 4px solid #ff0055;
            font-family: inherit;
            font-weight: 900;
            padding: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100px;
            -webkit-appearance: none;
            height: 14px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 20px;
            background: #00ff66;
            border: 2px solid #fff;
            cursor: pointer;
        }

        /* --- BRUTAL CHUNK HARDWARE PIANO KEYS --- */
        .block-keyboard {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .chunk-key {
            flex: 1;
            background: #fff;
            color: #000;
            height: 90px;
            border: 4px solid #000;
            box-shadow: 0px 10px 0px #333;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 6px;
            box-sizing: border-box;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .chunk-key:active {
            background: #ff0055 !important;
            color: #fff;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(8px);
        }

        .key-tag {
            font-size: 11px;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SYNTH PANEL HOUSING -->
    <div class="console-chassis">
        <div class="panel-stripe">=== SYSTEM ONLINE // CONTROLLER MATRIX OVERRIDE ===</div>
        
        <!-- Live Visualizer Tube -->
        <div class="monitor-display">
            <div class="monitor-tag">SIGNAL ANALYZER</div>
            <canvas id="scope-canvas"></canvas>
        </div>

        <div class="hardware-grid">
            <!-- 01: Core Waveform Shapes -->
            <div class="module-block">
                <div class="module-tag">01// CORE WAVEFORM</div>
                <div class="input-row">
                    <label for="osc-wave-1">SHAPE 1</label>
                    <select id="osc-wave-1">
                        <option value="square" selected>SQUARE</option>
                        <option value="sawtooth">SAW</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="osc-wave-2">SHAPE 2</label>
                    <select id="osc-wave-2">
                        <option value="sawtooth" selected>SAW</option>
                        <option value="square">SQUARE</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
            </div>

            <!-- 02: Arpeggiator Chip Controls -->
            <div class="module-block">
                <div class="module-tag">02// CHIP MODULATORS</div>
                <div class="input-row">
                    <label for="arp-rate">ARP SPEED</label>
                    <input type="range" id="arp-rate" min="0" max="15" step="1" value="0">
                </div>
                <div class="input-row">
                    <label for="arp-interval">ARP INTERVAL</label>
                    <input type="range" id="arp-interval" min="3" max="12" step="1" value="4">
                </div>
            </div>

            <!-- 03: Voltage Pitch Sweeper -->
            <div class="module-block">
                <div class="module-tag">03// VOLTAGE SWEEP</div>
                <div class="input-row">
                    <label for="sweep-dir">SWEEP DIR</label>
                    <select id="sweep-dir">
                        <option value="none">NONE</option>
                        <option value="down">DOWNPITCH</option>
                        <option value="up">UPPITCH</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="sweep-speed">SWEEP RATE</label>
                    <input type="range" id="sweep-speed" min="0.05" max="0.8" step="0.05" value="0.2">
                </div>
            </div>

            <!-- 04: Gain Dynamics Amplifiers -->
            <div class="module-block">
                <div class="module-tag">04// AMP DECAY ENVELOPE</div>
                <div class="input-row">
                    <label for="decay-time">DECAY FADE</label>
                    <input type="range" id="decay-time" min="0.05" max="1.5" step="0.05" value="0.4">
                </div>
                <div class="input-row">
                    <label for="gain-level">MASTER LEVEL</label>
                    <input type="range" id="gain-level" min="0" max="0.4" step="0.05" value="0.20">
                </div>
            </div>
        </div>

        <!-- 8 Heavy Hardware Chunk Keys -->
        <div class="block-keyboard">
            <div class="chunk-key" data-pitch="220.00" style="background: #e5e5e5;"><span class="key-tag">A3</span></div>
            <div class="chunk-key" data-pitch="261.63"><span class="key-tag">C4</span></div>
            <div class="chunk-key" data-pitch="293.66" style="background: #e5e5e5;"><span class="key-tag">D4</span></div>
            <div class="chunk-key" data-pitch="329.63"><span class="key-tag">E4</span></div>
            <div class="chunk-key" data-pitch="392.00" style="background: #e5e5e5;"><span class="key-tag">G4</span></div>
            <div class="chunk-key" data-pitch="440.00"><span class="key-tag">A4</span></div>
            <div class="chunk-key" data-pitch="523.25" style="background: #e5e5e5;"><span class="key-tag">C5</span></div>
            <div class="chunk-key" data-pitch="587.33"><span class="key-tag">D5</span></div>
        </div>
    </div>

    <!-- --- WEB AUDIO ENGINE INFRASTRUCTURE --- -->
    <script>

        let globalAnalyserNode = null;
        const liveVoiceStack = new Map();

        // Safe Initialization Engine
        function bootAudioEngine() {
            if (rawAudioContext) return;
            
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            rawAudioContext = new AudioContextClass();
            
            // Build real-time graph visualization engine link
            globalAnalyserNode = rawAudioContext.createAnalyser();

            globalAnalyserNode = rawAudioContext.createAnalyser();
