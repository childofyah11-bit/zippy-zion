<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coding Power: 5-Phase Ultimate Boss Fight</title>
    <style>
        body { margin: 0; background: #0b0b10; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { border: 4px solid #00bfff; background: #0f0f16; box-shadow: 0 0 30px rgba(0, 191, 255, 0.4); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATE
let gameOver = false;
let victory = false;
let score = 0;
let combo = 0;
let comboTimer = 0;
let screenShake = 0;

// PLAYER OBJECT
const player = {
    x: 100, y: 350, w: 40, h: 40,
    speed: 6, health: 100, maxHealth: 100,
    timeSlowActive: 0, timeSlowCooldown: 0
};

// 5-PHASE BOSS OBJECT
const boss = {
    x: 850, y: 290, w: 100, h: 120,
    health: 2500, maxHealth: 2500, // Massive pool balanced for your high damage
    phase: 1, dir: 1, shootCooldown: 0,
    flashFrames: 0
};

let playerBullets = [];
let bossBullets = [];
let particles = [];
let textPopups = [];
const keys = {};

// COLOR GRAPHICS PALETTE FOR EACH PHASE
const phaseColors = {
    1: "#ff3232", // Crimson Red
    2: "#ffaa00", // Raging Orange
    3: "#32cd32", // Toxic Green
    4: "#00ffff", // Electric Cyan
    5: "#ff00ff"  // Dark God Purple
};

// SPAWN EFFECT PARTICLES
function spawnParticles(x, y, color, count=8, speedMult=1) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            dx: (Math.random() - 0.5) * 8 * speedMult,
            dy: (Math.random() - 0.5) * 8 * speedMult,
            radius: Math.random() * 4 + 2,
            life: 30, maxLife: 30,
            color: color
        });
    }
}

// DAMAGE TEXT POPUPS
function spawnText(x, y, text, color) {
    textPopups.push({ x: x, y: y, text: text, color: color, life: 40, dy: -1.5 });
}

// KEYBOARD LISTENERS
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    
    // Spacebar: Fires Upgraded 25-Damage Bullets
    if (e.key === " " && !gameOver && !victory) {
        playerBullets.push({ x: player.x + player.w, y: player.y + player.h/2, dx: 16, dy: 0, r: 5, color: "#00bfff" });
        spawnParticles(player.x + player.w, player.y + player.h/2, "#00bfff", 3, 0.5);
    }
    
    // Shift Key: Activates Chronos Time Slow Mod
    if (e.key === "Shift" && player.timeSlowCooldown <= 0 && !gameOver && !victory) {
        player.timeSlowActive = 120; // 2 seconds of slowed enemy frames
        player.timeSlowCooldown = 300; // 5 second recharge
        spawnParticles(player.x + player.w/2, player.y + player.h/2, "#00ffff", 20, 2);
        screenShake = 10;
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// MAIN GAME LOGIC
function update() {
    if (gameOver || victory) return;

    if (screenShake > 0) screenShake *= 0.9;
    if (combo > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0;
    }
    if (player.timeSlowCooldown > 0) player.timeSlowCooldown--;
    if (player.timeSlowActive > 0) player.timeSlowActive--;

    // Move Speeds (Player stays fast even if time is slowed!)
    let currentSpeed = player.speed;

    if (keys["w"] || keys["ArrowUp"]) player.y -= currentSpeed;
    if (keys["s"] || keys["ArrowDown"]) player.y += currentSpeed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= currentSpeed;
    if (keys["d"] || keys["ArrowRight"]) player.x += currentSpeed;

    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

    if (boss.flashFrames > 0) boss.flashFrames--;

    // --- TIME SLOW SCALE COEFFICIENT ---
    // Dropping enemy speeds to 25% value if active
    let engineSpeedModifier = player.timeSlowActive > 0 ? 0.25 : 1.0;

    // --- 5-PHASE HEALTH MANAGEMENT BRAIN ---
    let healthPct = boss.health / boss.maxHealth;
    let oldPhase = boss.phase;

    if (healthPct > 0.8) {
        boss.phase = 1;
    } else if (healthPct > 0.6) {
        boss.phase = 2;
    } else if (healthPct > 0.4) {
        boss.phase = 3;
    } else if (healthPct > 0.2) {
        boss.phase = 4;
    } else {
        boss.phase = 5; 
    }

    // Trigger visual explosion when crossing into a new phase
    if (boss.phase !== oldPhase) {
        screenShake = 25;
        spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, phaseColors[boss.phase], 40, 2.5);
        spawnText(boss.x - 50, boss.y - 20, `PHASE ${boss.phase} ACTIVE!`, phaseColors[boss.phase]);
    }

    // --- BOSS AI ENGINE PER PHASE ---
    if (boss.phase === 1) {
        boss.y += boss.dir * 4 * engineSpeedModifier;
        if (boss.y <= 40 || boss.y >= canvas.height - boss.h - 40) boss.dir *= -1;
    } 
    else if (boss.phase === 2 || boss.phase === 3) {
        let targetY = player.y + player.h/2 - boss.h/2;
        boss.y += (targetY - boss.y) * 0.07 * engineSpeedModifier;
    } 
    else if (boss.phase >= 4) {
        let targetY = player.y + player.h/2 - boss.h/2;
        boss.y += (targetY - boss.y) * 0.1 * engineSpeedModifier;
        boss.x = 800 + Math.sin(Date.now() / 200) * 40 * engineSpeedModifier; 
    }

    // --- BOSS BULLET PATTERNS PER PHASE ---
    boss.shootCooldown += 1 * engineSpeedModifier;
    
    let attackDelay = 22; 
    if (boss.phase === 2) attackDelay = 15;
    if (boss.phase === 3) attackDelay = 10;
    if (boss.phase === 4) attackDelay = 7;
    if (boss.phase === 5) attackDelay = 4; 

    if (boss.shootCooldown >= attackDelay) {
        boss.shootCooldown = 0;
        let currentBossColor = phaseColors[boss.phase];

        if (boss.phase === 1) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: -9, dy: 0, r: 6, color: currentBossColor });
        } 
        else if (boss.phase === 2) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: -10, dy: (Math.random() - 0.5) * 6, r: 6, color: currentBossColor });
        } 
        else if (boss.phase === 3) {
            let angle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: Math.cos(angle) * 11, dy: Math.sin(angle) * 11, r: 6, color: currentBossColor });
        } 
        else if (boss.phase === 4) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/4, dx: -11, dy: -2, r: 7, color: currentBossColor });
            bossBullets.push({ x: boss.x, y: boss.y + (boss.h * 0.75), dx: -11, dy: 2, r: 7, color: currentBossColor });
        } 
        else if (boss.phase === 5) {
            let baseAngle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: Math.cos(baseAngle) * 12, dy: Math.sin(baseAngle) * 12, r: 8, color: "#ffffff" });
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: Math.cos(baseAngle + 0.25) * 11, dy: Math.sin(baseAngle + 0.25) * 11, r: 7, color: currentBossColor });
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: Math.cos(baseAngle - 0.25) * 11, dy: Math.sin(baseAngle - 0.25) * 11, r: 7, color: currentBossColor });
        }
    }

    // UPDATE PLAYER BULLETS
    playerBullets.forEach((b, index) => {
        b.x += b.dx;
        if (b.x > canvas.width) playerBullets.splice(index, 1);
        
        if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.health -= 25; // UPGRADED FROM 10 TO 25 DAMAGE!
            boss.flashFrames = 3;
            combo++;
            comboTimer = 90;
            score += 25 * combo;
            
            spawnParticles(b.x, b.y, "#00bfff", 6, 1);
            spawnText(boss.x - 20, b.y + (Math.random() - 0.5)*30, `-${25 * combo}`, combo > 4 ? "#ffd700" : "#fff");
            playerBullets.splice(index, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // UPDATE BOSS BULLETS
    bossBullets.forEach((b, index) => {
        b.x += b.dx * engineSpeedModifier;
        b.y += b.dy * engineSpeedModifier;
        if (b.x < -20 || b.y < -20 || b.y > canvas.height + 20) bossBullets.splice(index, 1);

        if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            player.health -= 10; 
            combo = 0;
            screenShake = 12;
            spawnParticles(b.x, b.y, phaseColors[boss.phase], 12, 1.5);
            spawnText(player.x + player.w + 10, player.y, "HIT!", "#ff3232");
            bossBullets.splice(index, 1);
            if (player.health <= 0) gameOver = true;
        }
    });

    // PARTICLES LIFE DECAY
    particles.forEach((p, index) => {
        p.x += p.dx * engineSpeedModifier;
        p.y += p.dy * engineSpeedModifier;
        p.life--;
        if (p.life <= 0) particles.splice(index, 1);
    });

    // TEXT LIFE DECAY
    textPopups.forEach((t, index) => {
        t.y += t.dy;
        t.life--;
        if (t.life <= 0) textPopups.splice(index, 1);
    });
}

// DRAW VISUAL ENGINE
function draw() {
    ctx.save();
    
    if (screenShake > 0.5) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Chronos Field Matrix Effect Tint
        if (player.timeSlowActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.06)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        }

        // Particles Layer
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / p.maxLife;
