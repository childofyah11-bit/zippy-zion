<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goofball 512-Step Master Band Sequencer</title>
    <style>
        body {
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255,0,127,0.5);
            font-size: 1.8rem;
            margin: 0 0 5px 0;
        }
        p {
            color: #7a7a9a;
            margin: 0 0 15px 0;
            font-size: 0.8rem;
        }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        #playBtn {
            background: #ff007f;
            box-shadow: 0 0 12px rgba(255,0,127,0.3);
        }
        #playBtn:hover {
            background: #ff3399;
        }
        #clearBtn {
            background: #00eaff;
            color: #05050a;
            box-shadow: 0 0 12px rgba(0,234,255,0.3);
        }
        #clearBtn:hover {
            background: #33f0ff;
        }
        .sequencer-container {
            max-width: 95vw;
            overflow-x: auto;
            padding: 12px;
            background: #10101b;
            border-radius: 12px;
            border: 2px solid #232336;
            box-shadow: 0 0 35px rgba(0,0,0,0.8);
            scroll-behavior: smooth;
        }
        .sequencer {
            display: grid;
            grid-template-columns: 110px repeat(512, 22px);
            gap: 3px;
            width: fit-content;
        }
        .row-label {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.65rem;
            color: #00ffcc;
            position: sticky;
            left: 0;
            background: #10101b;
            z-index: 10;
            padding-right: 5px;
        }
        .pad {
            width: 22px;
            height: 24px;
            background: #202032;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #30304a;
            transition: 0.05s;
        }
        .pad.active {
            background: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
            border-color: #fff;
        }
        div[data-note^="G5"].pad.active, div[data-note^="F5"].pad.active, div[data-note^="Eb5"].pad.active { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
        div[data-note^="D5"].pad.active, div[data-note^="C5"].pad.active, div[data-note^="B4"].pad.active { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
        div[data-note^="Ab4"].pad.active, div[data-note^="G4"].pad.active, div[data-note^="F4"].pad.active { background: #b600ff; box-shadow: 0 0 8px #b600ff; }
        div[data-note^="Eb4"].pad.active, div[data-note^="D4"].pad.active, div[data-note^="C4"].pad.active { background: #00eaff; box-shadow: 0 0 8px #00eaff; }
        .pad.current {
            border: 1px solid #fff;
            background-image: linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15));
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: 512-STEP MASTER TRACK</h1>
    <p>Continuous dynamic performance mapping. Auto-scroll panel follows active playback window frames.</p>
    
    <div class="controls">
        <button id="playBtn">EXECUTE ARCHITECTURE</button>
        <button id="clearBtn">CLEAR ALL BLOCKS</button>
    </div>

    <div class="sequencer-container" id="scrollContainer">
        <div class="sequencer" id="grid"></div>
    </div>

    <script>
        let audioCtx = null;
        const instruments = ['G5', 'F5', 'Eb5', 'D5', 'C5', 'B4', 'Ab4', 'G4', 'F4', 'Eb4', 'D4', 'C4'];
        const steps = 512;
        let currentStep = 0;
        let isPlaying = false;
        let intervalId = null;

        const frequencies = {
            'G5': 783.99, 'F5': 698.46, 'Eb5': 622.25, 'D5': 587.33, 'C5': 523.25, 
            'B4': 493.88, 'Ab4': 415.30, 'G4': 392.00, 'F4': 349.23, 'Eb4': 311.13, 
            'D4': 293.66, 'C4': 261.63
        };

        const tracks = {};
        instruments.forEach(inst => { tracks[inst] = new Array(steps).fill(false); });

        const songPreset = [
            ['C4', 0], ['Eb4', 1], ['G4', 2], ['C5', 3], ['Eb5', 4], ['G5', 5], ['F5', 6], ['D5', 8], ['B4', 10], ['C4', 12], ['G4', 13], ['C5', 14],
            ['Eb4', 16], ['G4', 18], ['C5', 20], ['Eb5', 22], ['D5', 24], ['B4', 26], ['G4', 28], ['D4', 30],
            ['C4', 32], ['C5', 32], ['D4', 34], ['D5', 34], ['Eb4', 36], ['Eb5', 36], ['F4', 38], ['F5', 38], ['G4', 40], ['G5', 40], ['Ab4', 42], ['C5', 44],
            ['C4', 48], ['C4', 50], ['Eb4', 52], ['Eb4', 54], ['Ab4', 56], ['C5', 56], ['F5', 56], ['G4', 60], ['C5', 60], ['G5', 60],
            ['C4', 64], ['Eb4', 66], ['F4', 68], ['G4', 70], ['Ab4', 72], ['C5', 76], ['D5', 78], ['Eb5', 80], ['D5', 82], ['C5', 84], ['G4', 90],
            ['C4', 128], ['G4', 128], ['C5', 128], ['C4', 132], ['G4', 132], ['C5', 132], ['Eb4', 136], ['Eb5', 136], ['F4', 140], ['F5', 140],
            ['Eb4', 256], ['G4', 258], ['C5', 276], ['F5', 280], ['D5', 284], ['C4', 384], ['G4', 384], ['C5', 384], ['F4', 392], ['G4', 400],
            ['G4', 496], ['C5', 496], ['Eb5', 496], ['G5', 496], ['G5', 500], ['G5', 504], ['G5', 508]
        ];

        songPreset.forEach(([note, step]) => { if (tracks[note] && step < steps) { tracks[note][step] = true; } });

        const grid = document.getElementById('grid');
        instruments.forEach(inst => {
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = inst;
            grid.appendChild(label);

            for (let i = 0; i < steps; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad ' + (tracks[inst][i] ? 'active' : '');
                pad.dataset.note = inst;
                pad.dataset.step = i;
                pad.onclick = () => { tracks[inst][i] = !tracks[inst][i]; pad.classList.toggle('active'); };
                grid.appendChild(pad);
            }
        });
        function playGuitar(frequency, isLong) {
            const now = audioCtx.currentTime;
            const duration = isLong ? 0.75 : 0.16;
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(frequency, now);

            const distortion = audioCtx.createWaveShaper();
            distortion.curve = (function(amount) {
                const k = amount, n = 44100, curve = new Float32Array(n);
                for (let i = 0; i < n; ++i) {
                    const x = (i * 2) / n - 1;
                    curve[i] = ((3 + k) * x * 20 * (Math.PI / 180)) / (Math.PI + k * Math.PI * Math.abs(x));
                }
                return curve;
            })(130);
            distortion.oversample = '4x';

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking'; filter.frequency.setValueAtTime(1400, now); filter.gain.setValueAtTime(8, now);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.04, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

            osc.connect(distortion); distortion.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + duration);
        }

        function playStep() {
            document.querySelectorAll('.pad').forEach(p => p.classList.remove('current'));
            const activePads = document.querySelectorAll('[data-step="' + currentStep + '"]');
            activePads.forEach(p => p.classList.add('current'));
            
            const scrollContainer = document.getElementById('scrollContainer');
            if (activePads.length > 0) {
                const firstActivePad = activePads[0];
                scrollContainer.scrollLeft = firstActivePad.offsetLeft - 120;
            }
            
            instruments.forEach(inst => {
                if (tracks[inst][currentStep]) {
                    const isLong = (currentStep >= 12 && currentStep <= 14) || (currentStep >= 496);
                    playGuitar(frequencies[inst], isLong);
                }
            });
            currentStep = (currentStep + 1) % steps;
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                clearInterval(intervalId);
                document.getElementById('playBtn').innerText = 'EXECUTE ARCHITECTURE';
                document.getElementById('playBtn').style.background = '#ff007f';
                isPlaying = false;
                currentStep = 0;
            } else {
                intervalId = setInterval(playStep, 150);
                document.getElementById('playBtn').innerText = 'HALT SCORE';
                document.getElementById('playBtn').style.background = '#00ffcc';
                isPlaying = true;
            }
        });

        // NEW RESET ARCHITECTURE MODULE: Clears all selected note states completely
        document.getElementById('clearBtn').addEventListener('click', () => {
            instruments.forEach(inst => {
                tracks[inst].fill(false);
            });
            document.querySelectorAll('.pad').forEach(pad => {
                pad.classList.remove('active');
            });
        });
    </script>
</body>
</html>
