<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Orchestra: Small Town Star</title>
    <style>
        body {
            background: #020205;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        h1 {
            color: #3b82f6;
            text-shadow: 0 0 15px rgba(59,130,246,0.4);
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
        }
        p {
            color: #4b5563;
            margin: 0 0 25px 0;
            font-size: 0.8rem;
        }
        .console-deck {
            width: 95vw;
            max-width: 900px;
            background: #0b0f19;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            border: 1px solid #1e293b;
            box-sizing: border-box;
        }
        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .status-display {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }
        .status-pulse {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ef4444;
        }
        .status-pulse.active {
            background: #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        button {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 12px 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #3b82f6;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #60a5fa;
            transform: translateY(-1px);
        }
        button.active {
            background: #10b981;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3);
        }
        .knobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .knob-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        .knob-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #60a5fa;
            letter-spacing: 0.5px;
        }
        .knob-label span:last-child {
            color: #9ca3af;
            font-family: monospace;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #3b82f6;
            cursor: pointer;
            background: #374151;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        #visualizer {
            width: 100%;
            height: 90px;
            background: #030712;
            border: 1px solid #1f2937;
            border-radius: 12px;
            margin-bottom: 25px;
            display: block;
        }
        .poetry-viewport {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            height: 160px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .text-prime {
            font-size: 1.2rem;
            font-weight: 500;
            color: #3b82f6;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .text-prime.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .text-second {
            font-size: 0.95rem;
            color: #9ca3af;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
            text-align: center;
        }
        .text-second.visible {
            opacity: 0.7;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: SMALL TOWN STAR</h1>
    <p>Advanced real-time synthesis matrix dashboard node.</p>

    <div class="console-deck">
        <div class="console-header">
            <div class="status-display">
                <div id="statusPulse" class="status-pulse"></div>
                <span id="statusTxt">CONSOLE STANDBY</span>
            </div>
            <button id="playBtn">EXECUTE CORE</button>
        </div>

        <div class="knobs-grid">
            <div class="knob-card">
                <div class="knob-label"><span>MASTER GAIN</span><span id="volVal">100%</span></div>
                <input type="range" id="volumeSlider" min="0" max="2" step="0.05" value="1">
            </div>
            <div class="knob-card">
                <div class="knob-label"><span>SYSTEM TEMPO</span><span id="tempoValue">135 BPM</span></div>
                <input type="range" id="tempoSlider" min="80" max="200" step="1" value="135">
            </div>
            <div class="knob-card">
                <div class="knob-label"><span>SYNTH CUTOFF</span><span id="filterVal">2400 Hz</span></div>
                <input type="range" id="filterSlider" min="400" max="6000" step="50" value="2400">
            </div>
            <div class="knob-card">
                <div class="knob-label"><span>FX DELAY ECHO</span><span id="echoVal">40%</span></div>
                <input type="range" id="echoSlider" min="0" max="0.85" step="0.05" value="0.40">
            </div>
            <div class="knob-card">
                <div class="knob-label"><span>DRUM INTENSITY</span><span id="drumVal">70%</span></div>
                <input type="range" id="drumSlider" min="0" max="1" step="0.05" value="0.70">
            </div>
            <div class="knob-card">
                <div class="knob-label"><span>MELODY WAVEFORM</span><span id="waveTxt">TRIANGLE</span></div>
                <input type="range" id="waveSlider" min="0" max="3" step="1" value="1">
            </div>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="poetry-viewport">
            <div id="text1" class="text-prime visible">Interface Ready</div>
            <div id="text2" class="text-second visible">Click Execute Core to launch the live performance timeline.</div>
        </div>
    </div>
    <script>
        let audioCtx = null;
        let masterOut = null;
        let delayUnit = null;
        let delayGain = null;
        let analyzerUnit = null;
        
        let activeState = false;
        let engineClock = null;
        let indexMarker = 0;
        const terminalIndex = 512;

        const waveforms = ['sine', 'triangle', 'sawtooth', 'square'];

        const triadBanks = [
            [130.81, 164.81, 196.00, 261.63], // C Major
            [146.83, 174.61, 220.00, 293.66], // D Minor
            [164.81, 196.00, 246.94, 329.63], // E Minor
            [196.00, 246.94, 293.66, 392.00]  // G Major
        ];

        const lyricTimeline = [
            { step: 0, l1: "I’m a goofball bouncing-off-the-wall-ball", l2: "Everybody knows my name" },
            { step: 16, l1: "Yeah I’ll be a little goofball", l2: "Staying in my own lane" },
            { step: 32, l1: "I’m a low-key pretty goofy really-got-it-good-breezy standing-pretty-tall-ball", l2: "Dancing in the quiet rain" },
            { step: 52, l1: "Just a low-key goofball", l2: "And God made me perfectly okay" },
            { step: 68, l1: "Woke up / Clean slate / Sun's up / Don't wait", l2: "Step out / Big yard / Life's good / Not hard" },
            { step: 88, l1: "Green trees / Clear breeze / Out here / Do what I please", l2: "Big smile / Spark eye / Watch the clouds roll right on by" },
            { step: 108, l1: "No rush / My pace / Wide open / No race", l2: "Fresh air / Cool shade / Sun shine / High sky" },
            { step: 128, l1: "No stress / Time flies / Quiet space / Ground solid", l2: "Real world / Big knowledge / Just growth / Big views" },
            { step: 148, l1: "No stress / Good news / Out back / Chill state", l2: "Everything is looking great / Birds sing" },
            { step: 168, l1: "Warm air / No worries / No care / Right here", l2: "My spot / Appreciate what I got / His design" },
            { step: 188, l1: "Right place / Full of purpose / Full of grace", l2: "Phone rings / Big crowd / They talk / Real loud" },
            { step: 208, l1: "They know me / I'm known / But right now / My zone", l2: "Feet up / Chill mind / One of a kind" },
            { step: 228, l1: "Good joke / Fun time / That's the end of the line", l2: "They call / I decline / My space / All mine" },
            { step: 248, l1: "Top tier / No fear", l2: "I’m the star around here" },
            { step: 264, l1: "Screen bright / App tapped / Class notes / Book wrapped", l2: "Log in / School grind / Sharp brain / Good mind" },
            { step: 284, l1: "Homework / Done fast / A-plus / First class", l2: "Next tab / Beats play / Soundtrack for the day" },
            { step: 304, l1: "Headphones / No need / Speakers loud / Top speed", l2: "Volume up / Track rolls / Deep rhythm / Takes control" },
            { step: 324, l1: "Popular / Well liked / But the focus is spiked", l2: "Peaceful / Rest easy / Everything is going breezy" },
            { step: 344, l1: "Music stops / Heavy silence / World waits / Big reliance", l2: "They look / I stand / Take control / Command" },
            { step: 368, l1: "Lights fade / Stage set / Moment they won't forget", l2: "No mistakes / No flaws / Woven by His holy laws" },
            { step: 392, l1: "Every detail / Every strand", l2: "Held inside a higher hand" },
            { step: 412, l1: "Take a breath / Hear the call", l2: "God made me perfectly after all" },
            { step: 432, l1: "Sun goes down / Stars appear", l2: "Living life / With no fear" },
            { step: 452, l1: "Grateful heart / Peaceful state", l2: "Everything is looking great" },
            { step: 472, l1: "Walking forward / Staying strong", l2: "This is where I belong" },
            { step: 492, l1: "Deep breath / Clear sky / Watch the days fly right on by", l2: "In His hands / Every day / Everything is turning out okay 😁" }
        ];

        function setupHardware() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterOut = audioCtx.createGain();
            masterOut.gain.value = parseFloat(document.getElementById('volumeSlider').value);
            
            delayUnit = audioCtx.createDelay(1.0);
            delayUnit.delayTime.value = 0.28;
            
            delayGain = audioCtx.createGain();
            delayGain.gain.value = parseFloat(document.getElementById('echoSlider').value);
            
            analyzerUnit = audioCtx.createAnalyser();
            analyzerUnit.fftSize = 64;
            
            masterOut.connect(delayUnit);
            delayUnit.connect(delayGain);
            delayGain.connect(delayUnit);
            
            masterOut.connect(analyzerUnit);
            delayUnit.connect(analyzerUnit);
            analyzerUnit.connect(audioCtx.destination);
            
            renderFrame();
        }
        function renderFrame() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const binCount = analyzerUnit.frequencyBinCount;
            const dataArray = new Uint8Array(binCount);

            function loop() {
                requestAnimationFrame(loop);
                if (!activeState) return;
                analyzerUnit.getByteFrequencyData(dataArray);

                ctx.fillStyle = '#030712';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let barWidth = canvas.width / binCount;
                let currentX = 0;

                for (let i = 0; i < binCount; i++) {
                    let val = dataArray[i] / 255;
                    let barHeight = val * canvas.height;
                    
                    ctx.fillStyle = `rgba(59, 130, 246, ${val + 0.15})`;
                    ctx.fillRect(currentX, canvas.height - barHeight, barWidth - 2, barHeight);
                    
                    ctx.strokeStyle = '#10b981';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(currentX, canvas.height - barHeight, barWidth - 2, barHeight);
                    
                    currentX += barWidth;
                }
            }
            canvas.width = canvas.offsetWidth;
            loop();
        }

        function playFrequency(freq, waveform, level, delay) {
            if (!audioCtx) return;
            const timestamp = audioCtx.currentTime;
            const generator = audioCtx.createOscillator();
            const envelope = audioCtx.createGain();
            const filterNode = audioCtx.createBiquadFilter();
            
            generator.type = waveform;
            generator.frequency.setValueAtTime(freq, timestamp);
            
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(parseFloat(document.getElementById('filterSlider').value), timestamp);
            
            envelope.gain.setValueAtTime(level, timestamp);
            envelope.gain.exponentialRampToValueAtTime(0.001, timestamp + delay);
            
            generator.connect(filterNode);
            filterNode.connect(envelope);
            envelope.connect(masterOut);
            
            generator.start(timestamp);
            generator.stop(timestamp + delay);
        }

        function runClockTick() {
            const bank = triadBanks[Math.floor(indexMarker / 16) % triadBanks.length];
            const drumIntensity = parseFloat(document.getElementById('drumSlider').value);
            const userWaveIndex = parseInt(document.getElementById('waveSlider').value);
            const chosenWaveform = waveforms[userWaveIndex];
            
            // Harmonic Engine
            if (indexMarker % 4 === 0) {
                bank.forEach(f => playFrequency(f, 'sine', 0.15, 0.4));
            }
            if (indexMarker % 2 === 0) {
                const stepMelody = bank[Math.floor(Math.random() * bank.length)] * 2;
                playFrequency(stepMelody, chosenWaveform, 0.08, 0.18);
            }

            // Rhythm Engine Modifiers
            if (indexMarker % 4 === 0 && drumIntensity > 0) {
                playFrequency(52, 'sine', 0.9 * drumIntensity, 0.12); // Adjustable Kick Volume
            }
            if (indexMarker % 4 === 2 && drumIntensity > 0.2) {
                playFrequency(8500, 'triangle', 0.04 * drumIntensity, 0.04); // Adjustable Hat Volume
            }
            if (indexMarker % 2 === 1) {
                playFrequency(bank / 2, 'sawtooth', 0.12, 0.14); // Bassline Layer
            }

            // Timeline Module
            const match = lyricTimeline.reduce((prev, curr) => (indexMarker >= curr.step) ? curr : prev, lyricTimeline);
            const line1 = document.getElementById('text1');
            const line2 = document.getElementById('text2');
            
            if (line1.innerText !== match.l1) {
                line1.classList.remove('visible');
                line2.classList.remove('visible');
                setTimeout(() => {
                    line1.innerText = match.l1;
                    line2.innerText = match.l2;
                    line1.classList.add('visible');
                    line2.classList.add('visible');
                }, 100);
            }

            indexMarker = (indexMarker + 1) % terminalIndex;
        }

        function calculateTempoTime() {
            const bpm = parseInt(document.getElementById('tempoSlider').value);
            return (60000 / bpm) / 4;
        }

        document.getElementById('playBtn').addEventListener('click', function() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            setupHardware();
            
            const pulse = document.getElementById('statusPulse');
            const txt = document.getElementById('statusTxt');

            if (activeState) {
                clearInterval(engineClock);
                this.innerText = "EXECUTE CORE";
                this.classList.remove('active');
                pulse.classList.remove('active');
                txt.innerText = "CONSOLE STANDBY";
                activeState = false;
                indexMarker = 0;
            } else {
                this.innerText = "HALT CORE";
                this.classList.add('active');
                pulse.classList.add('active');
                txt.innerText = "CORE ACTIVE";
                activeState = true;
                engineClock = setInterval(runClockTick, calculateTempoTime());
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('volVal').innerText = Math.round(val * 100) + '%';
            if (masterOut) masterOut.gain.value = val;
        });

        document.getElementById('tempoSlider').addEventListener('input', (e) => {
            const bpm = e.target.value;
            document.getElementById('tempoValue').innerText = bpm + " BPM";
            if (activeState) {
                clearInterval(engineClock);
                engineClock = setInterval(runClockTick, calculateTempoTime());
            }
        });

        document.getElementById('filterSlider').addEventListener('input', (e) => {
            document.getElementById('filterVal').innerText = e.target.value + " Hz";
        });

        document.getElementById('echoSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('echoVal').innerText = Math.round(val * 100) + '%';
            if (delayFeedback) delayFeedback.gain.value = val;
        });

        document.getElementById('drumSlider').addEventListener('input', (e) => {
            document.getElementById('drumVal').innerText = Math.round(parseFloat(e.target.value) * 100) + '%';
        });

        document.getElementById('waveSlider').addEventListener('input', (e) => {
            const idx = parseInt(e.target.value);
            document.getElementById('waveTxt').innerText = waveforms[idx].toUpperCase();
        });
    </script>
</body>
</html>
