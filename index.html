<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-BIT PIXEL SYNTH</title>
    <style>
        /* Retro Pixel Art Styling */
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
        }

        /* Forced Landing Gatekeeper Screen */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            border: 8px double #00ff00;
            box-sizing: border-box;
        }

        .insert-coin-btn {
            background: #ff0055;
            color: #fff;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 0px #aa0033;
            text-transform: uppercase;
        }

        .insert-coin-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #aa0033;
        }

        /* Main Cabinet Box */
        .arcade-cabinet {
            background: #111;
            border: 6px solid #00ff00;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 10px 10px 0px #004400;
        }

        .screen-header {
            text-align: center;
            border-bottom: 4px dashed #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .control-row {
            background: #000;
            border: 4px solid #222;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 14px;
            text-transform: uppercase;
        }

        select, input[type="range"] {
            background: #000;
            color: #00ff00;
            border: 3px solid #00ff00;
            font-family: inherit;
            font-weight: bold;
            padding: 4px;
            outline: none;
        }

        /* 8-Bit Pixel Piano Keys */
        .arcade-keys {
            display: flex;
            background: #222;
            border: 4px solid #00ff00;
            padding: 8px;
            gap: 6px;
        }

        .pixel-key {
            flex: 1;
            background: #ffffff;
            height: 120px;
            border: 4px solid #000000;
            box-shadow: 0px 6px 0px #888888;
            cursor: pointer;
        }

        .pixel-key:active {
            background: #00ff00;
            box-shadow: 0px 2px 0px #00aa00;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <!-- OVERLAY SCREEN: Forces browser to unlock audio system on click -->
    <div id="boot-screen">
        <h1 style="font-size: 28px; margin-bottom: 30px; text-shadow: 3px 3px 0 #004400;">PIXEL SYNTH V1</h1>
        <button class="insert-coin-btn" id="coin-btn">INSERT COIN (START)</button>
        <p style="margin-top: 20px; font-size: 12px; color: #008800;">REMOVED ALL ANIMATIONS FOR STABILITY</p>
    </div>

    <!-- MAIN SOUND INTERFACE -->
    <div class="arcade-cabinet">
        <div class="screen-header">
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 1px;">AUDIO CORE ONLINE</h2>
        </div>
        
        <div class="control-row">
            <label>WAVE TYPE</label>
            <select id="wave-select">
                <option value="square" selected>SQUARE (8-BIT RETRO)</option>
                <option value="triangle">TRIANGLE (SOFT TONE)</option>
                <option value="sawtooth">SAWTOOTH (BUZZY)</option>
                <option value="sine">SINE (PURE WAVE)</option>
            </select>
        </div>
        
        <div class="control-row">
            <label>VOLUME</label>
            <input type="range" id="volume-slider" min="0" max="0.4" step="0.05" value="0.2">
        </div>

        <div class="arcade-keys">
            <!-- 8 Raw Tones mapped perfectly across a standard musical scale -->
            <div class="pixel-key" data-note="261.63"></div>
            <div class="pixel-key" data-note="293.66"></div>
            <div class="pixel-key" data-note="329.63"></div>
            <div class="pixel-key" data-note="349.23"></div>
            <div class="pixel-key" data-note="392.00"></div>
            <div class="pixel-key" data-note="440.00"></div>
            <div class="pixel-key" data-note="493.88"></div>
            <div class="pixel-key" data-note="523.25"></div>
        </div>
    </div>

    <script>
        let synthEngine = null;
        const liveTones = new Map();

        // Destroys the boot blocker screen and wakes up browser audio hardware completely
        document.getElementById('coin-btn').addEventListener('click', () => {
            synthEngine = new (window.AudioContext || window.webkitAudioContext)();
            synthEngine.resume();
            
            // Remove the loading wall immediately
            document.getElementById('boot-screen').style.display = 'none';
        });

        function triggerSound(pitch) {
            // Hard fallback check to handle device lockouts
            if (!synthEngine) return;
            if (synthEngine.state === 'suspended') synthEngine.resume();

            // Prevent stuck audio overlapping artifacts
            if (liveTones.has(pitch)) {
                killSound(pitch);
            }

            const currentWave = document.getElementById('wave-select').value;
            const levelVolume = parseFloat(document.getElementById('volume-slider').value);

            // Establish direct sound pathway generators
            const oscNode = synthEngine.createOscillator();
            const gainNode = synthEngine.createGain();

            oscNode.type = currentWave;
            oscNode.frequency.value = pitch;
            
            // Fixed direct connection map bypassing calculation bottlenecks
            gainNode.gain.setValueAtTime(levelVolume, synthEngine.currentTime);

            oscNode.connect(gainNode);
            gainNode.connect(synthEngine.destination);

            oscNode.start();

            // Track active sound signals in local device stack memory
            liveTones.set(pitch, { sound: oscNode, output: gainNode });
        }

        function killSound(pitch) {
            if (!liveTones.has(pitch)) return;

            const instance = liveTones.get(pitch);
            
            // Instantly sever audio channel to stop the note dead
            try {
                instance.sound.stop();
                instance.sound.disconnect();
                instance.output.disconnect();
            } catch(error) {
                // Fail silently if browser thread has terminated it
            }

            liveTones.delete(pitch);
        }

        // Standard Event Mapping Framework
        document.querySelectorAll('.pixel-key').forEach(btn => {
            const pitchHz = parseFloat(btn.getAttribute('data-note'));

            // Mouse Clicks
            btn.addEventListener('mousedown', () => triggerSound(pitchHz));
            btn.addEventListener('mouseup', () => killSound(pitchHz));
            btn.addEventListener('mouseleave', () => killSound(pitchHz));

            // Mobile Display Touch Responses
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerSound(pitchHz);
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                killSound(pitchHz);
            });
        });
    </script>
</body>
</html>
