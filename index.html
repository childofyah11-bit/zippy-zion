<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Space Battle</title>
    <style>
        body { margin: 0; background: #0c0c16; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        canvas { border: 4px solid #00ffff; background: #05050f; display: block; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// System Flags
let gameOver = false;
let victory = false;
let score = 0;

// Spaceship Fighter Configurations
let playerX = 100;
let playerY = 280;
let playerW = 40;
let playerH = 40;
let playerSpeed = 7;
let playerHealth = 150; 
let playerMaxHealth = 150;
let timeSlowActive = 0;
let timeSlowCooldown = 0;
let overchargeCooldown = 0;

// Multi-Phase Alien Boss Configurations
let bossX = 760;
let bossY = 220;
let bossW = 80;
let bossH = 150;
let bossHealth = 4000;
let bossMaxHealth = 4000;
let bossPhase = 1;
let bossDir = 1;
let bossTimer = 0;
let bossAngle = 0; 

let playerBullets = [];
let bossBullets = [];
const keys = {};

// Register Key Inputs
window.addEventListener("keydown", function(e) { keys[e.key] = true; });
window.addEventListener("keyup", function(e) { keys[e.key] = false; });

// Core Engine Physics
function update() {
    if (gameOver || victory) return;

    if (timeSlowCooldown > 0) timeSlowCooldown--;
    if (timeSlowActive > 0) timeSlowActive--;
    if (overchargeCooldown > 0) overchargeCooldown--;

    // Standard Flight Vector Checks
    if (keys["w"] || keys["ArrowUp"]) playerY -= playerSpeed;
    if (keys["s"] || keys["ArrowDown"]) playerY += playerSpeed;
    if (keys["a"] || keys["ArrowLeft"]) playerX -= playerSpeed;
    if (keys["d"] || keys["ArrowRight"]) playerX += playerSpeed;

    if (playerX < 10) playerX = 10;
    if (playerX > 400) playerX = 400; 
    if (playerY < 10) playerY = 10;
    if (playerY > 600 - playerH - 10) playerY = 600 - playerH - 10;

    // Cannon Power: Spacebar fires 35 damage laser beams
    if (keys[" "] && playerBullets.length < 6) {
        playerBullets.push({ x: playerX + playerW, y: playerY + playerH/2 });
        keys[" "] = false; 
    }

    // Ability Power 1: Chronos Time Slow Mod (Shift Key)
    if (keys["Shift"] && timeSlowCooldown === 0) {
        timeSlowActive = 150; 
        timeSlowCooldown = 360; 
    }

    // Ability Power 2: EMP Screen Cleanse (Enter Key)
    if (keys["Enter"] && overchargeCooldown === 0) {
        overchargeCooldown = 240;
        bossBullets = []; 
        bossHealth -= 250; 
        score += 150;
        if (bossHealth <= 0) victory = true;
    }

    let timeModifier = timeSlowActive > 0 ? 0.20 : 1.0;

    // Phase Shifting Steps Matrix
    let hpPct = bossHealth / bossMaxHealth;
    if (hpPct > 0.8) bossPhase = 1;
    else if (hpPct > 0.6) bossPhase = 2;
    else if (hpPct > 0.4) bossPhase = 3;
    else if (hpPct > 0.15) bossPhase = 4;
    else bossPhase = 5; 

    // Boss Motion Scripts
    if (bossPhase === 5) {
        let targetY = playerY + playerH/2 - bossH/2;
        bossY += (targetY - bossY) * 0.08 * timeModifier;
        bossX = 740 + Math.sin(Date.now() / 150) * 40 * timeModifier; 
    } else {
        bossY += bossDir * 4 * timeModifier;
        if (bossY <= 20 || bossY >= 600 - bossH - 20) bossDir *= -1;
    }

    // Boss Automated Cannon Generators
    bossTimer += 1 * timeModifier;
    bossAngle += 0.08 * timeModifier;

    let fireDelay = 25 - (bossPhase * 3);
    if (bossPhase === 5) fireDelay = 4; 

    if (bossTimer >= fireDelay) {
        bossTimer = 0;
        
        let c = "#00ffff"; 
        if (bossPhase === 2) c = "#ff00ff"; 
        if (bossPhase === 3) c = "#ffff00"; 
        if (bossPhase === 4) c = "#ff5500"; 
        if (bossPhase === 5) c = "#ff3300"; 

        if (bossPhase === 1) {
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -8, vy: 0, color: c });
        } 
        else if (bossPhase === 2) {
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -9, vy: (Math.random() - 0.5) * 5, color: c });
        } 
        else if (bossPhase === 3) {
            let angle = Math.atan2((playerY + playerH/2) - (bossY + bossH/2), (playerX + playerW/2) - bossX);
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, color: c });
        } 
        else if (bossPhase === 4) {
            bossBullets.push({ x: bossX, y: bossY + 20, vx: -11, vy: -1.5, color: c });
            bossBullets.push({ x: bossX, y: bossY + bossH - 20, vx: -11, vy: 1.5, color: c });
        } 
        else if (bossPhase === 5) {
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -13, vy: Math.sin(bossAngle) * 7, color: c });
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -11, vy: Math.sin(bossAngle + 0.8) * 5, color: "#ffffff" });
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -11, vy: Math.sin(bossAngle - 0.8) * 5, color: c });
        }
    }

    // Bullet Computations - Player (Hits give 35 damage)
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        let b = playerBullets[i]; b.x += 15;
        if (b.x > 900) { playerBullets.splice(i, 1); continue; }

        if (b.x > bossX && b.x < bossX + bossW && b.y > bossY && b.y < bossY + bossH) {
            bossHealth -= 35; 
            score += 50;
            playerBullets.splice(i, 1);
            if (bossHealth <= 0) victory = true;
        }
    }

    // Bullet Computations - Enemy Orbs
    for (let i = bossBullets.length - 1; i >= 0; i--) {
        let b = bossBullets[i]; b.x += b.vx * timeModifier; b.y += b.vy * timeModifier;
        if (b.x < -20 || b.x > 920 || b.y < -20 || b.y > 620) { bossBullets.splice(i, 1); continue; }

        if (b.x > playerX && b.x < playerX + playerW && b.y > playerY && b.y < playerY + playerH) {
            let dmg = bossPhase === 5 ? 12 : 10; 
            playerHealth -= dmg;
            bossBullets.splice(i, 1);
            if (playerHealth <= 0) gameOver = true;
        }
    }
}

// Visual Painter Graphics
function draw() {
    ctx.clearRect(0, 0, 900, 600);

    if (!gameOver && !victory) {
        if (timeSlowActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.08)"; ctx.fillRect(0, 0, 900, 600);
        }

        // Space Fighter (Cyan Block)
        ctx.fillStyle = "#00ffff"; ctx.fillRect(playerX, playerY, playerW, playerH);

        let bossColor = "#00ffff";
        let phaseTitle = "GRID DEFENSE";
        if (bossPhase === 2) { bossColor = "#ff00ff"; phaseTitle = "CYAN OVERLOAD"; }
        if (bossPhase === 3) { bossColor = "#ffff00"; phaseTitle = "SWARM MATRIX"; }
        if (bossPhase === 4) { bossColor = "#ff5500"; phaseTitle = "CRITICAL CORE"; }
        if (bossPhase === 5) { bossColor = "#ff3300"; phaseTitle = "OVERPOWERED TITAN"; }

        // Alien Boss (Color changes per phase)
        ctx.fillStyle = bossColor; ctx.fillRect(bossX, bossY, bossW, bossH);

        // Player Missiles
        ctx.fillStyle = "#00ffaa";
        playerBullets.forEach(function(b) { ctx.fillRect(b.x, b.y - 3, 16, 6); });

        // Enemy Threat Orbs
        bossBullets.forEach(function(b) {
            ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
        });

        // Dashboard Console HUD
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px monospace";
        ctx.fillText("FIGHTER INTEGRITY HP: " + Math.max(0, playerHealth) + "/" + playerMaxHealth, 20, 35);
        ctx.fillText("CHRONOS CLOCK [SHIFT]: " + (timeSlowCooldown === 0 ? "READY" : "CHARGING"), 20, 60);
        ctx.fillText("EMP REBOOT    [ENTER]: " + (overchargeCooldown === 0 ? "READY" : "CHARGING"), 20, 85);
        ctx.fillText("CRUISER SCORE RECORD: " + score, 20, 110);

        // Boss Health Bars
        ctx.fillStyle = "#161626"; ctx.fillRect(500, 20, 370, 20);
        ctx.fillStyle = bossColor; ctx.fillRect(500, 20, Math.max(0, 370 * (bossHealth / bossMaxHealth)), 20);
        ctx.fillStyle = "#ffffff"; ctx.fillText("BOSS MATRIX HP: " + bossHealth, 500, 58);
        ctx.fillText("[ MODE " + bossPhase + "/5 : " + phaseTitle + " ]", 500, 80);

    } else {
        ctx.textAlign = "center"; ctx.font = "bold 35px monospace";
        if (gameOver) {
            ctx.fillStyle = "#ff0055"; ctx.fillText("CRITICAL FAILURE // SHIP DESTROYED", 450, 300);
        } else if (victory) {
            ctx.fillStyle = "#00ffaa"; ctx.fillText("BOSS PURGED // SYSTEM VICTORY SECURED", 450, 300);
        }
    }
}

// Clock Loop ticks
function runLoop() {
    update();
    draw();
    requestAnimationFrame(runLoop);
}

runLoop();
</script>
</body>
</html>
