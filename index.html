<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kraken Hunter: Evolved Sea Engine</title>
    <style>
        /* MINIMAL STYLE RULES TO PREVENT RENDERING COMPONENT CRASHES */
        body { margin: 0; background: #02050d; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { border: 4px solid #00aaff; background: #040e24; box-shadow: 0 0 30px rgba(0, 170, 255, 0.3); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
// 1. ISOLATE CANVAS ELEMENT ENTIRELY
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 2. STABLE GAME STATE FLAGS
let gameOver = false;
let victory = false;
let isShopActive = false;
let score = 0;

// PLAYER NAUTICAL CONFIG (YELLOW SUBMARINE)
const player = {
    x: 480, y: 580, w: 50, h: 30, // Positioned at bottom of sea arena
    speed: 6, health: 100, maxHealth: 100,
    timeSlowActive: 0, timeSlowCooldown: 0,
    overchargeCooldown: 0,
    hasShield: true, shieldCooldown: 0,
    shootTimer: 0,
    laserType: "normal", 
    upgradePoints: 0
};

// 5-PHASE SEABEAST BOSS (RED KRAKEN)
const boss = {
    x: 450, y: 50, w: 120, h: 80, // Positioned at the top of the screen
    health: 3000, maxHealth: 3000,
    phase: 1, lastPhase: 1, timer: 0, dir: 1
};

let playerBullets = [];
let bossBullets = [];
const keys = {};

// IMMUTABLE HEX DATA SCHEMES FOR THE SEABEAST
const phaseColors = { 1: "#ff3333", 2: "#ff6600", 3: "#ffcc00", 4: "#cc00ff", 5: "#ffffff" };
const phaseNames = { 1: "SURFACE THREAT", 2: "DEEP TENTACLES", 3: "OCEAN MAELSTROM", 4: "ABYSSAL RAGE", 5: "LEVIATHAN AWAKENED" };

// HARCODED BUTTON DIMENSIONS FOR THE INTERMISSION SHOP
const buttons = {
    triple: { x: 350, y: 260, w: 300, h: 50, cost: 1, label: "Buy Triple Torpedo (1 Pt)" },
    speed:  { x: 350, y: 340, w: 300, h: 50, cost: 1, label: "Upgrade Engines +2 (1 Pt)" },
    health: { x: 350, y: 420, w: 300, h: 50, cost: 1, label: "Reinforce Hull +50 (1 Pt)" },
    resume: { x: 400, y: 520, w: 200, h: 50, cost: 0, label: "Dive Deeper (Resume)" }
};

// 3. KEYBOARD EVENT CAPTURE PIPELINES
window.addEventListener("keydown", function(e) { keys[e.key] = true; });
window.addEventListener("keyup", function(e) { keys[e.key] = false; });

// MOUSE CLICK PROCESSING FOR UPGRADE SCREEN CHOICE BUTTONS
canvas.addEventListener("click", function(e) {
    if (!isShopActive) return;

    // Isolate mouse location offset bounds
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    if (mouseX >= buttons.triple.x && mouseX <= buttons.triple.x + buttons.triple.w && mouseY >= buttons.triple.y && mouseY <= buttons.triple.y + buttons.triple.h) {
        if (player.upgradePoints >= buttons.triple.cost && player.laserType !== "triple") {
            player.laserType = "triple"; player.upgradePoints -= buttons.triple.cost;
        }
    } 
    else if (mouseX >= buttons.speed.x && mouseX <= buttons.speed.x + buttons.speed.w && mouseY >= buttons.speed.y && mouseY <= buttons.speed.y + buttons.speed.h) {
        if (player.upgradePoints >= buttons.speed.cost) {
            player.speed += 2; player.upgradePoints -= buttons.speed.cost;
        }
    } 
    else if (mouseX >= buttons.health.x && mouseX <= buttons.health.x + buttons.health.w && mouseY >= buttons.health.y && mouseY <= buttons.health.y + buttons.health.h) {
        if (player.upgradePoints >= buttons.health.cost) {
            player.maxHealth += 50; player.health = player.maxHealth; player.upgradePoints -= buttons.health.cost;
        }
    } 
    else if (mouseX >= buttons.resume.x && mouseX <= buttons.resume.x + buttons.resume.w && mouseY >= buttons.resume.y && mouseY <= buttons.resume.y + buttons.resume.h) {
        isShopActive = false; 
    }
});

// 4. CORE ENGINE STEP MATHEMATICS
function update() {
    if (gameOver || victory || isShopActive) return;

    // Step cooldown timers
    if (player.timeSlowCooldown > 0) player.timeSlowCooldown--;
    if (player.timeSlowActive > 0) player.timeSlowActive--;
    if (player.overchargeCooldown > 0) player.overchargeCooldown--;
    
    if (!player.hasShield) {
        player.shieldCooldown++;
        if (player.shieldCooldown >= 360) { player.hasShield = true; player.shieldCooldown = 0; }
    }

    // Move submarine via WASD / Arrow key directional flags
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

    // TORPEDO AUTO RAPID FIRE LOOPS
    if (player.shootTimer > 0) player.shootTimer--;
    
    if (keys[" "] && player.shootTimer === 0) {
        if (player.laserType === "triple") {
            // Triple Shot pattern shoots three torpedos flying upwards at angles
            playerBullets.push({ x: player.x + player.w/2, y: player.y, vx: -3, vy: -15 });
            playerBullets.push({ x: player.x + player.w/2, y: player.y, vx: 0,  vy: -15 });
            playerBullets.push({ x: player.x + player.w/2, y: player.y, vx: 3,  vy: -15 });
        } else {
            playerBullets.push({ x: player.x + player.w/2, y: player.y, vx: 0, vy: -15 });
        }
        player.shootTimer = 8; 
    }

    // SYSTEM SPELL POWER 1: Hydro-Anchor Current Slow (Shift Key)
    if (keys["Shift"] && player.timeSlowCooldown <= 0) {
        player.timeSlowActive = 120; player.timeSlowCooldown = 300; 
    }

    // SYSTEM SPELL POWER 2: Depth Charge Shockwave (Enter Key)
    if (keys["Enter"] && player.overchargeCooldown <= 0) {
        player.overchargeCooldown = 240; bossBullets = []; boss.health -= 150; score += 100;
        if (boss.health <= 0) victory = true;
    }

    // Current slow velocity calculation modifier
    let timeModifier = player.timeSlowActive > 0 ? 0.20 : 1.0;

    // Kraken phase checking limits
    let hpPct = boss.health / boss.maxHealth;
    if (hpPct > 0.8) boss.phase = 1;
    else if (hpPct > 0.6) boss.phase = 2;
    else if (hpPct > 0.4) boss.phase = 3;
    else if (hpPct > 0.2) boss.phase = 4;
    else boss.phase = 5;

    // Trigger upgrade shop pop-up overlay on phase breakpoint
    if (boss.phase > boss.lastPhase) {
        player.upgradePoints += 1; boss.lastPhase = boss.phase; isShopActive = true; bossBullets = []; return;
    }

    // Horizontally float Kraken across top of scene arena
    boss.x += boss.dir * 5 * timeModifier;
    if (boss.x <= 20 || boss.x >= canvas.width - boss.w - 20) boss.dir *= -1;

    // Kraken Ink Orb firing system
    boss.timer += 1 * timeModifier;
    let delay = 26 - (boss.phase * 4);
    if (boss.timer >= delay) {
        boss.timer = 0; let c = phaseColors[boss.phase];
        
        if (boss.phase === 1) {
            // Phase 1: Straight downward drops
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: 0, vy: 7, r: 8, color: c });
        } else if (boss.phase === 2) {
            // Phase 2: Spray down spreads
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: (Math.random() - 0.5) * 6, vy: 8, r: 7, color: c });
        } else if (boss.phase === 3) {
            // Phase 3: Track and home targets towards submarine
            let angle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h), (player.x + player.w/2) - (boss.x + boss.w/2));
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, r: 7, color: c });
        } else if (boss.phase === 4) {
            // Phase 4: Dual scatter arrays
            bossBullets.push({ x: boss.x + 20, y: boss.y + boss.h, vx: -2, vy: 9, r: 8, color: c });
            bossBullets.push({ x: boss.x + boss.w - 20, y: boss.y + boss.h, vx: 2, vy: 9, r: 8, color: c });
        } else if (boss.phase === 5) {
            // Phase 5: 3-way targeting barrage
            let base = Math.atan2((player.y + player.h/2) - (boss.y + boss.h), (player.x + player.w/2) - (boss.x + boss.w/2));
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: Math.cos(base) * 12, vy: Math.sin(base) * 12, r: 9, color: "#ffffff" });
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: Math.cos(base + 0.2) * 11, vy: Math.sin(base + 0.2) * 11, r: 7, color: c });
            bossBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: Math.cos(base - 0.2) * 11, vy: Math.sin(base - 0.2) * 11, r: 7, color: c });
        }
    }

    // Torpedo trajectories (Deals 25 massive damage on impact)
    playerBullets.forEach((b, idx) => {
        b.x += b.vx; b.y += b.vy;
        if (b.y < 0 || b.x < 0 || b.x > canvas.width) playerBullets.splice(idx, 1);
        if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.health -= 25; score += 50; playerBullets.splice(idx, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // Ink Orb trajectories
    bossBullets.forEach((b, idx) => {
        b.x += b.vx * timeModifier; b.y += b.vy * timeModifier;
        if (b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20) { bossBullets.splice(idx, 1); return; }
        if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            bossBullets.splice(idx, 1);
            if (player.hasShield) { player.hasShield = false; player.shieldCooldown = 0; return; }
            player.health -= 10; if (player.health <= 0) gameOver = true;
        }
    });
}

// 5. GRAPHICS PAINT LAYER
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isShopActive) {
