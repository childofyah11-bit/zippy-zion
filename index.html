<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech Web Synthesizer</title>
    <style>
        body {
            margin: 0;
            background: #0a0a12;
            color: #00ffcc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 {
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
            font-size: 1.5rem;
        }
        #viz {
            width: 90vw;
            max-width: 800px;
            height: 200px;
            background: #111122;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 90vw;
            max-width: 800px;
            margin: 20px 0;
            background: #16162a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333355;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #8899a6;
        }
        select, input {
            width: 100%;
            background: #222244;
            color: #fff;
            border: 1px solid #00ffcc;
            padding: 5px;
            border-radius: 4px;
            outline: none;
        }
        input[type="range"] {
            appearance: none;
            background: #222244;
            height: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffcc;
            cursor: pointer;
            border-radius: 50%;
        }
        .keyboard {
            display: flex;
            justify-content: center;
            width: 90vw;
            max-width: 800px;
            margin-bottom: 20px;
        }
        .key {
            flex: 1;
            height: 120px;
            background: white;
            border: 1px solid #333;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .key.black {
            background: black;
            height: 80px;
            margin-left: -2.5%;
            margin-right: -2.5%;
            z-index: 2;
            max-width: 35px;
        }
        .key:active, .key.active {
            background: #00ffcc;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .key.black:active, .key.black.active {
            background: #00b399;
        }
    </style>
</head>
<body>

    <h1>CyberSynth API v1.0</h1>
    <canvas id="viz"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>Waveform</label>
            <select id="waveform">
                <option value="sine">Sine (Pure)</option>
                <option value="square">Square (Chiptune)</option>
                <option value="sawtooth">Sawtooth (Aggressive)</option>
                <option value="triangle">Triangle (Soft)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Detune (Unison)</label>
            <input type="range" id="detune" min="-100" max="100" value="0">
        </div>
        <div class="control-group">
            <label>Filter Cutoff</label>
            <input type="range" id="cutoff" min="50" max="5000" value="2000">
        </div>
        <div class="control-group">
            <label>FX Distortion</label>
            <input type="range" id="distortion" min="0" max="100" value="0">
        </div>
    </div>

    <div class="keyboard" id="keyboard">
        <div class="key" data-note="261.63"></div> <!-- C4 -->
        <div class="key black" data-note="277.18"></div>
        <div class="key" data-note="293.66"></div> <!-- D4 -->
        <div class="key black" data-note="311.13"></div>
        <div class="key" data-note="329.63"></div> <!-- E4 -->
        <div class="key" data-note="349.23"></div> <!-- F4 -->
        <div class="key black" data-note="369.99"></div>
        <div class="key" data-note="392.00"></div> <!-- G4 -->
        <div class="key black" data-note="415.30"></div>
        <div class="key" data-note="440.00"></div> <!-- A4 -->
        <div class="key black" data-note="466.16"></div>
        <div class="key" data-note="493.88"></div> <!-- B4 -->
        <div class="key" data-note="523.25"></div> <!-- C5 -->
    </div>

    <script>
        // Audio Context Setup
        let audioCtx;
        let analyser;
        let activeOscillators = {};

        // UI Elements
        const canvas = document.getElementById('viz');
        const canvasCtx = canvas.getContext('2d');
        const waveformSelect = document.getElementById('waveform');
        const detuneSlider = document.getElementById('detune');
        const cutoffSlider = document.getElementById('cutoff');
        const distortionSlider = document.getElementById('distortion');

        // Resize Canvas dynamically
        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Initialize Audio System
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            analyser.connect(audioCtx.destination);
            drawWaveform();
        }

        // Distortion curve generator
        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50,
                n_samples = 44100,
                curve = new Float32Array(n_samples),
                deg = Math.PI / 180,
                i = 0,
                x;
            for ( ; i < n_samples; ++i ) {
                x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        // Play Note Logic
        function startNote(freq) {
            initAudio();
            if (activeOscillators[freq]) return;

            // Create nodes
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            const distortion = audioCtx.createWaveShaper();

            // Configure Oscillator
            osc.type = waveformSelect.value;
            osc.frequency.value = freq;
            osc.detune.value = parseFloat(detuneSlider.value);

            // Configure Filter
            filter.type = 'lowpass';
            filter.frequency.value = parseFloat(cutoffSlider.value);

            // Configure Distortion
            const distVal = parseFloat(distortionSlider.value);
            if (distVal > 0) {
                distortion.curve = makeDistortionCurve(distVal);
                distortion.oversampling = '4x';
            }

            // Smooth volume envelope to prevent clicking
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);

            // Routing chain
            osc.connect(distortion);
            distortion.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(analyser);

            osc.start();

            // Store active nodes
            activeOscillators[freq] = { osc, gainNode };
        }

        // Stop Note Logic
        function stopNote(freq) {
            if (!activeOscillators[freq]) return;
            
            const { osc, gainNode } = activeOscillators[freq];
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            setTimeout(() => {
                try { osc.stop(); } catch(e){}
                osc.disconnect();
                gainNode.disconnect();
            }, 300);

            delete activeOscillators[freq];
        }

        // Visualizer Loop
        function drawWaveform() {
            requestAnimationFrame(drawWaveform);
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            canvasCtx.fillStyle = '#111122';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            canvasCtx.lineWidth = 3;
            canvasCtx.strokeStyle = '#00ffcc';
            canvasCtx.shadowBlur = 10;
            canvasCtx.shadowColor = '#00ffcc';
            canvasCtx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height) / 2;

                if (i === 0) {
                    canvasCtx.moveTo(x, y);
                } else {
                    canvasCtx.lineTo(x, y);
                }
                x += sliceWidth;
            }
