<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 // MATRIX OVERRIDE EXEGESIS</title>
    <style>
        /* Raw, Low-Res CRT Matrix Style */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
            user-select: none;
            overflow: hidden;
        }

        /* Scanline Overlay for Arcade Feel */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 99999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Main Blocky Console Framework */
        .console-chassis {
            background: #000;
            border: 8px solid #00ff66;
            padding: 15px;
            width: 95%;
            max-width: 600px;
            box-shadow: 16px 16px 0px #220044;
            box-sizing: border-box;
            position: relative;
        }

        .panel-stripe {
            background: #00ff66;
            color: #000;
            padding: 5px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 900;
        }

        /* Game Screen Arena Box */
        #game-viewport {
            width: 100%;
            height: 350px;
            background: #050505;
            border: 6px solid #ff0055;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        /* Score & UI Elements inside the cabinet */
        .hud-row {
            display: flex;
            justify-content: space-between;
            background: #111;
            border: 4px solid #ffaa00;
            padding: 6px 12px;
            font-size: 14px;
            margin-bottom: 15px;
            color: #ffaa00;
        }

        /* Player Ship Character Entity */
        #player-ship {
            position: absolute;
            bottom: 10px;
            width: 30px;
            height: 20px;
            background: #00ff66;
            border: 3px solid #fff;
            box-sizing: border-box;
            transition: left 0.1s ease-out;
        }

        /* Laser Beam Entities */
        .laser-beam {
            position: absolute;
            width: 4px;
            height: 15px;
            background: #ff0055;
            box-shadow: 0 0 4px #ff0055;
        }

        /* Falling Hostile Target Data Packets */
        .glitch-target {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #ffaa00;
            border: 3px solid #000;
            box-sizing: border-box;
        }

        /* Game Over Intercept Screen Screen */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-btn {
            background: #000;
            color: #00ff66;
            border: 4px solid #00ff66;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #ff0055;
            margin-top: 15px;
        }
        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ff0055;
        }

        /* Chunk-Style Mechanical Action Matrix Keys */
        .block-keyboard {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .chunk-key {
            flex: 1;
            background: #fff;
            color: #000;
            height: 65px;
            border: 4px solid #000;
            box-shadow: 0px 6px 0px #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        .chunk-key:active {
            background: #ff0055;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(4px);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- MAIN SOUND GENERATOR SYSTEM CABINET -->
    <div class="console-chassis">
        <div class="panel-stripe">=== HARDWARE TERMINAL MATRIX GAME ===</div>

        <!-- System Score Display Board -->
        <div class="hud-row">
            <div>DATA_STRIKES: <span id="score-val">0000</span></div>
            <div>SHIELD_INTEGRITY: <span id="shield-val">100%</span></div>
        </div>

        <!-- Visual Core Play Arena Box -->
        <div id="game-viewport">
            <div id="player-ship"></div>
            
            <!-- Game Over System Capture Banner -->
            <div id="game-over-screen">
                <h1 style="color: #ff0055; margin: 0; font-size: 28px;">MATRIX FAILURE</h1>
                <p style="color: #ffaa00; font-size: 12px; margin-top: 10px;">HOSTILE GLITCH ENTITIES BREACHED THE SECTOR</p>
                <button class="action-btn" id="restart-btn">[ REBOOT SECTOR ]</button>
            </div>
        </div>

        <!-- 8 Heavy Lane Routing Keys -->
        <div class="block-keyboard">
            <div class="chunk-key" data-lane="0">L1</div>
            <div class="chunk-key" data-lane="1">L2</div>
            <div class="chunk-key" data-lane="2">L3</div>
            <div class="chunk-key" data-lane="3">L4</div>
            <div class="chunk-key" data-lane="4">L5</div>
            <div class="chunk-key" data-lane="5">L6</div>
            <div class="chunk-key" data-lane="6">L7</div>
            <div class="chunk-key" data-lane="7">L8</div>
        </div>
        <p style="text-align: center; font-size: 11px; margin-top: 12px; color: #ff0055;">TIP: TAP KEYS TO WARP SHIP AND FIRE CORRESPONDING LANES</p>
    </div>

    <script>
        // Core Variable Matrix
        const viewport = document.getElementById('game-viewport');
        const ship = document.getElementById('player-ship');
        const scoreDisplay = document.getElementById('score-val');
        const shieldDisplay = document.getElementById('shield-val');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        let score = 0;
        let shield = 100;
        let isGameOver = false;
        
        const lasers = [];
        const targets = [];
        
        // Spawn and engine looping handles
        let gameLoopId = null;
        let targetSpawnId = null;

        // Compute step dimensions dynamically across 8 track lanes
        const totalLanes = 8;
        let laneWidth = viewport.clientWidth / totalLanes;

        // Force calculations to stay aligned if browser frame shifts
        window.addEventListener('resize', () => {
            laneWidth = viewport.clientWidth / totalLanes;
        });

        // Set initial ship placement to middle lane
        let currentLane = 3;
        updateShipPosition();

        function updateShipPosition() {
            const leftOffset = (currentLane * laneWidth) + (laneWidth / 2) - 15;
            ship.style.left = `${leftOffset}px`;
        }

        // Action Trigger Framework
        function triggerLaneAction(laneIndex) {
            if (isGameOver) return;
            
            // Instantly warp ship chassis to clicked target channel
            currentLane = laneIndex;
            updateShipPosition();
            
            // Construct Laser Entity Vector blueprint
            const laser = document.createElement('div');
            laser.className = 'laser-beam';
            
            const startX = (laneIndex * laneWidth) + (laneWidth / 2) - 2;
            laser.style.left = `${startX}px`;
            laser.style.bottom = '35px'; // Fires just above ship height
            
            viewport.appendChild(laser);
            lasers.push(laser);

            // Optional Web Audio Synth Ping (Safe, built-in, standalone fallback synth sound)
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const actx = new AudioContextClass();
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(300 + (laneIndex * 80), actx.currentTime);
                gain.gain.setValueAtTime(0.05, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(actx.destination);
                osc.start();
                setTimeout(() => osc.stop(), 160);
            } catch(e) {}
        }

        // Hostile Glitch Target Generator Routine
        function spawnHostileTarget() {
            if (isGameOver) return;
            
            const target = document.createElement('div');
            target.className = 'glitch-target';
            
            const randomLane = Math.floor(Math.random() * totalLanes);
            const targetX = (randomLane * laneWidth) + (laneWidth / 2) - 12;
            
            target.style.left = `${targetX}px`;
