<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 // TERMINAL DEFENDER CORE</title>
    <style>
        /* --- CORE BRUTALIST GRID DESIGN --- */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            image-rendering: pixelated;
        }

        /* Scanline Overlay for an authentic Retro Cabinet feel */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Premium Mechanical Arcade Chassis Wrapper */
        .arcade-cabinet {
            background: #000;
            border: 8px solid #00ff66;
            padding: 20px;
            width: 95%;
            max-width: 540px;
            box-shadow: 20px 20px 0px #220044;
            box-sizing: border-box;
            position: relative;
        }

        .marquee-header {
            background: #00ff66;
            color: #000;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: 900;
        }

        /* Unified HUD layout matrix blocks */
        .hud-display {
            display: flex;
            justify-content: space-between;
            background: #0d0d0d;
            border: 4px solid #ffaa00;
            padding: 8px 15px;
            font-size: 14px;
            margin-bottom: 15px;
            color: #ffaa00;
        }

        /* Safe, high-performance Canvas Container */
        .screen-frame {
            position: relative;
            width: 100%;
            background: #000;
            border: 6px solid #ff0055;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 400px;
            background: #030a05;
        }

        /* Structural Overlay Screens (Main Menu, Game Over) */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .menu-title {
            color: #ff0055;
            margin: 0 0 10px 0;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .menu-desc {
            color: #ffaa00;
            font-size: 12px;
            margin: 0 0 20px 0;
            line-height: 1.5;
        }

        .arcade-btn {
            background: #000;
            color: #00ff66;
            border: 4px solid #00ff66;
            padding: 12px 24px;
            font-family: inherit;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 6px 6px 0px #ff0055;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .arcade-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #ff0055;
        }

        /* Heavy Mechanical Controller Keys */
        .controller-deck {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .deck-trigger {
            flex: 1;
            background: #fff;
            color: #000;
            height: 60px;
            border: 4px solid #000;
            box-shadow: 0px 6px 0px #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        .deck-trigger:active, .deck-trigger.active {
            background: #ff0055;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(4px);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="arcade-cabinet">
        <div class="marquee-header">=== CODENAME: MATRIX REAPER ===</div>

        <!-- Dashboard Instrument Display -->
        <div class="hud-display">
            <div>SCORE: <span id="hud-score">00000</span></div>
            <div>SHIELD: <span id="hud-shield">100%</span></div>
        </div>

        <!-- Visual Core Output Terminal Box -->
        <div class="screen-frame">
            <canvas id="arcade-viewport"></canvas>

            <!-- Menu Layer Canvas Blocks -->
            <div id="ui-overlay" class="overlay-screen">
                <h1 class="menu-title" id="ui-title">SYSTEM READY</h1>
                <p class="menu-desc" id="ui-desc">MALICIOUS CODES ARE CORRUPTING THE HARDWARE CORE.<br>TRIGGER CONTROLLER LANE KEYS TO PURGE DATA TRACKS.</p>
                <button class="arcade-btn" id="ui-action-btn">[ ENGAGE OVERRIDE ]</button>
            </div>
        </div>

        <!-- Lane Action Fire Control Deck -->
        <div class="controller-deck">
            <div class="deck-trigger" data-lane="0">1</div>
            <div class="deck-trigger" data-lane="1">2</div>
            <div class="deck-trigger" data-lane="2">3</div>
            <div class="deck-trigger" data-lane="3">4</div>
            <div class="deck-trigger" data-lane="4">5</div>
            <div class="deck-trigger" data-lane="5">6</div>
            <div class="deck-trigger" data-lane="6">7</div>
            <div class="deck-trigger" data-lane="7">8</div>
        </div>
    </div>

    <!-- --- HIGH PERFORMANCE ARCADE GAME ENGINE --- -->
    <script>
        const canvas = document.getElementById('arcade-viewport');
        const ctx = canvas.getContext('2d');
        
        const hudScore = document.getElementById('hud-score');
        const hudShield = document.getElementById('hud-shield');
        const uiOverlay = document.getElementById('ui-overlay');
        const uiTitle = document.getElementById('ui-title');
        const uiDesc = document.getElementById('ui-desc');
        const uiBtn = document.getElementById('ui-action-btn');

        // Engine State Configuration Variables
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        let score = 0;
        let shield = 100;
        let targetLane = 3;
        let currentShipX = 0;
        let spawnTimer = 0;
        let bossActive = false;
        let bossHealth = 10;
        let bossMaxHealth = 10;
        let bossX = 0;
        let bossDirection = 1;

        // Visual Asset Entity Stack Arrays
        const entities = { lasers: [], cells: [], fragments: [], streams: [] };
        const laneCount = 8;

        // Setup clean high-res canvas backing dimensions
        function scaleTerminalDimensions() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        scaleTerminalDimensions();

        // Background scrolling digital matrix code cascade streams setup
        for (let i = 0; i < 20; i++) {
            entities.streams.push({
                x: Math.random() * 500,
                y: Math.random() * 400,
                speed: 1.5 + Math.random() * 3,
                len: 4 + Math.floor(Math.random() * 8)
            });
        }

        // Fire Laser Weapons Vector Directive
        function executeWeaponFire(laneIndex) {
            if (gameState !== 'PLAYING') return;
            
            targetLane = laneIndex;
            const targetX = (laneIndex * (canvas.width / laneCount)) + ((canvas.width / laneCount) / 2);

            entities.lasers.push({ x: targetX, y: canvas.height - 35, speed: 9 });

            // Generate stand-alone safe synthetic UI blaster audio effects 
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const actx = new AudioContextClass();
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(440 + (laneIndex * 60), actx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.04, actx.currentTime);
                osc.connect(gain);
                gain.connect(actx.destination);
                osc.start();
                setTimeout(() => osc.stop(), 100);
            } catch(e) {}
        }

        // Particle Burst Generator Routine
        function createExplosionBurst(x, y, tint) {
            for (let i = 0; i < 8; i++) {
                entities.fragments.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0,
                    decay: 0.04 + Math.random() * 0.04,
                    color: tint
                });
            }
        }

        // Central Engine Processing Loop Block
        function updateLogicCycle() {
            // --- BACKGROUND MATRIX PIPELINE ---
            entities.streams.forEach(st => {
                st.y += st.speed;

                    st.y = -40;
