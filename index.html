<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUDE 8-BIT MACHINE</title>
    <style>
        body {
            background-color: #000000;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
        }

        /* Brutalist Boot Wall */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            border: 10px solid #ff00ff;
            box-sizing: border-box;
        }

        .coin-btn {
            background: #00ffff;
            color: #000;
            border: 5px solid #fff;
            padding: 20px 40px;
            font-family: inherit;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 8px 8px 0px #00aaaa;
        }

        /* Clunky Cabinet Shell */
        .ugly-box {
            background: #111;
            border: 6px solid #ff00ff;
            padding: 15px;
            width: 95%;
            max-width: 650px;
            box-shadow: 12px 12px 0px #00ffff;
        }

        .section-title {
            background: #ff00ff;
            color: #000;
            padding: 4px;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-card {
            background: #000;
            border: 3px solid #00ffff;
            padding: 10px;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-size: 12px;
            color: #00ff00;
        }

        select, input[type="range"] {
            background: #000;
            color: #ffff00;
            border: 2px solid #ffff00;
            font-family: inherit;
            font-weight: bold;
            padding: 4px;
            outline: none;
        }

        input[type="range"] {
            width: 130px;
        }

        /* Blocky Piano Keys Grid Layout */
        .keyboard-grid {
            display: flex;
            background: #000;
            border: 4px solid #ff00ff;
            padding: 5px;
            gap: 4px;
        }

        .block-key {
            flex: 1;
            background: #ffffff;
            height: 100px;
            border: 4px solid #000000;
            box-shadow: 0px 8px 0px #555555;
            cursor: pointer;
        }

        .block-key:active {
            background: #ffff00;
            box-shadow: 0px 2px 0px #aaaa00;
            transform: translateY(6px);
        }
    </style>
</head>
<body>

    <!-- BROWSER SECURITY BYPASS SCREEN -->
    <div id="boot-screen">
        <h1 style="font-size: 32px; margin-bottom: 40px; color: #ffff00; text-align:center;">RAW AUDIO ENGINE</h1>
        <button class="coin-btn" id="boot-btn">INSERT COIN</button>
    </div>

    <!-- MAIN CRUDE CONTROLLER PANEL -->
    <div class="ugly-box">
        <div style="text-align: center; margin-bottom: 15px; color: #00ff00;">-- AUDIO CORE ONLINE --</div>

        <div class="grid-layout">
            <!-- Instrumental Voice Presets -->
            <div class="control-card">
                <div class="section-title">1. Instrument Preset</div>
                <div class="param-row">
                    <label>SOUND BANK</label>
                    <select id="inst-select">
                        <option value="chip">8-BIT CHIPTUNE LEAD</option>
                        <option value="sub">DEEP SUB BASS</option>
                        <option value="laser">RETRO FX LASER</option>
                        <option value="space">SPACE FLUTE W/ VIBRATO</option>
                    </select>
                </div>
            </div>

            <!-- Custom Waveform Generation Hardware -->
            <div class="control-card">
                <div class="section-title">2. Manual Wave Blocks</div>
                <div class="param-row">
                    <label>OSC 1 SHAPE</label>
                    <select id="wave1">
                        <option value="square">SQUARE</option>
                        <option value="sawtooth">SAWTOOTH</option>
                        <option value="triangle">TRIANGLE</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
                <div class="param-row">
                    <label>OSC 2 SHAPE</label>
                    <select id="wave2">
                        <option value="sawtooth">SAWTOOTH</option>
                        <option value="square">SQUARE</option>
                        <option value="triangle">TRIANGLE</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
            </div>

            <!-- Extra Fine Tuning Modification Knobs -->
            <div class="control-card">
                <div class="section-title">3. Tweak Parameters</div>
                <div class="param-row">
                    <label>OSC DETUNE</label>
                    <input type="range" id="detune-knob" min="-50" max="50" step="1" value="15">
                </div>
                <div class="param-row">
                    <label>VIBRATO RATE</label>
                    <input type="range" id="vibe-knob" min="0" max="20" step="1" value="0">
                </div>
            </div>

            <div class="control-card">
                <div class="section-title">4. Mix Levels</div>
                <div class="param-row">
                    <label>MASTER VOL</label>
                    <input type="range" id="master-vol" min="0" max="0.5" step="0.05" value="0.25">
                </div>
            </div>
        </div>

        <!-- Clunky Playing Interface Keys -->
        <div class="keyboard-grid">
            <div class="block-key" data-note="130.81" title="C3 (Low)"></div>
            <div class="block-key" data-note="146.83" title="D3"></div>
            <div class="block-key" data-note="164.81" title="E3"></div>
            <div class="block-key" data-note="196.00" title="G3"></div>
            <div class="block-key" data-note="220.00" title="A3"></div>
            <div class="block-key" data-note="261.63" title="C4 (Mid)"></div>
            <div class="block-key" data-note="293.66" title="D4"></div>
            <div class="block-key" data-note="329.63" title="E4"></div>
            <div class="block-key" data-note="392.00" title="G4"></div>
            <div class="block-key" data-note="440.00" title="A4"></div>
        </div>
    </div>

    <script>
        let synthCtx = null;
        const executingVoices = new Map();

        // Kill landing blocker screen and link audio engine thread directly to user choice
        document.getElementById('boot-btn').addEventListener('click', () => {
            synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            synthCtx.resume();
            document.getElementById('boot-screen').style.display = 'none';
        });

        function runInstrumentEngine(targetHz) {
            if (!synthCtx) return;
            if (synthCtx.state === 'suspended') synthCtx.resume();

            // Guard against duplicate overlapping note registers
            if (executingVoices.has(targetHz)) {
                haltInstrumentEngine(targetHz);
            }

            const currentInstrument = document.getElementById('inst-select').value;
            const globalVolume = parseFloat(document.getElementById('master-vol').value);
            const userDetune = parseFloat(document.getElementById('detune-knob').value);
            const vibratoSpeed = parseFloat(document.getElementById('vibe-knob').value);

            // Base component audio graph nodes
            const oscPrimary = synthCtx.createOscillator();
            const oscSecondary = synthCtx.createOscillator();
            const routingGain = synthCtx.createGain();

            routingGain.gain.setValueAtTime(globalVolume, synthCtx.currentTime);

            // Core Instrumental Configuration Subroutines
            if (currentInstrument === 'chip') {
                // Classic 8-bit lead pairing raw block waves
                oscPrimary.type = 'square';
                oscSecondary.type = 'sawtooth';
                oscPrimary.frequency.value = targetHz;
                oscSecondary.frequency.value = targetHz / 2; // Drop octave
                oscSecondary.detune.value = userDetune;
            } 
            else if (currentInstrument === 'sub') {
                // Clean deep sine/triangle sub drop bass voicing
                oscPrimary.type = 'sine';
                oscSecondary.type = 'triangle';
                oscPrimary.frequency.value = targetHz / 2; // Shift octave down
                oscSecondary.frequency.value = targetHz / 2;
                oscSecondary.detune.value = 4; // Tiny widening
            } 
            else if (currentInstrument === 'laser') {
                // Linear slide down ramp sweep simulation
                oscPrimary.type = 'sawtooth';
                oscSecondary.type = 'square';
