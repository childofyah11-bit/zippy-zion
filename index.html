<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coding Power: 5-Phase Ultimate Boss</title>
    <style>
        body { margin: 0; background: #08080c; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { border: 4px solid #ffd700; background: #0d0d14; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATE
let gameOver = false;
let victory = false;
let score = 0;
let combo = 0;
let comboTimer = 0;
let screenShake = 0;

// PLAYER OBJECT
const player = {
    x: 100, y: 350, w: 40, h: 40,
    speed: 6.5, health: 100, maxHealth: 100,
    dashCooldown: 0, isDashing: 0
};

// 5-PHASE BOSS OBJECT
const boss = {
    x: 830, y: 290, w: 110, h: 130,
    health: 1000, maxHealth: 1000,
    phase: 1, dir: 1, shootCooldown: 0,
    flashFrames: 0, angleOffset: 0, HasOverhealed: false
};

let playerBullets = [];
let bossBullets = [];
let particles = [];
let textPopups = [];
const keys = {};

// SYSTEM EFFECTS
function spawnParticles(x, y, color, count=8, speedMult=1) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            dx: (Math.random() - 0.5) * 8 * speedMult,
            dy: (Math.random() - 0.5) * 8 * speedMult,
            radius: Math.random() * 4 + 2,
            life: 30, maxLife: 30, color: color
        });
    }
}

function spawnText(x, y, text, color) {
    textPopups.push({ x: x, y: y, text: text, color: color, life: 40, dy: -1.5 });
}

// INPUT HANDLERS
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " " && !gameOver && !victory) {
        playerBullets.push({ x: player.x + player.w, y: player.y + player.h/2, dx: 18, dy: 0, r: 5, color: "#00bfff" });
        spawnParticles(player.x + player.w, player.y + player.h/2, "#00bfff", 2, 0.5);
    }
    if (e.key === "Shift" && player.dashCooldown <= 0 && !gameOver && !victory) {
        player.isDashing = 12;
        player.dashCooldown = 50;
        spawnParticles(player.x + player.w/2, player.y + player.h/2, "#fff", 25, 2.5);
        screenShake = 15;
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// GET COLORS PER PHASE
function getBossColor(phase) {
    if (phase === 1) return "#ff3232"; // Red
    if (phase === 2) return "#9370db"; // Purple
    if (phase === 3) return "#32cd32"; // Green
    if (phase === 4) return "#ff8c00"; // Orange
    return "#ffd700"; // Phase 5: Golden God
}

// CORE PHYSICS LOGIC
function update() {
    if (gameOver || victory) return;

    if (screenShake > 0) screenShake *= 0.9;
    if (combo > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }
    if (player.dashCooldown > 0) player.dashCooldown--;

    let currentSpeed = player.isDashing > 0 ? player.speed * 2.8 : player.speed;
    if (player.isDashing > 0) player.isDashing--;

    if (keys["w"] || keys["ArrowUp"]) player.y -= currentSpeed;
    if (keys["s"] || keys["ArrowDown"]) player.y += currentSpeed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= currentSpeed;
    if (keys["d"] || keys["ArrowRight"]) player.x += currentSpeed;

    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

    if (boss.flashFrames > 0) boss.flashFrames--;

    // PHASE SELECTION CALCULATOR BASED ON HEALTH
    let hpPercent = boss.health / boss.maxHealth;
    let oldPhase = boss.phase;

    if (hpPercent > 0.8) boss.phase = 1;
    else if (hpPercent > 0.6) boss.phase = 2;
    else if (hpPercent > 0.4) boss.phase = 3;
    else if (hpPercent > 0.2) boss.phase = 4;
    else boss.phase = 5;

    // Phase Change Explosion Feedback Trigger
    if (boss.phase > oldPhase) {
        screenShake = 35;
        spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, getBossColor(boss.phase), 60, 4);
        spawnText(boss.x - 40, boss.y - 30, `PHASE ${boss.phase} EVOLUTION!`, getBossColor(boss.phase));
        
        // PHASE 5 SPECIAL POWER UP: HEALTH RE-GAIN SHIELD
        if (boss.phase === 5 && !boss.HasOverhealed) {
            boss.health += 500; // Inject extra temporary health points
            boss.maxHealth += 500; // Expand total limit bar
            boss.HasOverhealed = true;
            spawnText(boss.x - 60, boss.y - 60, "+500 ULTRA SHIELD GAINED!", "#ffd700");
        }
    }

    // BOSS AI STRATEGIES PER PHASE
    if (boss.phase === 1) {
        boss.y += boss.dir * 3;
        if (boss.y <= 50 || boss.y >= canvas.height - boss.h - 50) boss.dir *= -1;
    } 
    else if (boss.phase === 2) {
        boss.y += boss.dir * 5; // Speeds up movement
        if (boss.y <= 50 || boss.y >= canvas.height - boss.h - 50) boss.dir *= -1;
    } 
    else if (boss.phase === 3) {
        let targetY = player.y + player.h/2 - boss.h/2;
        boss.y += (targetY - boss.y) * 0.06; // Hard tracking
    } 
    else if (boss.phase === 4) {
        let targetY = player.y + player.h/2 - boss.h/2;
        boss.y += (targetY - boss.y) * 0.1; // Hyper aggressive tracking
        boss.x += boss.dir * 2; // Sways forward and back menacingly
        if (boss.x < 750 || boss.x > 880) boss.dir *= -1;
    } 
    else if (boss.phase === 5) {
        // Ultimate Position Matrix: Teleports smoothly around the center-right arena
        boss.angleOffset += 0.02;
        boss.y = 280 + Math.sin(boss.angleOffset * 2) * 180;
        boss.x = 780 + Math.cos(boss.angleOffset) * 60;
    }

    // BOSS BULLET FIRING SYSTEMS
    boss.shootCooldown++;
    let cooldownTarget = 24; 
    if (boss.phase === 2) cooldownTarget = 16;
    if (boss.phase === 3) cooldownTarget = 12;
    if (boss.phase === 4) cooldownTarget = 7; // Rapid-fire assault
    if (boss.phase === 5) cooldownTarget = 4; // ULTIMATE SPEED BULLET HELL

    if (boss.shootCooldown >= cooldownTarget) {
        boss.shootCooldown = 0;
        let bx = boss.x;
        let by = boss.y + boss.h/2;

        if (boss.phase === 1) {
            bossBullets.push({ x: bx, y: by, dx: -8, dy: 0, r: 6, color: getBossColor(1) });
        } 
        else if (boss.phase === 2) {
            let angle = Math.atan2((player.y+20) - by, (player.x+20) - bx);
            bossBullets.push({ x: bx, y: by, dx: Math.cos(angle)*10, dy: Math.sin(angle)*10, r: 6, color: getBossColor(2) });
        } 
        else if (boss.phase === 3) {
            let angle = Math.atan2((player.y+20) - by, (player.x+20) - bx);
            let spread = (Math.random() - 0.5) * 0.35; // Wild weapon spread spray
            bossBullets.push({ x: bx, y: by, dx: Math.cos(angle+spread)*11, dy: Math.sin(angle+spread)*11, r: 6, color: getBossColor(3) });
        } 
        else if (boss.phase === 4) {
            // Fires double stacked waves vertically
            bossBullets.push({ x: bx, y: by - 30, dx: -12, dy: 1, r: 6, color: getBossColor(4) });
            bossBullets.push({ x: bx, y: by + 30, dx: -12, dy: -1, r: 6, color: getBossColor(4) });
        } 
        else if (boss.phase === 5) {
            // ULTIMATE SYSTEM: Sine-Wave Expanding Hex Helix Arrays
            boss.angleOffset += 0.25;
            let dy1 = Math.sin(boss.angleOffset) * 5;
            let dy2 = -Math.sin(boss.angleOffset) * 5;
            bossBullets.push({ x: bx, y: by, dx: -10, dy: dy1, r: 7, color: "#ffd700" });
            bossBullets.push({ x: bx, y: by, dx: -10, dy: dy2, r: 7, color: "#ffffff" });
        }
    }

    // COLLISION RESOLUTION PIPELINES
    playerBullets.forEach((b, idx) => {
        b.x += b.dx;
        if (b.x > canvas.width) playerBullets.splice(idx, 1);
        if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.health -= 10;
            boss.flashFrames = 3;
            combo++; comboTimer = 90; score += 15 * combo;
            spawnParticles(b.x, b.y, getBossColor(boss.phase), 5, 0.8);
            spawnText(boss.x - 25, b.y + (Math.random()-0.5)*20, `-${10*combo}`, combo > 4 ? "#ffd700" : "#fff");
            playerBullets.splice(idx, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    bossBullets.forEach((b, idx) => {
        b.x += b.dx; b.y += b.dy;
        if (b.x < 0 || b.y < 0 || b.y > canvas.height) bossBullets.splice(idx, 1);
        if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            if (player.isDashing > 0) return; // Invincible check frame
            player.health -= 8; // Scales hit balancing down since bullets fly faster
            combo = 0; screenShake = 10;
            spawnParticles(b.x, b.y, "#ff3232", 10, 1.2);
            spawnText(player.x + 45, player.y, "Ouch!", "#ff3232");
            bossBullets.splice(idx, 1);
            if (player.health <= 0) gameOver = true;
        }
    });

    particles.forEach((p, idx) => { p.x += p.dx; p.y += p.dy; p.life--; if (p.life <= 0) particles.splice(idx, 1); });
    textPopups.forEach((t, idx) => { t.y += t.dy; t.life--; if (t.life <= 0) textPopups.splice(idx, 1); });
}

// RENDERING SCREEN GRAPHICS
function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Draw Particles Background
        particles.forEach(p => {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life / p.maxLife;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Player Dash Ghosts
        if (player.isDashing > 0) {
            ctx.fillStyle = "rgba(0, 191, 255, 0.25)";
