<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goofball Industrial Rock Soundtrack</title>
    <style>
        body {
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255,0,127,0.5);
            font-size: 1.8rem;
            margin: 0 0 5px 0;
        }
        p {
            color: #7a7a9a;
            margin: 0 0 15px 0;
            font-size: 0.8rem;
        }
        .controls {
            margin-bottom: 15px;
        }
        button {
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255,0,127,0.3);
            transition: 0.2s;
        }
        button:hover {
            background: #ff3399;
        }
        .sequencer-container {
            max-width: 95vw;
            overflow-x: auto;
            padding: 12px;
            background: #10101b;
            border-radius: 12px;
            border: 2px solid #232336;
            box-shadow: 0 0 35px rgba(0,0,0,0.8);
        }
        .sequencer {
            display: grid;
            grid-template-columns: 80px repeat(64, 22px);
            gap: 3px;
            width: fit-content;
        }
        .row-label {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.7rem;
            color: #00ffcc;
        }
        .pad {
            width: 22px;
            height: 26px;
            background: #202032;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #30304a;
            transition: 0.05s;
        }
        .pad.active {
            background: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
            border-color: #fff;
        }
        div[data-note^="G5"].pad.active, div[data-note^="F5"].pad.active, div[data-note^="Eb5"].pad.active { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
        div[data-note^="D5"].pad.active, div[data-note^="C5"].pad.active, div[data-note^="B4"].pad.active { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
        div[data-note^="Ab4"].pad.active, div[data-note^="G4"].pad.active, div[data-note^="F4"].pad.active { background: #b600ff; box-shadow: 0 0 8px #b600ff; }
        div[data-note^="Eb4"].pad.active, div[data-note^="D4"].pad.active, div[data-note^="C4"].pad.active { background: #00eaff; box-shadow: 0 0 8px #00eaff; }
        
        .pad.current {
            border: 1px solid #fff;
            background-image: linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15));
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: CYBER-ROCK GUITAR</h1>
    <p>Scroll horizontally to view the entire continuous track layout grid.</p>
    
    <div class="controls">
        <button id="playBtn">EXECUTE ARCHITECTURE</button>
    </div>

    <div class="sequencer-container">
        <div class="sequencer" id="grid"></div>
    </div>

    <script>
        let audioCtx = null;
        
        const instruments = ['G5', 'F5', 'Eb5', 'D5', 'C5', 'B4', 'Ab4', 'G4', 'F4', 'Eb4', 'D4', 'C4'];
        const steps = 64;
        let currentStep = 0;
        let isPlaying = false;
        let intervalId = null;

        const frequencies = {
            'G5': 783.99, 'F5': 698.46, 'Eb5': 622.25, 'D5': 587.33, 'C5': 523.25, 
            'B4': 493.88, 'Ab4': 415.30, 'G4': 392.00, 'F4': 349.23, 'Eb4': 311.13, 
            'D4': 293.66, 'C4': 261.63
        };

        const tracks = {};
        instruments.forEach(inst => {
            tracks[inst] = new Array(steps).fill(false);
        });

        const songPreset = [
            ['C4', 0], ['Eb4', 1], ['G4', 2], ['C5', 3], ['Eb5', 4], ['G5', 5],
            ['F5', 6], ['D5', 8], ['B4', 10],
            ['C4', 12], ['G4', 13], ['C5', 14],
            ['Eb4', 16], ['Eb4', 17], ['G4', 18], ['G4', 19], ['C5', 20], ['C5', 21], ['Eb5', 22],
            ['D5', 24], ['D5', 25], ['B4', 26], ['B4', 27], ['G4', 28], ['G4', 29], ['D4', 30],
            ['C4', 32], ['C5', 32], ['D4', 34], ['D5', 34], ['Eb4', 36], ['Eb5', 36], ['F4', 38], ['F5', 38],
            ['G4', 40], ['G5', 40], ['Ab4', 42], ['Ab5', 42], ['C5', 44], ['Eb5', 46],
            ['C4', 48], ['C4', 49], ['C4', 50], 
            ['Eb4', 52], ['Eb4', 53], ['Eb4', 54],
            ['Ab4', 56], ['C5', 56], ['F5', 56],
            ['G4', 60], ['C5', 60], ['Eb5', 60], ['G5', 60],
            ['G5', 61], ['G5', 62], ['G5', 63]
        ];

        songPreset.forEach(([note, step]) => {
            if (tracks[note]) { tracks[note][step] = true; }
        });

        const grid = document.getElementById('grid');
        instruments.forEach(inst => {
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = inst;
            grid.appendChild(label);

            for (let i = 0; i < steps; i++) {
                const pad = document.createElement('div');
                pad.className = `pad ${tracks[inst][i] ? 'active' : ''}`;
                pad.dataset.note = inst;
                pad.dataset.step = i;
                pad.onclick = () => {
                    tracks[inst][i] = !tracks[inst][i];
                    pad.classList.toggle('active');
                };
                grid.appendChild(pad);
            }
        });

        // RE-ENGINEERED: Custom Distorted Cyber-Guitar Synth Module
        function playCyberGuitar(frequency, isLong) {
            const now = audioCtx.currentTime;
            const duration = isLong ? 0.70 : 0.16;
            
            const osc = audioCtx.createOscillator();
            // A combination of pulse/sawtooth behaviors makes a raw guitar tone
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(frequency, now);

            // Add subtle pitch vibration (chorus effect) for rock grit
            osc.frequency.linearRampToValueAtTime(frequency * 1.005, now + 0.04);
            osc.frequency.linearRampToValueAtTime(frequency * 0.995, now + 0.08);
            osc.frequency.linearRampToValueAtTime(frequency, now + 0.12);

            // WaveShaper Node simulates pure heavy amplifier distortion drive
            const distortion = audioCtx.createWaveShaper();
            function makeDistortionCurve(amount) {
                const k = typeof amount === 'number' ? amount : 50;
                const n_samples = 44100;
                const curve = new Float32Array(n_samples);
                const deg = Math.PI / 180;
                for (let i = 0; i < n_samples; ++i) {
                    const x = (i * 2) / n_samples - 1;
                    curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.PI * Math.abs(x));
                }
                return curve;
            }
            distortion.curve = makeDistortionCurve(120); // High-gain rock overdrive level
            distortion.oversample = '4x';

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking'; // Emulates an electric guitar cabinet speaker curve
            filter.frequency.setValueAtTime(1400, now);
            filter.Q.setValueAtTime(4, now);
            filter.gain.setValueAtTime(8, now);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.05, now); // Attenuate loud guitar spikes safely
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

            osc.connect(distortion);
            distortion.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + duration);
        }

        function playStep() {
            document.querySelectorAll('.pad').forEach(p => p.classList.remove('current'));
            document.querySelectorAll(`[data-step="${currentStep}"]`).forEach(p => p.classList.add('current'));
            
            instruments.forEach(inst => {
                if (tracks[inst][currentStep]) {
                    const isLong = (currentStep >= 12 && currentStep <= 14) || 
                                   (currentStep >= 48 && currentStep <= 54) || 
                                   (currentStep >= 60);
                    playCyberGuitar(frequencies[inst], isLong);
                }
            });
            currentStep = (currentStep + 1) % steps;
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (isPlaying) {
                clearInterval(intervalId);
                document.getElementById('playBtn').innerText = 'EXECUTE ARCHITECTURE';
                document.getElementById('playBtn').style.background = '#ff007f';
                document.querySelectorAll('.pad').forEach(p => p.classList.remove('current'));
                isPlaying = false;
            } else {
                intervalId = setInterval(playStep, 160); // Driving rock tempo speed (approx 93 BPM)
                document.getElementById('playBtn').innerText = 'HALT SCORE';
                document.getElementById('playBtn').style.background = '#00ffcc';
                isPlaying = true;
            }
        });
    </script>
</body>
</html>
