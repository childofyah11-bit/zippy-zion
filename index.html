<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Town Star</title>
    <style>
        :root { --bg: #0b0f19; }
        body, html { margin:0; padding:0; width:100%; height:100%; background: var(--bg); font-family: sans-serif; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        #ui { position: relative; z-index: 2; text-align: center; width: 90%; max-width: 800px; pointer-events: none; }
        #start { pointer-events: auto; cursor: pointer; background: rgba(15,23,42,0.8); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        h1 { font-size: 2.5rem; margin: 0 0 10px 0; background: linear-gradient(45deg, #38bdf8, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: #38bdf8; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; }
        #lyrics { display: none; font-size: 3rem; font-weight: 800; text-transform: uppercase; line-height: 1.4; }
        .word { display: inline-block; margin: 0 8px; opacity: 0; transform: translateY(10px); animation: pop 0.3s forwards; }
        @keyframes pop { to { opacity: 1; transform: translateY(0); } }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; gap: 15px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="start" onclick="runShow()">
            <h1>SMALL TOWN STAR</h1>
            <p style="color:#94a3b8">(Goofball Experience)</p>
            <button class="btn">START SHOW</button>
        </div>
        <div id="lyrics"></div>
    </div>
    <div id="controls">
        <button class="nav-btn" onclick="go(-1)">◀ BACK</button>
        <button class="nav-btn" onclick="toggle()">PAUSE</button>
        <button class="nav-btn" onclick="go(1)">NEXT ▶</button>
    </div>

    <script>
        const txt = [
            "Small Town Star (Goofball)","I’m a goofball bouncing-off-the-wall-ball","Everybody knows my name","Yeah I’ll be a little goofball","Staying in my own lane",
            "I’m a low-key pretty goofy really-got-it-good-breezy","standing-pretty-tall-ball","Dancing in the quiet rain","Just a low-key goofball","And God made me perfectly okay",
            "Woke up Clean slate","Sun's up Don't wait","Step out Big yard","Life's good Not hard","Green trees Clear breeze","Out here Do what I please",
            "Big smile Spark eye","Watch the clouds roll right on by","No rush My pace","Wide open No race","Fresh air Cool shade","Sun shine High sky",
            "No stress Time flies","Quiet space Ground solid","Real world Big knowledge","Just growth Big views","No stress Good news","Out back Chill state",
            "Everything is looking great","Birds sing Warm air","No worries No cares","Right here My spot","Appreciate what I got","His design Right place",
            "Full of purpose Full of grace","Phone rings Big crowd","They talk Real loud","They know me I'm known","But right now My zone","Feet up Chill mind",
            "One of a kind Good joke","Fun time That's the end of the line","They call I decline","My space All mine","Top tier No fear","I’m the star around here",
            "Screen bright App tapped","Class notes Book wrapped","Log in School grind","Sharp brain Good mind","Homework Done fast","A-plus First class",
            "Next tab Beats play","Soundtrack for the day","Headphones No need","Speakers loud Top speed","Volume up Track rolls","Deep rhythm Takes control",
            "Popular Well liked","But the focus is spiked","Peaceful Rest easy","Everything is going breezy","Music stops Heavy silence","World waits Big reliance",
            "They look I stand","Take control Command","Lights fade Stage set","Moment they won't forget","No mistakes No flaws","Woven by His holy laws",
            "Every detail Every strand","Held inside a higher hand","Take a breath Hear the call","God made me perfectly after all","Sun goes down Stars appear",
            "Living life With no fear","Grateful heart Peaceful state","Everything is looking great","Walking forward Staying strong","This is where I belong",
            "Deep breath Clear sky","Watch the days fly right on by","In His hands Every day","Everything is turning out okay 😁"
        ];

        let idx = 0, auto = true, timer, aCtx, p = [];
        const cv = document.getElementById('canvas'), cx = cv.getContext('2d');
        
        function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
        window.onresize = resize; resize();

        for(let i=0; i<80; i++) p.push({x:Math.random()*cv.width, y:Math.random()*cv.height, s:Math.random()*3+1, v:Math.random()*1+0.5});

        function draw() {
            cx.fillStyle = 'rgba(11,15,25,0.2)'; cx.fillRect(0,0,cv.width,cv.height);
            cx.fillStyle = '#38bdf8';
            p.forEach(i => {
                i.y -= i.v; if(i.y < 0) i.y = cv.height;
                cx.beginPath(); cx.arc(i.x, i.y, i.s, 0, Math.PI*2); cx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        function sound() {
            if(!aCtx) aCtx = new(window.AudioContext||window.webkitAudioContext)();
            let osc = aCtx.createOscillator(), g = aCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(idx % 2 === 0 ? 300 : 450, aCtx.currentTime);
            g.gain.setValueAtTime(0.1, aCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, aCtx.currentTime + 0.3);
            osc.connect(g); g.connect(aCtx.destination); osc.start(); osc.stop(aCtx.currentTime + 0.3);
        }

        function showLine() {
            const box = document.getElementById('lyrics'); box.innerHTML = '';
            txt[idx].split(' ').forEach((w, i) => {
                let s = document.createElement('span'); s.className = 'word'; s.innerText = w;
                s.style.animationDelay = `${i * 0.05}s`; box.appendChild(s);
            });
            sound();
            clearTimeout(timer);
            if(auto && idx < txt.length - 1) timer = setTimeout(() => go(1), 2500);
        }

        function runShow() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('lyrics').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            showLine();
        }

        function go(d) { idx += d; if(idx < 0) idx = 0; if(idx >= txt.length) idx = txt.length-1; showLine(); }
        function toggle() { auto = !auto; if(auto) showLine(); }
    </script>
</body>
</html>
