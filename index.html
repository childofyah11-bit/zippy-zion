<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Core: 5-Phase Protocol</title>
    <style>
        body { margin: 0; background: #050508; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { border: 4px solid #ff0055; background: #0a0a12; box-shadow: 0 0 40px rgba(255, 0, 85, 0.3); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATE ENGINE
let gameOver = false;
let victory = false;
let score = 0;
let screenShake = 0;
let gameTime = 0;

// PLAYER SHIP OBJECT
const player = {
    x: 100, y: 350, r: 20, 
    speed: 7, health: 100, maxHealth: 100,
    shieldActive: 0, shieldCooldown: 0
};

// 5-PHASE AI CORE BOSS
const boss = {
    x: 800, y: 350, r: 60, 
    health: 3000, maxHealth: 3000,
    phase: 1, timer: 0, angle: 0,
    flash: 0
};

let playerLasers = [];
let bossOrbs = [];
let visualSparks = [];
let UIAnnouncements = [];
const keys = {};

// SYSTEM COLOURS PER PHASE
const coreColors = {
    1: "#00ffcc", // Neon Mint
    2: "#ffff00", // Laser Yellow
    3: "#ff0055", // Cyber Pink
    4: "#7700ff", // Dark Plasma Purple
    5: "#ffffff"  // Overclocked White
};

// JUICE: PARTICLE SPAWNER
function makeSparks(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        visualSparks.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            alpha: 1,
            color: color
        });
    }
}

// JUICE: FLOATING TEXT
function makeText(text, color) {
    UIAnnouncements.push({ text: text, color: color, y: 150, alpha: 1 });
}

// CONTROLS INGESTION
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    
    // Spacebar: Shoot Laser
    if (e.key === " " && !gameOver && !victory) {
        playerLasers.push({ x: player.x + 20, y: player.y, vx: 18, vy: 0 });
        makeSparks(player.x + 20, player.y, "#ffff00", 2);
    }
    
    // Shift: Plasma Shield Power
    if (e.key === "Shift" && player.shieldCooldown <= 0 && !gameOver && !victory) {
        player.shieldActive = 45; 
        player.shieldCooldown = 180; 
        screenShake = 8;
        makeText("SHIELD ENGAGED", "#00ffcc");
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// MAIN CALCULATIONS LOOP
function update() {
    if (gameOver || victory) return;

    gameTime++;
    if (screenShake > 0) screenShake *= 0.85;
    if (player.shieldCooldown > 0) player.shieldCooldown--;
    if (player.shieldActive > 0) player.shieldActive--;
    if (boss.flash > 0) boss.flash--;

    // Player Flight Vector Logic
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    // Boundaries check
    player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
    player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

    // --- PHASE CALCULATOR ---
    let hpPercent = boss.health / boss.maxHealth;
    let priorPhase = boss.phase;

    if (hpPercent > 0.8) boss.phase = 1;
    else if (hpPercent > 0.6) boss.phase = 2;
    else if (hpPercent > 0.4) boss.phase = 3;
    else if (hpPercent > 0.2) boss.phase = 4;
    else boss.phase = 5; 

    // Phase Switch Transition Trigger
    if (boss.phase !== priorPhase) {
        screenShake = 30;
        makeSparks(boss.x, boss.y, coreColors[boss.phase], 60);
        makeText(`WARNING: PHASE ${boss.phase} INITIALIZED`, coreColors[boss.phase]);
    }

    // --- BOSS MECHANICS PER PHASE ---
    boss.timer++;
    boss.angle += 0.04;

    let currentBossColor = coreColors[boss.phase];

    if (boss.phase === 1) {
        boss.y = 350 + Math.sin(gameTime * 0.03) * 150;
        if (boss.timer >= 20) {
            boss.timer = 0;
            bossOrbs.push({ x: boss.x, y: boss.y, vx: -8, vy: 0, r: 8, color: currentBossColor });
        }
    } 
    else if (boss.phase === 2) {
        boss.x = 800 + Math.sin(gameTime * 0.05) * 80;
        boss.y = 350 + Math.cos(gameTime * 0.05) * 100;
        if (boss.timer >= 14) {
            boss.timer = 0;
            bossOrbs.push({ x: boss.x, y: boss.y, vx: -9, vy: -3, r: 7, color: currentBossColor });
            bossOrbs.push({ x: boss.x, y: boss.y, vx: -9, vy: 3, r: 7, color: currentBossColor });
        }
    } 
    else if (boss.phase === 3) {
        boss.y += (player.y - boss.y) * 0.05;
        if (boss.timer >= 10) {
            boss.timer = 0;
            let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12, r: 8, color: currentBossColor });
        }
    } 
    else if (boss.phase === 4) {
        boss.x += (500 - boss.x) * 0.05;
        boss.y += (350 - boss.y) * 0.05;
        if (boss.timer >= 6) {
            boss.timer = 0;
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(boss.angle) * 7, vy: Math.sin(boss.angle) * 7, r: 6, color: currentBossColor });
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(boss.angle + Math.PI) * 7, vy: Math.sin(boss.angle + Math.PI) * 7, r: 6, color: currentBossColor });
        }
    } 
    else if (boss.phase === 5) {
        boss.x += (800 - boss.x) * 0.1;
        boss.y += (player.y - boss.y) * 0.12; 
        
        if (boss.timer >= 5) { 
            boss.timer = 0;
            let targetAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(targetAngle) * 14, vy: Math.sin(targetAngle) * 14, r: 10, color: "#ffffff" });
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(targetAngle + 0.3) * 12, vy: Math.sin(targetAngle + 0.3) * 12, r: 8, color: currentBossColor });
            bossOrbs.push({ x: boss.x, y: boss.y, vx: Math.cos(targetAngle - 0.3) * 12, vy: Math.sin(targetAngle - 0.3) * 12, r: 8, color: currentBossColor });
        }
    }

    // UPDATE PLAYER PROJECTILES
    playerLasers.forEach((l, i) => {
        l.x += l.vx;
        if (l.x > canvas.width) {
            playerLasers.splice(i, 1);
            return;
        }

        let dist = Math.hypot(l.x - boss.x, l.y - boss.y);
        if (dist < boss.r) {
            boss.health -= 15;
            boss.flash = 3;
            score += 25 * boss.phase;
            makeSparks(l.x, l.y, coreColors[boss.phase], 4);
            playerLasers.splice(i, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // UPDATE BOSS PROJECTILES
    bossOrbs.forEach((o, i) => {
        o.x += o.vx;
        o.y += o.vy;
        
        if (o.x < -20 || o.x > canvas.width + 20 || o.y < -20 || o.y > canvas.height + 20) {
            bossOrbs.splice(i, 1);
            return;
        }

        let dist = Math.hypot(o.x - player.x, o.y - player.y);
        if (dist < o.r + player.r) {
            bossOrbs.splice(i, 1);
            
            if (player.shieldActive > 0) {
                score += 50; 
                makeSparks(o.x, o.y, "#00ffcc", 8);
                return;
            }

            player.health -= 8;
            screenShake = 15;
            makeSparks(player.x, player.y, "#ff0055", 12);
            if (player.health <= 0) gameOver = true;
        }
    });

    // TRAIL DECAY UTILITY
    for (let i = visualSparks.length - 1; i >= 0; i--) {
        visualSparks[i].x += visualSparks[i].vx;
        visualSparks[i].y += visualSparks[i].vy;
        visualSparks[i].alpha -= 0.04;
        if (visualSparks[i].alpha <= 0) visualSparks.splice(i, 1);
    }

    for (let i = UIAnnouncements.length - 1; i >= 0; i--) {
        uiAnnouncements[i].alpha -= 0.015;
        if (uiAnnouncements[i].alpha <= 0) uiAnnouncements.splice(i, 1);
    }
}

// GRAPHICS PIPELINE ENGINE
function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Sparks
        visualSparks.forEach(s => {
            ctx.fillStyle = s.color; ctx.globalAlpha = s.alpha;
            ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Player Triangle Ship
        ctx.fillStyle = "#ffff00";
        ctx.beginPath();
        ctx.moveTo(player.x + 20, player.y);
        ctx.lineTo(player.x - 15, player.y - 15);
        ctx.lineTo(player.x - 15, player.y + 15);
        ctx.closePath();
        ctx.fill();

        // Plasma Shield Power ring bubble
        if (player.shieldActive > 0) {
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 15, 0, Math.PI*2); ctx.stroke();
        }

        // Boss Outer Ring Assembly & Core Matrix
        let currentColors = coreColors[boss.phase];
        ctx.strokeStyle = currentColors; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r + 15, boss.angle, boss.angle + Math.PI*1.5); ctx.stroke();

        ctx.fillStyle = boss.flash > 0 ? "#ffffff" : currentColors;
        ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI*2); ctx.fill();

        // Lasers
        playerLasers.forEach(l => {
            ctx.fillStyle = "#ffff00"; ctx.fillRect(l.x, l.y - 2, 15, 4);
        });

        // Boss Orbs
        bossOrbs.forEach(o => {
            ctx.fillStyle = o.color; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
        });

        // HIERARCHICAL TEXT ANNOUNCEMENTS
        UIAnnouncements.forEach(a => {
