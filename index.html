<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Orchestra: Small Town Star</title>
    <style>
        body {
            background: #06060c;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0,255,204,0.6);
            margin: 0 0 5px 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        p {
            color: #6a6a8a;
            margin: 0 0 20px 0;
            font-size: 0.85rem;
        }
        .player-container {
            width: 95vw;
            max-width: 800px;
            background: #0f0f1d;
            border: 2px solid #25254e;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        .main-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        button {
            font-size: 1rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            letter-spacing: 1px;
        }
        #playBtn {
            background: #00ffcc;
            color: #06060c;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }
        #playBtn:hover { background: #33ffdd; transform: scale(1.02); }
        #playBtn.playing {
            background: #ff007f;
            color: white;
            box-shadow: 0 0 15px rgba(255,0,127,0.4);
        }
        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .slider-card {
            background: #191932;
            border: 1px solid #32325d;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .slider-card label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #ff007f;
            letter-spacing: 0.5px;
        }
        .slider-card input {
            width: 100%;
            accent-color: #00ffcc;
            cursor: pointer;
        }
        .slider-card span {
            font-size: 0.8rem;
            font-family: monospace;
            color: #00ffcc;
        }
        #visualizer {
            width: 100%;
            height: 120px;
            background: #090916;
            border: 1px solid #1f1f3d;
            border-radius: 12px;
            margin-bottom: 25px;
            display: block;
        }
        .lyrics-display {
            background: #090916;
            border: 1px solid #1f1f3d;
            border-radius: 12px;
            height: 140px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .lyric-row {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #4a4a6a;
            transition: all 0.3s ease;
            transform: scale(0.95);
            opacity: 0.3;
            text-align: center;
        }
        .lyric-row.active {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0,255,204,0.6);
            font-weight: bold;
            transform: scale(1.05);
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: SMALL TOWN STAR</h1>
    <p>Streamlined live synthesis dashboard engine.</p>

    <div class="player-container">
        <div class="main-controls">
            <button id="playBtn">START STREAM</button>
        </div>

        <div class="sliders-grid">
            <div class="slider-card">
                <label>MASTER VOLUME</label>
                <input type="range" id="volumeSlider" min="0" max="2" step="0.1" value="1">
                <span id="volVal">100%</span>
            </div>
            <div class="slider-card">
                <label>TRACK TEMPO</label>
                <input type="range" id="tempoSlider" min="80" max="180" step="2" value="130">
                <span id="tempoVal">130 BPM</span>
            </div>
            <div class="slider-card">
                <label>FILTER RESONANCE</label>
                <input type="range" id="filterSlider" min="500" max="4000" step="100" value="2000">
                <span id="filterVal">2000Hz</span>
            </div>
            <div class="slider-card">
                <label>ECHO FEEDBACK</label>
                <input type="range" id="echoSlider" min="0" max="0.8" step="0.05" value="0.3">
                <span id="echoVal">30%</span>
            </div>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="lyrics-display">
            <div id="line1" class="lyric-row active">System Standby</div>
            <div id="line2" class="lyric-row">Click Start Stream to initialize music engine</div>
        </div>
    </div>
    <script>
        let audioCtx = null;
        let masterGain = null;
        let delayNode = null;
        let delayFeedback = null;
        let analyser = null;
        
        let isPlaying = false;
        let stepInterval = null;
        let currentStep = 0;
        const totalSteps = 512;

        const synthNotes = [261.63, 293.66, 311.13, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 622.25, 698.46, 783.99];
        const chords = [
            [261.63, 311.13, 392.00], // Cm
            [311.13, 392.00, 523.25], // Eb
            [349.23, 415.30, 523.25], // Fm
            [392.00, 493.88, 587.33]  // G
        ];

        const lyricTimeline = [
            { step: 0, l1: "I’m a goofball bouncing-off-the-wall-ball", l2: "Everybody knows my name" },
            { step: 16, l1: "Yeah I’ll be a little goofball", l2: "Staying in my own lane" },
            { step: 32, l1: "I’m a low-key pretty goofy really-got-it-good-breezy standing-pretty-tall-ball", l2: "Dancing in the quiet rain" },
            { step: 52, l1: "Just a low-key goofball", l2: "And God made me perfectly okay" },
            { step: 68, l1: "Woke up / Clean slate / Sun's up / Don't wait", l2: "Step out / Big yard / Life's good / Not hard" },
            { step: 88, l1: "Green trees / Clear breeze / Out here / Do what I please", l2: "Big smile / Spark eye / Watch the clouds roll right on by" },
            { step: 108, l1: "No rush / My pace / Wide open / No race", l2: "Fresh air / Cool shade / Sun shine / High sky" },
            { step: 128, l1: "No stress / Time flies / Quiet space / Ground solid", l2: "Real world / Big knowledge / Just growth / Big views" },
            { step: 148, l1: "No stress / Good news / Out back / Chill state", l2: "Everything is looking great / Birds sing" },
            { step: 168, l1: "Warm air / No worries / No care / Right here", l2: "My spot / Appreciate what I got / His design" },
            { step: 188, l1: "Right place / Full of purpose / Full of grace", l2: "Phone rings / Big crowd / They talk / Real loud" },
            { step: 208, l1: "They know me / I'm known / But right now / My zone", l2: "Feet up / Chill mind / One of a kind" },
            { step: 228, l1: "Good joke / Fun time / That's the end of the line", l2: "They call / I decline / My space / All mine" },
            { step: 248, l1: "Top tier / No fear", l2: "I’m the star around here" },
            { step: 264, l1: "Screen bright / App tapped / Class notes / Book wrapped", l2: "Log in / School grind / Sharp brain / Good mind" },
            { step: 284, l1: "Homework / Done fast / A-plus / First class", l2: "Next tab / Beats play / Soundtrack for the day" },
            { step: 304, l1: "Headphones / No need / Speakers loud / Top speed", l2: "Volume up / Track rolls / Deep rhythm / Takes control" },
            { step: 324, l1: "Popular / Well liked / But the focus is spiked", l2: "Peaceful / Rest easy / Everything is going breezy" },
            { step: 344, l1: "Music stops / Heavy silence / World waits / Big reliance", l2: "They look / I stand / Take control / Command" },
            { step: 368, l1: "Lights fade / Stage set / Moment they won't forget", l2: "No mistakes / No flaws / Woven by His holy laws" },
            { step: 392, l1: "Every detail / Every strand", l2: "Held inside a higher hand" },
            { step: 412, l1: "Take a breath / Hear the call", l2: "God made me perfectly after all" },
            { step: 432, l1: "Sun goes down / Stars appear", l2: "Living life / With no fear" },
            { step: 452, l1: "Grateful heart / Peaceful state", l2: "Everything is looking great" },
            { step: 472, l1: "Walking forward / Staying strong", l2: "This is where I belong" },
            { step: 492, l1: "Deep breath / Clear sky / Watch the days fly right on by", l2: "In His hands / Every day / Everything is turning out okay 😁" }
        ];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = parseFloat(document.getElementById('volumeSlider').value);
            
            delayNode = audioCtx.createDelay(1.0);
            delayNode.delayTime.value = 0.25;
            
            delayFeedback = audioCtx.createGain();
            delayFeedback.gain.value = parseFloat(document.getElementById('echoSlider').value);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            
            masterGain.connect(delayNode);
            delayNode.connect(delayFeedback);
            delayFeedback.connect(delayNode);
            
            masterGain.connect(analyser);
            delayNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            startVisualizer();
        }
        function startVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                if (!isPlaying) return;
                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = '#090916';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let barWidth = (canvas.width / bufferLength) * 2;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    let barHeight = dataArray[i] / 1.5;
                    ctx.fillStyle = `rgba(0, 255, 204, ${barHeight / 120})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    
                    ctx.strokeStyle = '#ff007f';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if(i === 0) ctx.moveTo(x, canvas.height - barHeight);
                    else ctx.lineTo(x, canvas.height - barHeight);
                    x += barWidth + 1;
                }
                ctx.stroke();
            }
            canvas.width = canvas.offsetWidth;
            draw();
        }

        function playTone(freq, type, vol, duration) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filterNode = audioCtx.createBiquadFilter();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(parseFloat(document.getElementById('filterSlider').value), now);
            
            gainNode.gain.setValueAtTime(vol, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(masterGain);
            
            osc.start(now);
            osc.stop(now + duration);
        }

        function playStep() {
            const currentChord = chords[Math.floor(currentStep / 16) % chords.length];
            
            // 1. Core Melodic Progression
            if (currentStep % 4 === 0) {
                currentChord.forEach(freq => playTone(freq, 'triangle', 0.15, 0.4));
            }
            if (currentStep % 2 === 0) {
                const randomNote = currentChord[Math.floor(Math.random() * currentChord.length)] * 2;
                playTone(randomNote, 'sine', 0.1, 0.2);
            }

            // 2. Continuous Backing Rhythm Track
            if (currentStep % 4 === 0) {
                playTone(60, 'sine', 0.8, 0.12); // Steady Electronic Kick
            }
            if (currentStep % 4 === 2) {
                // Synthesis Noise Simulation for Hi-Hats
                playTone(8000, 'triangle', 0.03, 0.04);
            }
            if (currentStep % 2 === 1) {
                const bassFreq = currentChord[0] / 2;
                playTone(bassFreq, 'sawtooth', 0.12, 0.15); // Bouncing Bass Line
            }

            // 3. Text Engine Sync Tracker
            const match = lyricTimeline.reduce((prev, curr) => (currentStep >= curr.step) ? curr : prev, lyricTimeline);
            const l1 = document.getElementById('line1');
            const l2 = document.getElementById('line2');
            if (l1.innerText !== match.l1) {
                l1.classList.remove('active');
                l2.classList.remove('active');
                setTimeout(() => {
                    l1.innerText = match.l1;
                    l2.innerText = match.l2;
                    l1.classList.add('active');
                    l2.classList.add('active');
                }, 50);
            }

            currentStep = (currentStep + 1) % totalSteps;
        }

        function getIntervalTime() {
            const bpm = parseInt(document.getElementById('tempoSlider').value);
            return (60000 / bpm) / 4; // 16th note timing conversion
        }

        // Control Panel Target Listeners
        document.getElementById('playBtn').addEventListener('click', function() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            initAudio();
            
            if (isPlaying) {
                clearInterval(stepInterval);
                this.innerText = "START STREAM";
                this.classList.remove('playing');
                isPlaying = false;
                currentStep = 0;
            } else {
                this.innerText = "HALT ENGINE";
                this.classList.add('playing');
                isPlaying = true;
                stepInterval = setInterval(playStep, getIntervalTime());
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('volVal').innerText = Math.round(val * 100) + '%';
            if (masterGain) masterGain.gain.value = val;
        });

        document.getElementById('tempoSlider').addEventListener('input', (e) => {
            const bpm = e.target.value;
            document.getElementById('tempoVal').innerText = bpm + " BPM";
            if (isPlaying) {
                clearInterval(stepInterval);
                stepInterval = setInterval(playStep, getIntervalTime());
            }
        });

        document.getElementById('filterSlider').addEventListener('input', (e) => {
            document.getElementById('filterVal').innerText = e.target.value + "Hz";
        });

        document.getElementById('echoSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('echoVal').innerText = Math.round(val * 100) + '%';
            if (delayFeedback) delayFeedback.gain.value = val;
        });
    </script>
</body>
</html>
