<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 AUDIO HARDWARE // VERIFIED</title>
    <style>
        /* --- SYSTEM STYLING & CRT MATRIX THEME --- */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- CRT VINTAGE SCANLINE SIMULATION OVERLAY --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- GATEKEEPER SCREEN OVERLAY (AUDIO INTERLOCK) --- */
        #gatekeeper-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            border: 14px solid #ff0055;
            box-sizing: border-box;
        }

        .giant-boot-btn {
            background: #000;
            color: #00ff66;
            border: 8px solid #00ff66;
            padding: 30px 60px;
            font-family: inherit;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 12px 12px 0px #ff0055;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .giant-boot-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 6px 6px 0px #ff0055;
        }

        /* --- HARDWARE CHASSIS CONSOLE FRAMEWORK --- */
        .console-chassis {
            background: #000;
            border: 8px solid #00ff66;
            padding: 15px;
            width: 95%;
            max-width: 720px;
            box-shadow: 16px 16px 0px #220044;
            box-sizing: border-box;
        }

        .panel-stripe {
            background: #00ff66;
            color: #000;
            padding: 6px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        /* --- REALTIME CRT OSCILLOSCOPE MONITOR --- */
        .monitor-display {
            background: #051105;
            border: 4px solid #ff0055;
            margin-bottom: 15px;
            height: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-display canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .monitor-tag {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 10px;
            color: #ffaa00;
            z-index: 10;
            background: #051105;
            padding: 0 4px;
        }

        /* --- GRID MATRIX FOR MODULE CONTROLS --- */
        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .module-block {
            border: 4px solid #ffaa00;
            padding: 10px;
            background: #0b0b0b;
        }

        .module-tag {
            font-size: 11px;
            background: #ffaa00;
            color: #000;
            padding: 2px 6px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
        }

        /* --- INDUSTRIAL DIALS AND INPUT SELECTORS --- */
        select, input[type="range"] {
            background: #000;
            color: #ff0055;
            border: 4px solid #ff0055;
            font-family: inherit;
            font-weight: 900;
            padding: 2px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        input[type="range"] {
            width: 110px;
            -webkit-appearance: none;
            height: 14px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 20px;
            background: #00ff66;
            border: 2px solid #fff;
            cursor: pointer;
        }

        /* --- BRUTAL CHUNK HARDWARE PIANO KEYS --- */
        .block-keyboard {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .chunk-key {
            flex: 1;
            background: #fff;
            color: #000;
            height: 90px;
            border: 4px solid #000;
            box-shadow: 0px 10px 0px #333;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 8px;
            box-sizing: border-box;
            transition: transform 0.04s, box-shadow 0.04s, background-color 0.04s;
        }

        .chunk-key:active, .chunk-key.active {
            background: #ff0055 !important;
            color: #fff;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(8px);
        }

        .key-label {
            font-size: 12px;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- INTERLOCK AUDIO SYSTEM SECURITY BLOCKER -->
    <div id="gatekeeper-screen">
        <h1 style="font-size: 32px; margin-bottom: 30px; color: #ffaa00;">SYSTEM LOCKOUT</h1>
        <button class="giant-boot-btn" id="ignition-btn">[ BOOT MACHINE ]</button>
        <p style="margin-top: 25px; font-size: 12px; color: #ff0055;">WARNING: AUDIO FREQUENCIES WILL PLAY IMMEDIATELY</p>
    </div>

    <!-- SYNTH ENGINE SYSTEM CABINET -->
    <div class="console-chassis">
        <div class="panel-stripe">=== CONTROLLER MATRIX OVERRIDE V2.5 ===</div>
        
        <!-- CRT Oscilloscope Screen Block -->
        <div class="monitor-display">
            <div class="monitor-tag">LIVE WAVEFORM OSCILLOSCOPE</div>
            <canvas id="scope-canvas"></canvas>
        </div>

        <div class="hardware-grid">
            <!-- 01: Core Waveforms -->
            <div class="module-block">
                <div class="module-tag">01// CORE WAVEFORM</div>
                <div class="input-row">
                    <label for="osc-wave-1">SHAPE 1</label>
                    <select id="osc-wave-1">
                        <option value="square" selected>SQUARE</option>
                        <option value="sawtooth">SAW</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="osc-wave-2">SHAPE 2</label>
                    <select id="osc-wave-2">
                        <option value="sawtooth" selected>SAW</option>
                        <option value="square">SQUARE</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
            </div>

            <!-- 02: Arpeggiator Chip Execution Controls -->
            <div class="module-block">
                <div class="module-tag">02// CHIP MODULATORS</div>
                <div class="input-row">
                    <label for="arp-rate">ARP SPEED</label>
                    <input type="range" id="arp-rate" min="0" max="15" step="1" value="0">
                </div>
                <div class="input-row">
                    <label for="arp-interval">ARP INTERVAL</label>
                    <input type="range" id="arp-interval" min="1" max="12" step="1" value="4">
                </div>
            </div>

            <!-- 03: Voltage Envelope Pitch Sweeper -->
            <div class="module-block">
                <div class="module-tag">03// VOLTAGE SWEEP</div>
                <div class="input-row">
                    <label for="sweep-dir">SWEEP DIR</label>
                    <select id="sweep-dir">
                        <option value="none">NONE</option>
                        <option value="down">DOWNPITCH</option>
                        <option value="up">UPPITCH</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="sweep-speed">SWEEP RATE</label>
                    <input type="range" id="sweep-speed" min="0.05" max="0.8" step="0.05" value="0.2">
                </div>
            </div>

            <!-- 04: Gain Dynamics Amplifiers -->
            <div class="module-block">
                <div class="module-tag">04// AMP DECAY ENVELOPE</div>
                <div class="input-row">
                    <label for="decay-time">DECAY FADE</label>
