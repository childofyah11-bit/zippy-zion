<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Space Game</title>
    <style>
        body { margin: 0; background: #0c0c16; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        canvas { border: 4px solid #00ffff; background: #05050f; display: block; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Force focus so keyboard works instantly
window.focus();

// STATE FLAGS
let gameOver = false;
let victory = false;
let score = 0;

// USER SPACESHIP (CYAN)
let pX = 100;
let pY = 280;
let pW = 40;
let pH = 40;
let pSpeed = 7;
let pHealth = 150; 
let pMaxHealth = 150;
let timeSlowActive = 0;
let timeSlowCooldown = 0;
let overchargeCooldown = 0;

// ALIEN BOSS (CHANGES COLOR PER PHASE)
let bX = 760;
let bY = 220;
let bW = 80;
let bH = 150;
let bHealth = 4000;
let bMaxHealth = 4000;
let bPhase = 1;
let bDir = 1;
let bTimer = 0;
let bAngle = 0; 

let playerBullets = [];
let bossBullets = [];
const keys = {};

window.addEventListener("keydown", function(e) { keys[e.key] = true; });
window.addEventListener("keyup", function(e) { keys[e.key] = false; });

// ENGINE LOGIC LOOP
function update() {
    if (gameOver || victory) return;

    if (timeSlowCooldown > 0) timeSlowCooldown--;
    if (timeSlowActive > 0) timeSlowActive--;
    if (overchargeCooldown > 0) overchargeCooldown--;

    // Movement Controls (WASD / Arrow Keys)
    if (keys["w"] || keys["ArrowUp"]) pY -= pSpeed;
    if (keys["s"] || keys["ArrowDown"]) pY += pSpeed;
    if (keys["a"] || keys["ArrowLeft"]) pX -= pSpeed;
    if (keys["d"] || keys["ArrowRight"]) pX += pSpeed;

    if (pX < 10) pX = 10;
    if (pX > 400) pX = 400; 
    if (pY < 10) pY = 10;
    if (pY > 600 - pH - 10) pY = 600 - pH - 10;

    // POWER 1: Spacebar fires 35-damage lasers
    if (keys[" "] && playerBullets.length < 6) {
        playerBullets.push({ x: pX + pW, y: pY + pH/2 });
        keys[" "] = false; 
    }

    // POWER 2: Chronos Time Slow Mod (Shift Key)
    if (keys["Shift"] && timeSlowCooldown === 0) {
        timeSlowActive = 150; 
        timeSlowCooldown = 360; 
    }

    // POWER 3: EMP Screen Wipe (Enter Key)
    if (keys["Enter"] && overchargeCooldown === 0) {
        overchargeCooldown = 240;
        bossBullets = []; 
        bHealth -= 250; 
        score += 150;
        if (bHealth <= 0) victory = true;
    }

    let timeModifier = timeSlowActive > 0 ? 0.20 : 1.0;

    // Calculate Evolving Phase Breakpoints
    let hpPct = bHealth / bMaxHealth;
    if (hpPct > 0.8) bPhase = 1;
    else if (hpPct > 0.6) bPhase = 2;
    else if (hpPct > 0.4) bPhase = 3;
    else if (hpPct > 0.15) bPhase = 4;
    else bPhase = 5; 

    // Boss Phase 5 Overpowered Flight Script
    if (bPhase === 5) {
        let targetY = pY + pH/2 - bH/2;
        bY += (targetY - bY) * 0.08 * timeModifier;
        bX = 740 + Math.sin(Date.now() / 150) * 40 * timeModifier; 
    } else {
        bY += bDir * 4 * timeModifier;
        if (bY <= 20 || bY >= 600 - bH - 20) bDir *= -1;
    }

    // Boss Automatic Fire System
    bTimer += 1 * timeModifier;
    bAngle += 0.08 * timeModifier;

    let fireDelay = 25 - (bPhase * 3);
    if (bPhase === 5) fireDelay = 4; 

    if (bTimer >= fireDelay) {
        bTimer = 0;
        let c = "#00ffff"; 
        if (bPhase === 2) c = "#ff00ff"; 
        if (bPhase === 3) c = "#ffff00"; 
        if (bPhase === 4) c = "#ff5500"; 
        if (bPhase === 5) c = "#ff3300"; 

        if (bPhase === 1) {
            bossBullets.push({ x: bX, y: bY + bH/2, vx: -8, vy: 0, color: c });
        } 
        else if (bPhase === 2) {
            bossBullets.push({ x: bX, y: bY + bH/2, vx: -9, vy: (Math.random() - 0.5) * 5, color: c });
        } 
        else if (bPhase === 3) {
            let angle = Math.atan2((pY + pH/2) - (bY + bH/2), (pX + pW/2) - bX);
            bossBullets.push({ x: bX, y: bY + bH/2, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, color: c });
        } 
        else if (bPhase === 4) {
            bossBullets.push({ x: bX, y: bY + 20, vx: -11, vy: -1.5, color: c });
            bossBullets.push({ x: bX, y: bY + bH - 20, vx: -11, vy: 1.5, color: c });
        } 
        else if (bPhase === 5) {
            bossBullets.push({ x: bX, y: bY + bH/2, vx: -13, vy: Math.sin(bAngle) * 7, color: c });
            bossBullets.push({ x: bX, y: bY + bH/2, vx: -11, vy: Math.sin(bAngle + 0.8) * 5, color: "#ffffff" });
            bossBullets.push({ x: bX, y: bY + bH/2, vx: -11, vy: Math.sin(bAngle - 0.8) * 5, color: c });
        }
    }

    // Move Player Bullets (35 Damage Output)
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        let b = playerBullets[i]; b.x += 15;
        if (b.x > 900) { playerBullets.splice(i, 1); continue; }

        if (b.x > bX && b.x < bX + bW && b.y > bY && b.y < bY + bH) {
            bHealth -= 35; 
            score += 50;
            playerBullets.splice(i, 1);
            if (bHealth <= 0) victory = true;
        }
    }

    // Move Enemy Orbs (Slowed down by Chronos Mod)
    for (let i = bossBullets.length - 1; i >= 0; i--) {
        let b = bossBullets[i]; b.x += b.vx * timeModifier; b.y += b.vy * timeModifier;
        if (b.x < -20 || b.x > 920 || b.y < -20 || b.y > 620) { bossBullets.splice(i, 1); continue; }

        if (b.x > pX && b.x < pX + pW && b.y > pY && b.y < pY + pH) {
            let dmg = bPhase === 5 ? 12 : 10; 
            pHealth -= dmg;
            bossBullets.splice(i, 1);
            if (pHealth <= 0) gameOver = true;
        }
    }
}

// VISUAL PAINT SYSTEM
function draw() {
    ctx.clearRect(0, 0, 900, 600);

    if (!gameOver && !victory) {
        if (timeSlowActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.08)"; ctx.fillRect(0, 0, 900, 600);
        }

        // Draw Player Submarine/Ship (Cyan)
        ctx.fillStyle = "#00ffff"; ctx.fillRect(pX, pY, pW, pH);

        let bossColor = "#00ffff";
        let phaseTitle = "GRID DEFENSE";
        if (bPhase === 2) { bossColor = "#ff00ff"; phaseTitle = "CYAN OVERLOAD"; }
        if (bPhase === 3) { bossColor = "#ffff00"; phaseTitle = "SWARM MATRIX"; }
        if (bPhase === 4) { bossColor = "#ff5500"; phaseTitle = "CRITICAL CORE"; }
        if (bPhase === 5) { bossColor = "#ff3300"; phaseTitle = "OVERPOWERED TITAN"; }

        // Draw Boss Block
        ctx.fillStyle = bossColor; ctx.fillRect(bX, bY, bW, bH);

        // Draw Player Missiles
        ctx.fillStyle = "#00ffaa";
        playerBullets.forEach(function(b) { ctx.fillRect(b.x, b.y - 3, 16, 6); });

        // Draw Enemy Bullets
        bossBullets.forEach(function(b) {
            ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
        });

        // Interface Text Dashboard
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px monospace";
        ctx.fillText("FIGHTER HEALTH HP: " + Math.max(0, pHealth) + "/" + pMaxHealth, 20, 35);
        ctx.fillText("CHRONOS SLOW [SHIFT]: " + (timeSlowCooldown === 0 ? "READY" : "CHARGING"), 20, 60);
        ctx.fillText("EMP CLEAR    [ENTER]: " + (overchargeCooldown === 0 ? "READY" : "CHARGING"), 20, 85);
        ctx.fillText("MISSION SCORE RECORD: " + score, 20, 110);

        // Boss Health Metrics HUD
        ctx.fillStyle = "#161626"; ctx.fillRect(500, 20, 370, 20);
        ctx.fillStyle = bossColor; ctx.fillRect(500, 20, Math.max(0, 370 * (bHealth / bMaxHealth)), 20);
        ctx.fillStyle = "#ffffff"; ctx.fillText("BOSS HEALTH HP: " + bHealth, 500, 58);
        ctx.fillText("[ MODE " + bPhase + "/5 : " + phaseTitle + " ]", 500, 80);

    } else {
        ctx.textAlign = "center"; ctx.font = "bold 35px monospace";
        if (gameOver) {
            ctx.fillStyle = "#ff0055"; ctx.fillText("CRITICAL OUTAGE // PILOT DESTROYED", 450, 300);
        } else if (victory) {
            ctx.fillStyle = "#00ffaa"; ctx.fillText("BOSS PURGED // COMPLETE VICTORY", 450, 300);
        }
    }
}

// Standard Window Clock Tick Animation Loop
function runLoop() {
    update();
    draw();
    requestAnimationFrame(runLoop);
}

runLoop();
</script>
</body>
</html>

</html>
