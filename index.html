<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Space Arcade</title>
    <style>
        /* Forces the game window to center perfectly on your monitor display */
        body { margin: 0; background: #080812; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        canvas { border: 4px solid #00ffff; background: #03030c; display: block; }
    </style>
</head>
<body>

<!-- Hardcoded flat pixel resolution layout to guarantee visibility -->
<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Locks browser keyboard controls onto the screen immediately
window.focus();

// FLAT ENGINE VARIABLES
let gameOver = false;
let victory = false;
let score = 0;

// PLAYER SPACESHIP VARIABLES
let playerX = 100;
let playerY = 280;
let playerW = 40;
let playerH = 40;
let playerSpeed = 7;
let playerHealth = 150; // Boosted HP to handle Phase 5
let playerMaxHealth = 150;
let timeSlowActive = 0;
let timeSlowCooldown = 0;
let overchargeCooldown = 0;

// 5-PHASE BOSS VARIABLES
let bossX = 760;
let bossY = 220;
let bossW = 80;
let bossH = 150;
let bossHealth = 4000;
let bossMaxHealth = 4000;
let bossPhase = 1;
let bossDir = 1;
let bossTimer = 0;
let bossAngle = 0; // Floating wave factor for Phase 5

let playerBullets = [];
let bossBullets = [];
const keys = {};

// KEYBOARD REGISTER LISTENERS
window.addEventListener("keydown", function(e) { keys[e.key] = true; });
window.addEventListener("keyup", function(e) { keys[e.key] = false; });

// MAIN SYSTEM CALCULATIONS LOOP
function update() {
    if (gameOver || victory) return;

    // Tick down superpower system clocks
    if (timeSlowCooldown > 0) timeSlowCooldown--;
    if (timeSlowActive > 0) timeSlowActive--;
    if (overchargeCooldown > 0) overchargeCooldown--;

    // Flight Translations (WASD / Arrow Keys)
    if (keys["w"] || keys["ArrowUp"]) playerY -= playerSpeed;
    if (keys["s"] || keys["ArrowDown"]) playerY += playerSpeed;
    if (keys["a"] || keys["ArrowLeft"]) playerX -= playerSpeed;
    if (keys["d"] || keys["ArrowRight"]) playerX += playerSpeed;

    // Arena wall boundary locks
    if (playerX < 10) playerX = 10;
    if (playerX > 400) playerX = 400; // Contain spaceship to left grid half
    if (playerY < 10) playerY = 10;
    if (playerY > 600 - playerH - 10) playerY = 600 - playerH - 10;

    // POWER 1: Spacebar fires Upgraded 35-Damage Lasers
    if (keys[" "] && playerBullets.length < 6) {
        playerBullets.push({ x: playerX + playerW, y: playerY + playerH/2, vx: 15, vy: 0 });
        keys[" "] = false; // Requires individual taps to shoot
    }

    // POWER 2: Chronos Drive Time-Slow (Shift Key)
    if (keys["Shift"] && timeSlowCooldown === 0) {
        timeSlowActive = 150; // Active for 2.5 seconds
        timeSlowCooldown = 360; // 6 second recharge loop
    }

    // POWER 3: EMP Screen Reboot Wipe (Enter Key)
    if (keys["Enter"] && overchargeCooldown === 0) {
        overchargeCooldown = 240;
        bossBullets = []; // Instantly vaporizes all active enemy projectiles
        bossHealth -= 250; // Deals huge direct chunk damage
        score += 150;
        if (bossHealth <= 0) victory = true;
    }

    // Dynamic scale vector calculation coefficient
    let timeModifier = timeSlowActive > 0 ? 0.20 : 1.0;

    // Calculate Boss Phase Shifts (1 through 5)
    let hpPct = bossHealth / bossMaxHealth;
    if (hpPct > 0.8) bossPhase = 1;
    else if (hpPct > 0.6) bossPhase = 2;
    else if (hpPct > 0.4) bossPhase = 3;
    else if (hpPct > 0.15) bossPhase = 4;
    else bossPhase = 5; // OVERPOWERED PROTOCOL ACTIVATED!

    // --- BOSS FLIGHT MOVEMENTS ---
    if (bossPhase === 5) {
        // Overpowered Behavior: Double the movement speed and track ship vertical position
        let targetY = playerY + playerH/2 - bossH/2;
        bossY += (targetY - bossY) * 0.08 * timeModifier;
        bossX = 740 + Math.sin(Date.now() / 150) * 40 * timeModifier; // Shakes back and forth unstable
    } else {
        // Standard up and down oscillation pacing
        bossY += bossDir * 4 * timeModifier;
        if (bossY <= 20 || bossY >= 600 - bossH - 20) bossDir *= -1;
    }

    // --- BOSS TURRET FIRING ENGINE ---
    bossTimer += 1 * timeModifier;
    bossAngle += 0.08 * timeModifier;

    let fireDelay = 25 - (bossPhase * 3);
    if (bossPhase === 5) fireDelay = 4; // Absolute bullet hell gatling speed in Phase 5!

    if (bossTimer >= fireDelay) {
        bossTimer = 0;
        
        // Define color hex string based on active phase step
        let c = "#00ffff"; // Phase 1 (Cyan)
        if (bossPhase === 2) c = "#ff00ff"; // Phase 2 (Magenta)
        if (bossPhase === 3) c = "#ffff00"; // Phase 3 (Yellow)
        if (bossPhase === 4) c = "#ff5500"; // Phase 4 (Orange)
        if (bossPhase === 5) c = "#ff3300"; // Phase 5 (Overpowered Crimson Red)

        if (bossPhase === 1) {
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -8, vy: 0, r: 7, color: c });
        } 
        else if (bossPhase === 2) {
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -9, vy: (Math.random() - 0.5) * 5, r: 7, color: c });
        } 
        else if (bossPhase === 3) {
            // Target locked aiming pathing vectors tracking player ship
            let angle = Math.atan2((playerY + playerH/2) - (bossY + bossH/2), (playerX + playerW/2) - bossX);
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, r: 7, color: c });
        } 
        else if (bossPhase === 4) {
            bossBullets.push({ x: bossX, y: bossY + 20, vx: -11, vy: -1.5, r: 8, color: c });
            bossBullets.push({ x: bossX, y: bossY + bossH - 20, vx: -11, vy: 1.5, r: 8, color: c });
        } 
        else if (bossPhase === 5) {
            // Overpowered Barrage: Constantly shoots 3 weapon waves in rapid rotating patterns
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -13, vy: Math.sin(bossAngle) * 7, r: 6, color: c });
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -11, vy: Math.sin(bossAngle + 0.8) * 5, r: 6, color: "#ffffff" });
            bossBullets.push({ x: bossX, y: bossY + bossH/2, vx: -11, vy: Math.sin(bossAngle - 0.8) * 5, r: 6, color: c });
        }
    }

    // Process Laser Projectiles (Hits for 35 Damage Chunks)
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        let b = playerBullets[i]; b.x += b.vx;
        if (b.x > 900) { playerBullets.splice(i, 1); continue; }

        if (b.x > bossX && b.x < bossX + bossW && b.y > bossY && b.y < bossY + bossH) {
            bossHealth -= 35; // 35 Heavy Damage specification
            score += 50;
            playerBullets.splice(i, 1);
            if (bossHealth <= 0) victory = true;
        }
    }

    // Process Enemy Threats (Impacted by Chronos Modifier)
    for (let i = bossBullets.length - 1; i >= 0; i--) {
        let b = bossBullets[i]; b.x += b.vx * timeModifier; b.y += b.vy * timeModifier;
        if (b.x < -20 || b.x > 920 || b.y < -20 || b.y > 620) { bossBullets.splice(i, 1); continue; }

        if (b.x > playerX && b.x < playerX + playerW && b.y > playerY && b.y < playerY + playerH) {
            let dmg = bossPhase === 5 ? 12 : 10; // Phase 5 hits slightly harder
            playerHealth -= dmg;
            bossBullets.splice(i, 1);
            if (playerHealth <= 0) gameOver = true;
        }
    }
}

// VISUALS GRAPHICS PAINTER
function draw() {
    ctx.clearRect(0, 0, 900, 600);

    if (!gameOver && !victory) {
        // Chronos space matrix tint box background overlay
        if (timeSlowActive > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.08)"; ctx.fillRect(0, 0, 900, 600);
        }

        // Draw Player Space Fighter (Cyan Block Frame)
        ctx.fillStyle = "#00ffff"; ctx.fillRect(playerX, playerY, playerW, playerH);

        // Define color hex string dynamically for boss rendering
        let bossColor = "#00ffff";
        let phaseTitle = "GRID DEFENSE";
        if (bossPhase === 2) { bossColor = "#ff00ff"; phaseTitle = "CYAN OVERLOAD"; }
        if (bossPhase === 3) { bossColor = "#ffff00"; phaseTitle = "SWARM MATRIX"; }
        if (bossPhase === 4) { bossColor = "#ff5500"; phaseTitle = "CRITICAL CORE"; }
        if (bossPhase === 5) { bossColor = "#ff3300"; phaseTitle = "OVERPOWERED TITAN"; }

        // Draw Dreadnought Alien Boss Box
        ctx.fillStyle = bossColor; ctx.fillRect(bossX, bossY, bossW, bossH);

        // Draw Player Railgun Lasers
        ctx.fillStyle = "#00ffaa";
        playerBullets.forEach(b => ctx.fillRect(b.x, b.y - 3, 16, 6));

        // Draw Enemy Threat Orbs
        bossBullets.forEach(b => {
            ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
        });

        // HEADS UP USER DASHBOARD (HUD)
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px monospace";
        ctx.fillText(`FIGHTER INTEGRITY HP: ${Math.max(0, playerHealth)}/${playerMaxHealth}`, 20, 35);
        ctx.fillText(`CHRONOS CLOCK [SHIFT]: ${timeSlowCooldown === 0 ? "READY" : "CHARGING"}`, 20, 60);
        ctx.fillText(`EMP REBOOT    [ENTER]: ${overchargeCooldown === 0 ? "READY" : "CHARGING"}`, 20, 85);
        ctx.fillText(`MISSION DATA METRICS SC: ${score}`, 20, 110);

        // Enemy Boss Health Gauges
        ctx.fillStyle = "#161626"; ctx.fillRect(500, 20, 370, 20);
        ctx.fillStyle = bossColor; ctx.fillRect(500, 20, Math.max(0, 370 * (bossHealth / bossMaxHealth)), 20);
        ctx.fillStyle = "#ffffff"; ctx.fillText(`BOSS MATRIX HP: ${bossHealth}`, 500, 58);
        ctx.fillStyle = bossColor; ctx.font = "bold 14px monospace";
        ctx.fillText(`[ PROTOCOL MODE ${bossPhase}/5 : ${phaseTitle} ]`, 500, 80);

    } else {
