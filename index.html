<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 AUDIO HARDWARE</title>
    <style>
        /* Raw, Low-Res CRT Matrix Style */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
            user-select: none;
        }

        /* Main Blocky Console Framework */
        .console-chassis {
            background: #000;
            border: 8px solid #00ff66;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            box-shadow: 16px 16px 0px #220044;
            box-sizing: border-box;
        }

        .panel-stripe {
            background: #00ff66;
            color: #000;
            padding: 5px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .module-block {
            border: 4px solid #ffaa00;
            padding: 8px;
            background: #111;
        }

        .module-tag {
            font-size: 11px;
            background: #ffaa00;
            color: #000;
            padding: 2px 4px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        /* Pixel-art Raw Select Box and Text Sliders */
        select, input[type="range"] {
            background: #000;
            color: #ff0055;
            border: 4px solid #ff0055;
            font-family: inherit;
            font-weight: 900;
            padding: 2px;
            outline: none;
        }

        input[type="range"] {
            width: 100px;
            -webkit-appearance: none;
            height: 14px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 20px;
            background: #00ff66;
            border: 2px solid #fff;
            cursor: pointer;
        }

        /* Chunk-Style Piano Roll Intermediary Layout */
        .block-keyboard {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .chunk-key {
            flex: 1;
            background: #fff;
            color: #000;
            height: 80px;
            border: 6px solid #000;
            box-shadow: 0px 10px 0px #333;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            box-sizing: border-box;
            font-weight: 900;
            font-size: 14px;
        }

        .chunk-key:active {
            background: #ff0055;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(8px);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- MAIN SOUND GENERATOR SYSTEM CABINET -->
    <div class="console-chassis">
        <div class="panel-stripe">=== CONTROLLER MATRIX OVERRIDE V2 ===</div>
        <div class="hardware-grid">
            
            <!-- Signal Oscillators -->
            <div class="module-block">
                <div class="module-tag">01// CORE WAVEFORM</div>
                <div class="input-row">
                    <label>SHAPE 1</label>
                    <select id="osc-wave-1">
                        <option value="square" selected>SQUARE</option>
                        <option value="sawtooth">SAW</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
                <div class="input-row">
                    <label>SHAPE 2</label>
                    <select id="osc-wave-2">
                        <option value="sawtooth" selected>SAW</option>
                        <option value="square">SQUARE</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
            </div>

            <!-- Pitch Modification Engine Controls -->
            <div class="module-block">
                <div class="module-tag">02// CHIP MODULATORS</div>
                <div class="input-row">
                    <label>ARP SPEED</label>
                    <input type="range" id="arp-rate" min="0" max="15" step="1" value="0">
                </div>
                <div class="input-row">
                    <label>ARP INTERVAL</label>
                    <input type="range" id="arp-interval" min="3" max="12" step="1" value="4">
                </div>
            </div>

            <!-- Frequency Ramping Sweep Modification Elements -->
            <div class="module-block">
                <div class="module-tag">03// VOLTAGE SWEEP</div>
                <div class="input-row">
                    <label>SWEEP DIR</label>
                    <select id="sweep-dir">
                        <option value="none">NONE</option>
                        <option value="down">DOWNPITCH</option>
                        <option value="up">UPPITCH</option>
                    </select>
                </div>
                <div class="input-row">
                    <label>SWEEP RATE</label>
                    <input type="range" id="sweep-speed" min="0.05" max="0.8" step="0.05" value="0.2">
                </div>
            </div>

            <!-- Hard Dynamic Envelope Gate Configuration -->
            <div class="module-block">
                <div class="module-tag">04// AMP DECAY ENVELOPE</div>
                <div class="input-row">
                    <label>DECAY FADE</label>
                    <input type="range" id="decay-time" min="0.05" max="1.5" step="0.05" value="0.4">
                </div>
                <div class="input-row">
                    <label>MASTER LEVEL</label>
                    <input type="range" id="gain-level" min="0" max="0.4" step="0.02" value="0.25">
                </div>
            </div>
        </div>

        <!-- 8 Heavy Raw Tone Output Blocks (Tuned higher for small laptop/phone speakers) -->
        <div class="block-keyboard">
            <div class="chunk-key" data-pitch="220.00">A3</div>
            <div class="chunk-key" data-pitch="261.63">C4</div>
            <div class="chunk-key" data-pitch="293.66">D4</div>
            <div class="chunk-key" data-pitch="329.63">E4</div>
            <div class="chunk-key" data-pitch="392.00">G4</div>
            <div class="chunk-key" data-pitch="440.00">A4</div>
            <div class="chunk-key" data-pitch="523.25">C5</div>
            <div class="chunk-key" data-pitch="587.33">D5</div>
        </div>
    </div>

    <script>
        // Store running arpeggiation intervals universally
        const activeIntervals = new Map();

        function playTone(frequency) {
            try {
                // Initialize audio instantly on click to force browser safety clearance
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContextClass();
                
                // Read configuration settings on runtime execution
                const volume = parseFloat(document.getElementById('gain-level').value);
                const wave1 = document.getElementById('osc-wave-1').value;
                const wave2 = document.getElementById('osc-wave-2').value;
                const sweepDir = document.getElementById('sweep-dir').value;
                const sweepRate = parseFloat(document.getElementById('sweep-speed').value);
                const arpRate = parseInt(document.getElementById('arp-rate').value);
                const arpInterval = parseInt(document.getElementById('arp-interval').value);
                const decay = parseFloat(document.getElementById('decay-time').value);

                const now = ctx.currentTime;

                // Build Core Synth Engine Architecture Nodes
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const mainGain = ctx.createGain();

                osc1.type = wave1;
                osc2.type = wave2;

                // Thick industrial detune layer
                osc1.detune.setValueAtTime(-8, now);
                osc2.detune.setValueAtTime(8, now);

                osc1.frequency.setValueAtTime(frequency, now);
                osc2.frequency.setValueAtTime(frequency, now);

                // Voltage Frequency Sweep Math Execution
                if (sweepDir === 'up') {
                    osc1.frequency.exponentialRampToValueAtTime(frequency * 2, now + sweepRate);
                    osc2.frequency.exponentialRampToValueAtTime(frequency * 2, now + sweepRate);
                } else if (sweepDir === 'down') {
                    osc1.frequency.exponentialRampToValueAtTime(frequency * 0.5, now + sweepRate);
                    osc2.frequency.exponentialRampToValueAtTime(frequency * 0.5, now + sweepRate);
                }

                // Chiptune Step-Arpeggiator Engine Clock
                if (arpRate > 0) {
                    let step = 0;
