<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Hunter: Chronos Engine</title>
    <style>
        body { margin: 0; background: #080810; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { border: 4px solid #00ffaa; background: #0c0c1a; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// STATE MANAGER
let gameOver = false;
let victory = false;
let score = 0;

// UPGRADED PLAYER OBJECT
const player = {
    x: 100, y: 350, w: 40, h: 40,
    speed: 7, health: 100, maxHealth: 100,
    timeSlowActive: 0, timeSlowCooldown: 0,
    overchargeCooldown: 0,
    // New Shield System variables
    hasShield: true,
    shieldCooldown: 0,
    // Firing Speed Loop variable
    shootTimer: 0
};

// 5-PHASE BOSS
const boss = {
    x: 840, y: 280, w: 90, h: 140,
    health: 3000, maxHealth: 3000, // Slightly boosted to challenge your new upgrades
    phase: 1, timer: 0, dir: 1
};

let playerBullets = [];
let bossBullets = [];
const keys = {};

// CONFIG MATRIX
const phaseColors = { 1: "#00ffaa", 2: "#00bfff", 3: "#ffff00", 4: "#ffaa00", 5: "#ff0055" };
const phaseNames = { 1: "GRID DEFENSE", 2: "CYAN OVERLOAD", 3: "MATRIX WARNING", 4: "CRITICAL CORE", 5: "ROGUE GOD" };

// KEYBOARD HANDLING
window.addEventListener("keydown", e => { keys[e.key] = true; });
window.addEventListener("keyup", e => { keys[e.key] = false; });
// MATHEMATICAL TRACKING ENGINE
function update() {
    if (gameOver || victory) return;

    // Recharge Cooldowns
    if (player.timeSlowCooldown > 0) player.timeSlowCooldown--;
    if (player.timeSlowActive > 0) player.timeSlowActive--;
    if (player.overchargeCooldown > 0) player.overchargeCooldown--;
    
    // Shield automatic generation clock (Generates a new shield every 6 seconds)
    if (!player.hasShield) {
        player.shieldCooldown++;
        if (player.shieldCooldown >= 360) {
            player.hasShield = true;
            player.shieldCooldown = 0;
        }
    }

    // Smooth Vector Axis Controls
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

    // UPGRADED AUTOMATIC RAPID FIRE MODE (Spacebar)
    // Decrement the gun reloading step
    if (player.shootTimer > 0) player.shootTimer--;
    
    // Holding Spacebar down automatically sprays bullets at double speed!
    if (keys[" "] && player.shootTimer === 0) {
        playerBullets.push({ x: player.x + player.w, y: player.y + player.h/2, speed: 18 });
        player.shootTimer = 7; // Cuts bullet weapon delay right in half!
    }

    // SUPERPOWER 1: Chronos Time Slow Mod Trigger
    if (keys["Shift"] && player.timeSlowCooldown <= 0) {
        player.timeSlowActive = 120;   // Active for 2 seconds
        player.timeSlowCooldown = 300; // 5 second recharge
    }

    // SUPERPOWER 2: Screen Wipe Strike Trigger
    if ((keys["Enter"]) && player.overchargeCooldown <= 0) {
        player.overchargeCooldown = 240; 
        bossBullets = []; // Instantly cleanses screen grid
        boss.health -= 150; // Slams boss bar
        score += 100;
        if (boss.health <= 0) victory = true;
    }

    // Time-slow speed modifier
    let timeModifier = player.timeSlowActive > 0 ? 0.20 : 1.0;

    // Calculate Boss Phase Shifts
    let hpPct = boss.health / boss.maxHealth;
    if (hpPct > 0.8) boss.phase = 1;
    else if (hpPct > 0.6) boss.phase = 2;
    else if (hpPct > 0.4) boss.phase = 3;
    else if (hpPct > 0.2) boss.phase = 4;
    else boss.phase = 5;

    // Move Boss
    boss.y += boss.dir * 4 * timeModifier;
    if (boss.y <= 30 || boss.y >= canvas.height - boss.h - 30) boss.dir *= -1;

    // Boss Firing Mechanics
    boss.timer += 1 * timeModifier;
    let delay = 25 - (boss.phase * 4);
    if (boss.timer >= delay) {
        boss.timer = 0;
        let c = phaseColors[boss.phase];
        
        if (boss.phase === 1) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: -8, vy: 0, r: 8, color: c });
        } else if (boss.phase === 2) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: -9, vy: (Math.random() - 0.5) * 5, r: 7, color: c });
        } else if (boss.phase === 3) {
            let angle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(angle) * 11, vy: Math.sin(angle) * 11, r: 7, color: c });
        } else if (boss.phase === 4) {
            bossBullets.push({ x: boss.x, y: boss.y + 20, vx: -10, vy: 0, r: 8, color: c });
            bossBullets.push({ x: boss.x, y: boss.y + boss.h - 20, vx: -10, vy: 0, r: 8, color: c });
        } else if (boss.phase === 5) {
            let base = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(base) * 13, vy: Math.sin(base) * 13, r: 9, color: "#ffffff" });
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(base + 0.2) * 11, vy: Math.sin(base + 0.2) * 11, r: 7, color: c });
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(base - 0.2) * 11, vy: Math.sin(base - 0.2) * 11, r: 7, color: c });
        }
    }

    // Process Player Bullets
    playerBullets.forEach((b, idx) => {
        b.x += b.speed;
        if (b.x > canvas.width) playerBullets.splice(idx, 1);

        if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.health -= 25; // 25 High-impact Damage
            score += 50;
            playerBullets.splice(idx, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // Process Enemy Orbs
    bossBullets.forEach((b, idx) => {
        b.x += b.vx * timeModifier;
        b.y += b.vy * timeModifier;

        if (b.x < -20 || b.x > canvas.width + 20) {
            bossBullets.splice(idx, 1);
            return;
        }

        if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            bossBullets.splice(idx, 1);
            
            // NEW PASSIVE SHIELD ABSORPTION RULE CHECK
            if (player.hasShield) {
                player.hasShield = false; // Pops shield entirely
                player.shieldCooldown = 0; // Starts recharging loop timer
                return; // Blocks the hit damage 100%!
            }

            player.health -= 10;
            if (player.health <= 0) gameOver = true;
        }
    });
}
// DRAW VISUAL HOOKS
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Chronos dimension blue grid shade tint
        if (player.timeSlowActive > 0) {
            ctx.fillStyle = "rgba(0, 191, 255, 0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw Player (Cyan Block)
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // NEW: Draw Green Passive Shield Bubble around player if active
        if (player.hasShield) {
            ctx.strokeStyle = "#32cd32";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Draw Boss
        ctx.fillStyle = phaseColors[boss.phase];
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

        // Draw Lasers
        ctx.fillStyle = "#00ffaa";
        playerBullets.forEach(b => ctx.fillRect(b.x, b.y - 3, 16, 6));

        // Draw Boss Projectiles
        bossBullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
        });

        // HUD STYLING
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px monospace";
        ctx.fillText(`HUNTER HP: ${Math.max(0, player.health)}%`, 30, 40);
        ctx.fillText(`SHIELD DEFENSE: ${player.hasShield ? "ONLINE" : "RECHARGING"}`, 30, 65);
        ctx.fillText(`CHRONOS MOD  [SHIFT]: ${player.timeSlowCooldown === 0 ? "READY" : "CHARGING"}`, 30, 90);
        ctx.fillText(`WIPE STRIKE   [ENTER]: ${player.overchargeCooldown === 0 ? "READY" : "CHARGING"}`, 30, 115);
        ctx.fillText(`METRICS SCORE: ${score}`, 30, 140);

        // Boss Info Bar
        let currentHex = phaseColors[boss.phase];
        ctx.fillStyle = "#221111"; ctx.fillRect(600, 25, 370, 20);
        ctx.fillStyle = currentHex; ctx.fillRect(600, 25, Math.max(0, 370 * (boss.health / boss.maxHealth)), 20);
        ctx.fillStyle = "#fff"; ctx.fillText(`AI CORE HP: ${boss.health}`, 600, 65);
        ctx.fillStyle = currentHex; ctx.fillText(`[PHASE ${boss.phase}/5: ${phaseNames[boss.phase]}]`, 600, 85);

    } else {
        ctx.textAlign = "center";
        if (gameOver) {
            ctx.fillStyle = "#ff0055"; ctx.font = "bold 40px monospace"; ctx.fillText("CRITICAL FAILURE: VANGUARD DESTROYED", canvas.width/2, canvas.height/2);
        } else if (victory) {
            ctx.fillStyle = "#00ffaa"; ctx.font = "bold 40px monospace"; ctx.fillText("AI PURGED: TOTAL VICTORY SECURED", canvas.width/2, canvas.height/2);
        }
    }
}

// PRIMARY TICK ENGINE CLOCK
function runLoop() {
    update();
    draw();
    requestAnimationFrame(runLoop);
}

runLoop();
</script>
</body>
</html>
