<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coding Power: Epic Boss Fight</title>
    <style>
        body { margin: 0; background: #14141e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
        canvas { border: 4px solid #fff; background: #14141e; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATES
let gameOver = false;
let victory = false;

// 1. PLAYER OBJECT
const player = {
    x: 100, y: 350, w: 40, h: 40,
    speed: 6, health: 100, maxHealth: 100
};

// 2. BOSS OBJECT
const boss = {
    x: 850, y: 290, w: 100, h: 120,
    health: 500, maxHealth: 500,
    phase: 1, dir: 1, shootCooldown: 0
};

let playerBullets = [];
let bossBullets = [];
const keys = {};

// Keyboard Listeners
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " " && !gameOver && !victory) {
        playerBullets.push({ x: player.x + player.w, y: player.y + player.h/2, dx: 12, dy: 0, r: 6, color: "#00bfff" });
    }
});
window.addEventListener("keyup", e => keys[e.key] = false);

// 3. GAME UPDATE LOOP
function update() {
    if (gameOver || victory) return;

    // Player Movement
    if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

    // Clamp Player to screen
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

    // Boss Brain (AI)
    if (boss.phase === 1) {
        boss.y += boss.dir * 3;
        if (boss.y <= 50 || boss.y >= canvas.height - boss.h - 50) boss.dir *= -1;
        if (boss.health <= boss.maxHealth / 2) boss.phase = 2;
    } else {
        // Phase 2: Track player aggressively
        let targetY = player.y + player.h/2 - boss.h/2;
        if (boss.y < targetY) boss.y += 5;
        if (boss.y > targetY) boss.y -= 5;
    }

    // Boss Shooting Logic
    boss.shootCooldown++;
    let cooldownTarget = boss.phase === 1 ? 25 : 12;
    if (boss.shootCooldown >= cooldownTarget) {
        boss.shootCooldown = 0;
        if (boss.phase === 1) {
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: -8, dy: 0, r: 6, color: "#ff3232" });
        } else {
            // Target tracking shots
            let angle = Math.atan2((player.y + player.h/2) - (boss.y + boss.h/2), (player.x + player.w/2) - boss.x);
            bossBullets.push({ x: boss.x, y: boss.y + boss.h/2, dx: Math.cos(angle) * 9, dy: Math.sin(angle) * 9, r: 6, color: "#9370db" });
        }
    }

    // Update Player Bullets
    playerBullets.forEach((b, index) => {
        b.x += b.dx;
        if (b.x > canvas.width) playerBullets.splice(index, 1);
        
        // Collision with Boss
        if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.health -= 10;
            playerBullets.splice(index, 1);
            if (boss.health <= 0) victory = true;
        }
    });

    // Update Boss Bullets
    bossBullets.forEach((b, index) => {
        b.x += b.dx;
        b.y += b.dy;
        if (b.x < 0 || b.y < 0 || b.y > canvas.height) bossBullets.splice(index, 1);

        // Collision with Player
        if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            player.health -= 15;
            bossBullets.splice(index, 1);
            if (player.health <= 0) gameOver = true;
        }
    });
}

// 4. RENDERING GAME VISUALS
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver && !victory) {
        // Draw Player
        ctx.fillStyle = "#00bfff";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Draw Boss
        ctx.fillStyle = boss.phase === 1 ? "#ff3232" : "#9370db";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

        // Draw Bullets
        playerBullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
        bossBullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });

        // HUD: Player Health Bar
        ctx.fillStyle = "#ff3232"; ctx.fillRect(20, 20, 200, 20);
        ctx.fillStyle = "#32cd32"; ctx.fillRect(20, 20, Math.max(0, 200 * (player.health / player.maxHealth)), 20);
        ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.fillText(`PLAYER: ${Math.max(0, player.health)}%`, 20, 65);

        // HUD: Boss Health Bar
        let bossColor = boss.phase === 1 ? "#ff3232" : "#9370db";
        ctx.fillStyle = "#fff"; ctx.fillRect(580, 20, 400, 25);
        ctx.fillStyle = bossColor; ctx.fillRect(580, 20, Math.max(0, 400 * (boss.health / boss.maxHealth)), 25);
        ctx.fillStyle = "#fff"; ctx.fillText(`BOSS PHASE ${boss.phase}`, 580, 70);
    } else if (gameOver) {
        ctx.fillStyle = "#ff3232"; ctx.font = "bold 60px Arial"; ctx.fillText("GAME OVER", 330, 350);
    } else if (victory) {
        ctx.fillStyle = "#ffd700"; ctx.font = "bold 60px Arial"; ctx.fillText("BOSS DESTROYED!", 240, 350);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
