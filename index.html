<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Only Synthesizer</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .synth-box {
            background: #1e1e24;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #111;
            padding: 15px;
            border-radius: 6px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            width: 45%;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #aaa;
        }

        select, input[type="range"] {
            padding: 8px;
            background: #2a2a32;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .keyboard {
            display: flex;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            height: 150px;
        }

        .key {
            flex: 1;
            background: #fff;
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
        }

        .key:active {
            background: #00ff88;
        }
    </style>
</head>
<body>

    <div class="synth-box">
        <h2 style="margin-top: 0; font-weight: 300; letter-spacing: 1px;">Audio Engine Output</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>Waveform Type</label>
                <select id="wave-type">
                    <option value="sine">Sine (Soft Pure Tone)</option>
                    <option value="triangle" selected>Triangle (Clear Flute)</option>
                    <option value="sawtooth">Sawtooth (Buzzing Brass)</option>
                    <option value="square">Square (Retro Arcade)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Volume Level</label>
                <input type="range" id="volume-level" min="0" max="0.5" step="0.05" value="0.25">
            </div>
        </div>

        <div class="keyboard">
            <!-- Tones configured from Middle C (C4) upwards -->
            <div class="key" data-frequency="261.63" title="C4"></div>
            <div class="key" data-frequency="293.66" title="D4"></div>
            <div class="key" data-frequency="329.63" title="E4"></div>
            <div class="key" data-frequency="349.23" title="F4"></div>
            <div class="key" data-frequency="392.00" title="G4"></div>
            <div class="key" data-frequency="440.00" title="A4"></div>
            <div class="key" data-frequency="493.88" title="B4"></div>
            <div class="key" data-frequency="523.25" title="C5"></div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        const activeVoices = new Map();

        function startAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(frequency) {
            // Force hardware initiation on every key touch event
            startAudioEngine();

            // Clear duplicate note if already triggered
            if (activeVoices.has(frequency)) {
                stopSound(frequency);
            }

            const waveForm = document.getElementById('wave-type').value;
            const volumeSetting = parseFloat(document.getElementById('volume-level').value);

            // Create generator and gain envelope nodes
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = waveForm;
            oscillator.frequency.value = frequency;
            
            // Fixed instant attack parameter to avoid scheduling delay dropouts
            gainNode.gain.setValueAtTime(volumeSetting, audioCtx.currentTime);

            // Connect Generator -> Volume Controller -> Device Speakers
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();

            // Keep pointers in memory array map
            activeVoices.set(frequency, { osc: oscillator, gain: gainNode });
        }

        function stopSound(frequency) {
            if (!activeVoices.has(frequency)) return;

            const voice = activeVoices.get(frequency);
            
            // Hard stop sound cleanly to eliminate hanging feedback loops
            try {
                voice.osc.stop();
                voice.osc.disconnect();
                voice.gain.disconnect();
            } catch(e) {
                // Catch hardware block states gracefully
            }

            activeVoices.delete(frequency);
        }

        // Bind raw interaction events down to UI keyboard nodes
        document.querySelectorAll('.key').forEach(key => {
            const freq = parseFloat(key.getAttribute('data-frequency'));

            // Click Handlers
            key.addEventListener('mousedown', () => playSound(freq));
            key.addEventListener('mouseup', () => stopSound(freq));
            key.addEventListener('mouseleave', () => stopSound(freq));

            // Mobile Device Touch Handlers
            key.addEventListener('touchstart', (e) => {
                e.preventDefault();
                playSound(freq);
            });
            key.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopSound(freq);
            });
        });
    </script>
</body>
</html>
