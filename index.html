<style>
    :root {
        --bg-color: #0b0f19;
        --text-color: #ffffff;
        --accent-glow: #38bdf8;
    }
    
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: var(--text-color);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    #ui-layer {
        position: relative;
        z-index: 2;
        text-align: center;
        width: 90%;
        max-width: 800px;
        pointer-events: none;
    }

    #start-screen {
        pointer-events: auto;
        cursor: pointer;
        background: rgba(15, 23, 42, 0.6);
        padding: 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #start-screen:hover {
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        letter-spacing: 2px;
        background: linear-gradient(45deg, #38bdf8, #818cf8, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        color: #94a3b8;
        font-size: 1.1rem;
        margin-bottom: 30px;
    }

    .play-btn {
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        transition: transform 0.2s;
    }

    .play-btn:active {
        transform: scale(0.95);
    }

    #lyric-display {
        display: none;
        font-size: 3.5rem;
        font-weight: 800;
        line-height: 1.3;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .word {
        display: inline-block;
        margin: 0 8px;
        opacity: 0;
        transform: translateY(20px) scale(0.9);
        animation: popIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    #controls {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: none;
        gap: 15px;
        pointer-events: auto;
    }

    .nav-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        backdrop-filter: blur(5px);
        font-weight: 600;
    }

    .nav-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }
</style>

    let currentLine = 0;
    let isAuto = true;
    let autoTimeout;
    let audioCtx;
    
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSoundEffect(theme) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        
        switch(theme) {
            case 'bouncy':
                playTone(440, 'triangle', 0.1, now);
                playTone(880, 'triangle', 0.05, now + 0.08);
                break;
            case 'star':
                playTone(1200, 'sine', 0.3, now, 0.01);
                playTone(1500, 'sine', 0.2, now + 0.05, 0.01);
                break;
            case 'chill':
                playTone(220, 'sine', 0.4, now, 0.1);
                playTone(330, 'sine', 0.4, now, 0.1);
                break;
            case 'morning':
            case 'nature':
                playSweep(300, 600, 0.3, 'sine');
                break;
            case 'grace':
                playTone(440, 'sine', 0.6, now, 0.2);
                playTone(554.37, 'sine', 0.4, now + 0.05, 0.2);
                playTone(659.25, 'sine', 0.4, now + 0.1, 0.2);
                break;
            case 'frenetic':
            case 'tech':
                playTone(150, 'square', 0.1, now);
                playTone(180, 'square', 0.1, now + 0.05);
                break;
            case 'music':
                playSweep(150, 40, 0.2, 'triangle');
                break;
            case 'stage':
                playSweep(100, 300, 0.5, 'sawtooth', 0.1);
                break;
            case 'silence':
                playSweep(80, 20, 0.6, 'sine');
                break;
            default:
                playTone(300, 'sine', 0.2, now);
        }
    }

    function playTone(freq, type, duration, time, attack = 0.02) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gainNode.gain.setValueAtTime(0, time);
        gainNode.gain.linearRampToValueAtTime(0.3, time + attack);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + duration);
    }

    function playSweep(startFreq, endFreq, duration, type, volume = 0.2) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);
        gainNode.gain.setValueAtTime(volume, now);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() { this.reset(true); }
        reset(init = false) {
            this.x = Math.random() * canvas.width;
            this.y = init ? Math.random() * canvas.height : canvas.height + 20;
            this.size = Math.random() * 4 + 1;
            this.speedX = (Math.random() - 0.5) * 1;
            this.speedY = -(Math.random() * 2 + 0.5);
            this.color = 'rgba(255, 255, 255, 0.5)';
            this.hue = 200;
        }
        update(theme) {
            switch(theme) {
                case 'bouncy':
                    this.speedY += (Math.random() - 0.5) * 0.5;
                    this.y += this.speedY;
                    if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                    this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                    break;
                case 'star':
                case 'night':
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.speedY = -(Math.random() * 0.2);
                    this.size = Math.random() * 3 + 1;
                    this.color = `rgba(255, 255, 255, ${Math.random()})`;
                    break;
                case 'rain':
                    this.speedY = Math.random() * 8 + 6;
