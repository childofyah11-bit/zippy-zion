<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-8 AUDIO HARDWARE</title>
    <style>
        /* --- SYSTEM STYLING & CRT THEME --- */
        body {
            background-color: #000;
            color: #00ff66;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            image-rendering: pixelated;
            user-select: none;
        }

        /* --- GATEKEEPER OVERLAY (WEB AUDIO LOCK) --- */
        #gatekeeper-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            border: 14px solid #ff0055;
            box-sizing: border-box;
        }

        .giant-boot-btn {
            background: #000;
            color: #00ff66;
            border: 8px solid #00ff66;
            padding: 30px 60px;
            font-family: inherit;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 12px 12px 0px #ff0055;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .giant-boot-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 6px 6px 0px #ff0055;
        }

        /* --- HARDWARE CHASSIS LAYOUT --- */
        .console-chassis {
            background: #000;
            border: 8px solid #00ff66;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            box-shadow: 16px 16px 0px #220044;
        }

        .panel-stripe {
            background: #00ff66;
            color: #000;
            padding: 5px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .module-block {
            border: 4px solid #ffaa00;
            padding: 10px;
            background: #111;
        }

        .module-tag {
            font-size: 11px;
            background: #ffaa00;
            color: #000;
            padding: 2px 6px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        /* --- INDUSTRIAL FORM CONTROLS --- */
        select, input[type="range"] {
            background: #000;
            color: #ff0055;
            border: 4px solid #ff0055;
            font-family: inherit;
            font-weight: 900;
            padding: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100px;
            -webkit-appearance: none;
            height: 14px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 20px;
            background: #00ff66;
            border: 2px solid #fff;
            cursor: pointer;
        }

        /* --- PIANO ROLL CHUNK KEYBOARD --- */
        .block-keyboard {
            display: flex;
            background: #000;
            border: 6px solid #00ff66;
            padding: 6px;
            gap: 6px;
        }

        .chunk-key {
            flex: 1;
            background: #fff;
            height: 80px;
            border: 6px solid #000;
            box-shadow: 0px 10px 0px #333;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s, background-color 0.05s;
        }

        .chunk-key:active, .chunk-key.active {
            background: #ff0055;
            box-shadow: 0px 2px 0px #990022;
            transform: translateY(8px);
        }
    </style>
</head>
<body>

    <!-- INTERLOCK SCREEN MECHANISM -->
    <div id="gatekeeper-screen">
        <h1 style="font-size: 32px; margin-bottom: 30px; color: #ffaa00;">SYSTEM LOCKOUT</h1>
        <button class="giant-boot-btn" id="ignition-btn">[ BOOT MACHINE ]</button>
        <p style="margin-top: 25px; font-size: 12px; color: #ff0055;">WARNING: AUDIO FREQUENCIES WILL PLAY IMMEDIATELY</p>
    </div>

    <!-- SOUND INJECT ENGINE PANEL -->
    <div class="console-chassis">
        <div class="panel-stripe">=== CONTROLLER MATRIX OVERRIDE V2 ===</div>
        
        <div class="hardware-grid">
            <!-- 01: Waveform Configuration -->
            <div class="module-block">
                <div class="module-tag">01// CORE WAVEFORM</div>
                <div class="input-row">
                    <label for="osc-wave-1">SHAPE 1</label>
                    <select id="osc-wave-1">
                        <option value="square" selected>SQUARE</option>
                        <option value="sawtooth">SAW</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="osc-wave-2">SHAPE 2</label>
                    <select id="osc-wave-2">
                        <option value="sawtooth" selected>SAW</option>
                        <option value="square">SQUARE</option>
                        <option value="triangle">TRI</option>
                        <option value="sine">SINE</option>
                    </select>
                </div>
            </div>

            <!-- 02: Arpeggiator Chip Controls -->
            <div class="module-block">
                <div class="module-tag">02// CHIP MODULATORS</div>
                <div class="input-row">
                    <label for="arp-rate">ARP SPEED</label>
                    <input type="range" id="arp-rate" min="0" max="15" step="1" value="0">
                </div>
                <div class="input-row">
                    <label for="arp-interval">ARP INTERVAL</label>
                    <input type="range" id="arp-interval" min="3" max="12" step="1" value="4">
                </div>
            </div>

            <!-- 03: Voltage Pitch Sweeper -->
            <div class="module-block">
                <div class="module-tag">03// VOLTAGE SWEEP</div>
                <div class="input-row">
                    <label for="sweep-dir">SWEEP DIR</label>
                    <select id="sweep-dir">
                        <option value="none">NONE</option>
                        <option value="down">DOWNPITCH</option>
                        <option value="up">UPPITCH</option>
                    </select>
                </div>
                <div class="input-row">
                    <label for="sweep-speed">SWEEP RATE</label>
                    <input type="range" id="sweep-speed" min="0.05" max="0.8" step="0.05" value="0.2">
                </div>
            </div>

            <!-- 04: Gain Dynamics Envelope -->
            <div class="module-block">
                <div class="module-tag">04// AMP DECAY ENVELOPE</div>
                <div class="input-row">
                    <label for="decay-time">DECAY FADE</label>
                    <input type="range" id="decay-time" min="0.05" max="1.5" step="0.05" value="0.4">
                </div>
                <div class="input-row">
                    <label for="gain-level">MASTER LEVEL</label>
                    <input type="range" id="gain-level" min="0" max="0.4" step="0.05" value="0.2">
                </div>
            </div>
        </div>

        <!-- 8 Heavy Hardware Chunk Keys -->
        <div class="block-keyboard">
            <div class="chunk-key" data-pitch="110.00" title="A2"></div>
            <div class="chunk-key" data-pitch="130.81" title="C3"></div>
            <div class="chunk-key" data-pitch="146.83" title="D3"></div>
            <div class="chunk-key" data-pitch="164.81" title="E3"></div>
            <div class="chunk-key" data-pitch="196.00" title="G3"></div>
            <div class="chunk-key" data-pitch="220.00" title="A3"></div>
            <div class="chunk-key" data-pitch="261.63" title="C4"></div>
            <div class="chunk-key" data-pitch="293.66" title="D4"></div>
        </div>
    </div>

    <!-- --- DIGITAL AUDIO SYNTHESIS ENGINE --- -->
    <script>
        let rawAudioContext = null;
        const liveVoiceStack = new Map();

        // Boot-up Sequence and API Unlock Handler
        document.getElementById('ignition-btn').addEventListener('click', () => {
            rawAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (rawAudioContext.state === 'suspended') {
                rawAudioContext.resume();
            }
            document.getElementById('gatekeeper-screen').style.display = 'none';
        });

        // Main Signal Voice Synthesizer Execution Loop
        function initiateAudioOutput(baseFrequency) {
            if (!rawAudioContext) return;
            if (rawAudioContext.state === 'suspended') rawAudioContext.resume();

            // Intercept overlapping frequencies instantly
            if (liveVoiceStack.has(baseFrequency)) {
                terminateAudioOutput(baseFrequency);
            }

            // Pull Realtime System UI Control Settings
            const masterOutputLevel = parseFloat(document.getElementById('gain-level').value);
