<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goofball Soundtrack: Single File Edition</title>
    <style>
        /* ALL YOUR STYLES PACKED HERE - NO CSS FILE NEEDED */
        body {
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255,0,127,0.5);
            font-size: 1.8rem;
            margin: 0 0 5px 0;
        }
        p {
            color: #7a7a9a;
            margin: 0 0 15px 0;
            font-size: 0.8rem;
        }
        .controls {
            margin-bottom: 15px;
        }
        button {
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255,0,127,0.3);
            transition: 0.2s;
        }
        button:hover {
            background: #ff3399;
        }
        .sequencer-container {
            max-width: 95vw;
            overflow-x: auto;
            padding: 12px;
            background: #10101b;
            border-radius: 12px;
            border: 2px solid #232336;
            box-shadow: 0 0 35px rgba(0,0,0,0.8);
        }
        .sequencer {
            display: grid;
            grid-template-columns: 80px repeat(64, 22px);
            gap: 3px;
            width: fit-content;
        }
        .row-label {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.7rem;
            color: #00ffcc;
        }
        .pad {
            width: 22px;
            height: 26px;
            background: #202032;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #30304a;
            transition: 0.05s;
        }
        .pad.active {
            background: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
            border-color: #fff;
        }
        /* Your original visual colors for different instrument notes */
        div[data-note^="G5"].pad.active, div[data-note^="F5"].pad.active, div[data-note^="Eb5"].pad.active { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
        div[data-note^="D5"].pad.active, div[data-note^="C5"].pad.active, div[data-note^="B4"].pad.active { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
        div[data-note^="Ab4"].pad.active, div[data-note^="G4"].pad.active, div[data-note^="F4"].pad.active { background: #b600ff; box-shadow: 0 0 8px #b600ff; }
        div[data-note^="Eb4"].pad.active, div[data-note^="D4"].pad.active, div[data-note^="C4"].pad.active { background: #00eaff; box-shadow: 0 0 8px #00eaff; }
        
        .pad.current {
            border: 1px solid #fff;
            background-image: linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15));
        }
        .lyrics-display {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #00ffcc;
            min-height: 1.5em;
            text-shadow: 0 0 8px rgba(0,255,204,0.4);
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: GOOFBALL TRACK</h1>
    <p>Scroll horizontally to view your custom song layout across the 64-step grid.</p>
    
    <div class="controls">
        <button id="playBtn">EXECUTE ARCHITECTURE</button>
    </div>

    <div class="sequencer-container">
        <div class="sequencer" id="grid"></div>
    </div>

    <div class="lyrics-display" id="lyrics">"God made me perfectly okay 😁"</div>

    <script>
        /* ALL YOUR AUDIO LOGIC PACKED HERE - NO SCRIPT FILE NEEDED */
        let audioCtx = null;
        
        const instruments = ['G5', 'F5', 'Eb5', 'D5', 'C5', 'B4', 'Ab4', 'G4', 'F4', 'Eb4', 'D4', 'C4'];
        const steps = 64;
        let currentStep = 0;
        let isPlaying = false;
        let intervalId = null;

        const frequencies = {
            'G5': 783.99, 'F5': 698.46, 'Eb5': 622.25, 'D5': 587.33, 'C5': 523.25, 
            'B4': 493.88, 'Ab4': 415.30, 'G4': 392.00, 'F4': 349.23, 'Eb4': 311.13, 
            'D4': 293.66, 'C4': 261.63
        };

        // Custom timeline sheet using your lyrics text
        const lyricTimeline = new Array(steps).fill("");
        lyricTimeline[0]  = "🤪 I'm a goofball bouncing-off-the-wall-ball";
        lyricTimeline[6]  = "👋 Everybody knows my name";
        lyricTimeline[12] = "🏎️ Staying in my own lane";
        lyricTimeline[16] = "☀️ Woke up, Clean slate, Sun's up, Don't wait";
        lyricTimeline[24] = "🌳 Step out, Big yard, Life's good, Not hard";
        lyricTimeline[32] = "📝 Homework Done fast, A-plus First class";
        lyricTimeline[40] = "🎧 Next tab Beats play, Soundtrack for the day";
        lyricTimeline[48] = "🤫 Music stops... Heavy silence...";
        lyricTimeline[54] = "✨ Lights fade Stage set, Moment they won't forget";
        lyricTimeline[60] = "😁 God made me perfectly okay after all";

        const tracks = {};
        instruments.forEach(inst => {
            tracks[inst] = new Array(steps).fill(false);
        });

        // The musical instrument roadmap custom built for your song sections
        const songPreset = [
            ['C4', 0], ['Eb4', 1], ['G4', 2], ['C5', 3],
            ['Eb5', 4], ['G5', 5],
            ['F5', 6], ['D5', 8], ['B4', 10],
            ['C4', 12], ['G4', 13], ['C5', 14],
            ['Eb4', 16], ['Eb4', 17], ['G4', 18], ['G4', 19], ['C5', 20], ['C5', 21], ['Eb5', 22],
            ['D5', 24], ['D5', 25], ['B4', 26], ['B4', 27], ['G4', 28], ['G4', 29], ['D4', 30],
            ['C4', 32], ['D4', 34], ['Eb4', 36], ['F4', 38],
            ['G4', 40], ['Ab4', 42], ['C5', 44], ['Eb5', 46],
            ['F4', 48], ['F4', 49], ['F4', 50],
            ['Ab4', 54], ['C5', 56], ['F5', 58],
            ['G5', 60], ['G5', 61], ['G5', 62], ['G5', 63]
        ];

        songPreset.forEach(([note, step]) => {
            if (tracks[note]) { tracks[note][step] = true; }
        });

        const grid = document.getElementById('grid');
        instruments.forEach(inst => {
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = inst;
            grid.appendChild(label);

            for (let i = 0; i < steps; i++) {
                const pad = document.createElement('div');
                pad.className = `pad ${tracks[inst][i] ? 'active' : ''}`;
                pad.dataset.note = inst;
                pad.dataset.step = i;
                pad.onclick = () => {
                    tracks[inst][i] = !tracks[inst][i];
                    pad.classList.toggle('active');
                };
                grid.appendChild(pad);
            }
        });

        // Original Epic Cyber Orchestra Heavy Dual-Sawtooth Synthesizer Engine
        function playSymphonicStrings(frequency, isLong) {
            const now = audioCtx.currentTime;
            const duration = isLong ? 0.65 : 0.18;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            
            osc1.type = 'sawtooth';
            osc2.type = 'sawtooth';
            osc1.frequency.setValueAtTime(frequency, now);
            osc2.frequency.setValueAtTime(frequency, now);
            
            // Detune adjustments to create a huge, cinematic room scale profile
            osc1.detune.setValueAtTime(9, now);
            osc2.detune.setValueAtTime(-9, now);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1250, now);
            filter.frequency.exponentialRampToValueAtTime(600, now + duration);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + duration);
            osc2.stop(now + duration);
        }

        function playStep() {
            document.querySelectorAll('.pad').forEach(p => p.classList.remove('current'));
            document.querySelectorAll(`[data-step="${currentStep}"]`).forEach(p => p.classList.add('current'));
            
            if(lyricTimeline[currentStep] !== "") {
                document.getElementById('lyrics').innerText = lyricTimeline[currentStep];
            }

            instruments.forEach(inst => {
                if (tracks[inst][currentStep]) {
                    const isLong = (currentStep >= 12 && currentStep <= 14) || 
                                   (currentStep >= 48 && currentStep <= 50) || 
                                   (currentStep >= 60);
                    playSymphonicStrings(frequencies[inst], isLong);
                }
            });
            currentStep = (currentStep + 1) % steps;
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            // Direct interactive activation loop to break browser sandboxing blockades
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    startPlayback();
                });
            } else {
                startPlayback();
            }
        });

        function startPlayback() {
            if (isPlaying) {
                // Stop playback
                clearInterval(intervalId);
                isPlaying = false;
                document.getElementById('playBtn').innerText = 'EXECUTE ARCHITECTURE';
                currentStep = 0;
                document.querySelectorAll('.pad').forEach(p => p.classList.remove('current'));
            } else {
                // Start playback
                isPlaying = true;
                document.getElementById('playBtn').innerText = 'STOP PLAYBACK';
                currentStep = 0;
                playStep();
                intervalId = setInterval(playStep, 150);
            }
        }
    </script>
</body>
</html>
