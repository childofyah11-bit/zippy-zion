<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Polyphonic Synthesizer</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #161f30;
            --accent-neon: #00ffcc;
            --accent-blue: #0077ff;
            --text-color: #e2e8f0;
            --slider-thumb: #ff007f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 20px 0;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-neon);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .synth-container {
            background: var(--panel-color);
            border: 2px solid #233554;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Visualization Screen */
        .visualizer-panel {
            background: #050811;
            border: 1px solid #1e2d4a;
            border-radius: 8px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            height: 150px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Control Dashboard Layout */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
        }

        .control-group h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* Custom Inputs */
        .control-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-row label {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #8892b0;
            display: flex;
            justify-content: space-between;
        }

        .control-row label span {
            color: var(--accent-neon);
        }

        select, input[type="range"] {
            background: #0d1527;
            color: var(--text-color);
            border: 1px solid #233554;
            padding: 6px;
            border-radius: 4px;
            outline: none;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #0d1527;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--slider-thumb);
            cursor: pointer;
            box-shadow: 0 0 8px var(--slider-thumb);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Musical Keyboard */
        .keyboard {
            display: flex;
            background: #050811;
            padding: 10px;
            border-radius: 8px;
            position: relative;
            height: 160px;
            user-select: none;
        }

        .key {
            flex: 1;
            height: 100%;
            background: #f3f3f3;
            border: 1px solid #111;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: background 0.1s;
        }

        .key:active, .key.active {
            background: var(--accent-neon);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .key.black {
            background: #111;
            height: 60%;
            width: 6%;
            margin-left: -3%;
            margin-right: -3%;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        .key.black:active, .key.black.active {
            background: var(--slider-thumb);
        }
    </style>
</head>
<body>

    <h1>Aether Synth</h1>

    <div class="synth-container">
        <!-- Waveform Visualizer -->
        <div class="visualizer-panel">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- Synth Settings Panel -->
        <div class="control-grid">
            <!-- Oscillator 1 Configuration -->
            <div class="control-group">
                <h3>Oscillator 1</h3>
                <div class="control-row">
                    <label>Waveform</label>
                    <select id="osc1-type">
                        <option value="sine">Sine</option>
                        <option value="square" selected>Square</option>
                        <option value="sawtooth">Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </div>
                <div class="control-row">
                    <label>Detune <span id="v-osc1-detune">0 c</span></label>
                    <input type="range" id="osc1-detune" min="-50" max="50" value="0">
                </div>
            </div>

            <!-- Oscillator 2 Configuration -->
            <div class="control-group">
                <h3>Oscillator 2</h3>
                <div class="control-row">
                    <label>Waveform</label>
                    <select id="osc2-type">
                        <option value="sine">Sine</option>
                        <option value="square">Square</option>
                        <option value="sawtooth" selected>Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </div>
                <div class="control-row">
                    <label>Detune <span id="v-osc2-detune">12 c</span></label>
                    <input type="range" id="osc2-detune" min="-50" max="50" value="12">
                </div>
            </div>

            <!-- Filter (VCF) -->
            <div class="control-group">
                <h3>Filter</h3>
                <div class="control-row">
                    <label>Cutoff <span id="v-filter-freq">2000 Hz</span></label>
                    <input type="range" id="filter-freq" min="40" max="10000" value="2000" step="1">
                </div>
                <div class="control-row">
                    <label>Resonance (Q) <span id="v-filter-q">1</span></label>
                    <input type="range" id="filter-q" min="1" max="20" value="1" step="0.5">
                </div>
            </div>

            <!-- Envelope (ADSR) -->
            <div class="control-group">
                <h3>Envelope (ADSR)</h3>
                <div class="control-row">
                    <label>Attack <span id="v-env-a">0.1s</span></label>
                    <input type="range" id="env-a" min="0.01" max="2" value="0.1" step="0.01">
                </div>
                <div class="control-row">
                    <label>Release <span id="v-env-r">0.4s</span></label>
                    <input type="range" id="env-r" min="0.01" max="3" value="0.4" step="0.01">
                </div>
            </div>
        </div>

        <!-- Interactive Music Keyboard Grid -->
        <div class="keyboard" id="keyboard">
            <div class="key" data-note="261.63"></div> <!-- C4 -->
            <div class="key black" data-note="277.18"></div> <!-- C#4 -->
            <div class="key" data-note="293.66"></div> <!-- D4 -->
            <div class="key black" data-note="311.13"></div> <!-- D#4 -->
            <div class="key" data-note="329.63"></div> <!-- E4 -->
            <div class="key" data-note="349.23"></div> <!-- F4 -->
            <div class="key black" data-note="369.99"></div> <!-- F#4 -->
            <div class="key" data-note="392.00"></div> <!-- G4 -->
            <div class="key black" data-note="415.30"></div> <!-- G#4 -->
            <div class="key" data-note="440.00"></div> <!-- A4 -->
            <div class="key black" data-note="466.16"></div> <!-- A#4 -->
            <div class="key" data-note="493.88"></div> <!-- B4 -->
            <div class="key" data-note="523.25"></div> <!-- C5 -->
        </div>
    </div>

    <script>
        // Initialize Core Audio Context
        let audioCtx = null;
        let masterGain = null;
        let filterNode = null;
        let analyserNode = null;
        
        // Track actively playing sound instances (Polyphony tracking)
        const activeNotes = new Map();

        // Canvas Setup for Wavelength Animations
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
