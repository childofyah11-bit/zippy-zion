<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSynth API v2.0</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-pink: #ff0055;
            --bg-dark: #0a0a14;
            --panel-dark: #121225;
            --component-dark: #1a1a3a;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Consolas', 'Segoe UI', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 1.8rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90vw;
            max-width: 850px;
        }

        #viz {
            width: 100%;
            height: 180px;
            background: var(--panel-dark);
            border: 2px solid var(--neon-cyan);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
            display: block;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            background: var(--panel-dark);
            padding: 25px;
            border-radius: 0 0 8px 8px;
            border: 2px solid var(--neon-cyan);
            border-top: none;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.05);
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            background: var(--component-dark);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333366;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8899a6;
            letter-spacing: 1px;
        }

        .val-display {
            font-size: 0.75rem;
            color: var(--neon-pink);
            font-weight: bold;
        }

        select, input {
            width: 100%;
            background: var(--bg-dark);
            color: #fff;
            border: 1px solid var(--neon-cyan);
            padding: 6px;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="range"] {
            appearance: none;
            height: 6px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink);
            border-radius: 50%;
        }

        .keyboard-wrapper {
            position: relative;
            width: 100%;
            background: var(--panel-dark);
            border: 2px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
        }

        .keyboard {
            display: flex;
            width: 100%;
            height: 140px;
            position: relative;
        }

        .key {
            flex: 1;
            background: #e0e0e0;
            border: 1px solid #111;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            box-shadow: inset 0 -5px 0 #bbb;
            transition: background 0.05s, transform 0.05s;
        }

        .key::after {
            content: attr(data-key);
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .key.black {
            background: #151515;
            height: 62%;
            margin-left: -3.2%;
            margin-right: -3.2%;
            z-index: 2;
            box-shadow: inset 0 -4px 0 #000;
        }

        .key.black::after {
            color: #aaa;
            bottom: 6px;
        }

        .key:hover { background: #f0f0f0; }
        .key.black:hover { background: #252525; }

        .key.active, .key:active {
            background: var(--neon-cyan) !important;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 10px var(--neon-cyan);
            transform: translateY(2px);
        }

        .key.black.active, .key.black:active {
            background: var(--neon-pink) !important;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 10px var(--neon-pink);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CyberSynth API v2.0</h1>
    
    <canvas id="viz"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <div class="label-row"><label>Waveform</label></div>
            <select id="waveform">
                <option value="sine">Sine (Pure)</option>
                <option value="square" selected>Square (Chiptune)</option>
                <option value="sawtooth">Sawtooth (Aggressive)</option>
                <option value="triangle">Triangle (Soft)</option>
            </select>
        </div>
        
        <div class="control-group">
            <div class="label-row"><label>Detune (Cents)</label><span class="val-display" id="detune-val">0</span></div>
            <input type="range" id="detune" min="-100" max="100" value="0">
        </div>
        
        <div class="control-group">
            <div class="label-row"><label>Filter Cutoff</label><span class="val-display" id="cutoff-val">2000 Hz</span></div>
            <input type="range" id="cutoff" min="60" max="10000" value="2000">
        </div>
        
        <div class="control-group">
            <div class="label-row"><label>FX Distortion</label><span class="val-display" id="distortion-val">0%</span></div>
            <input type="range" id="distortion" min="0" max="100" value="0">
        </div>
    </div>

    <div class="keyboard-wrapper">
        <div class="keyboard" id="keyboard">
            <div class="key" data-note="261.63" data-key="A"></div>
            <div class="key black" data-note="277.18" data-key="W"></div>
            <div class="key" data-note="293.66" data-key="S"></div>
            <div class="key black" data-note="311.13" data-key="E"></div>
            <div class="key" data-note="329.63" data-key="D"></div>
            <div class="key" data-note="349.23" data-key="F"></div>
            <div class="key black" data-note="369.99" data-key="T"></div>
            <div class="key" data-note="392.00" data-key="G"></div>
            <div class="key black" data-note="415.30" data-key="Y"></div>
            <div class="key" data-note="440.00" data-key="H"></div>
            <div class="key black" data-note="466.16" data-key="U"></div>
            <div class="key" data-note="493.88" data-key="J"></div>
            <div class="key" data-note="523.25" data-key="K"></div>
        </div>
    </div>
</div>

<script>
    let audioCtx = null;
    let analyser = null;
    let masterGain = null;
    const activeVoices = {};

    const keyMap = {
        'a': '261.63', 'w': '277.18', 's': '293.66', 'e': '311.13', 
        'd': '329.63', 'f': '349.23', 't': '369.99', 'g': '392.00', 
        'y': '415.30', 'h': '440.00', 'u': '466.16', 'j': '493.88', 'k': '523.25'
    };

    const canvas = document.getElementById('viz');
    const canvasCtx = canvas.getContext('2d');
    const waveformSelect = document.getElementById('waveform');
    const detuneSlider = document.getElementById('detune');
    const cutoffSlider = document.getElementById('cutoff');
    const distortionSlider = document.getElementById('distortion');

    function resizeCanvas() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;

        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.8, audioCtx.currentTime);

        const limiter = audioCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-1, audioCtx.currentTime);
        limiter.knee.setValueAtTime(0, audioCtx.currentTime);
        limiter.ratio.setValueAtTime(20, audioCtx.currentTime);

        analyser.connect(masterGain);
        masterGain.connect(limiter);
        limiter.connect(audioCtx.destination);

        drawVisualizer();
    }

    function makeDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 0;
        if (k === 0) return null;
        let n_samples = 44100, curve = new Float32Array(n_samples);
        for (let i = 0; i < n_samples; ++i) {
            let x = (i * 2) / n_samples - 1;
            curve[i] = ((3 + k) * x * 20 * (Math.PI / 180)) / (Math.PI + k * Math.abs(x));
        }
        return curve;
    }

    function startNote(freq) {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
