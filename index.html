<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Orchestra: Small Town Star</title>
    <style>
        body {
            background: #030305;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        h1 {
            color: #ff9900;
            text-shadow: 0 0 15px rgba(255,153,0,0.4);
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
        }
        p {
            color: #555566;
            margin: 0 0 25px 0;
            font-size: 0.8rem;
        }
        .matrix-deck {
            width: 95vw;
            max-width: 750px;
            background: #0a0a0f;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            border: 1px solid #1a1a26;
            box-sizing: border-box;
        }
        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #12121a;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #222233;
        }
        .status-light {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #888899;
            letter-spacing: 0.5px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3333;
        }
        .status-dot.active {
            background: #ff9900;
            box-shadow: 0 0 12px #ff9900;
        }
        button {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 12px 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ff9900;
            color: #030305;
            box-shadow: 0 4px 15px rgba(255,153,0,0.3);
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #ffaa22;
            transform: translateY(-1px);
        }
        button.active {
            background: #33cc32;
            color: #fff;
            box-shadow: 0 4px 15px rgba(51,204,50,0.3);
        }
        .knobs-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .knob-box {
            background: #12121a;
            border: 1px solid #222233;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        .knob-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffaa22;
            letter-spacing: 0.5px;
        }
        .knob-meta span:last-child {
            color: #888899;
            font-family: monospace;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #ff9900;
            cursor: pointer;
            background: #222233;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        #visualizer {
            width: 100%;
            height: 80px;
            background: #06060a;
            border: 1px solid #1a1a26;
            border-radius: 12px;
            margin-bottom: 30px;
            display: block;
        }
        .poetry-deck {
            background: #12121a;
            border: 1px solid #222233;
            border-radius: 12px;
            height: 160px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .text-stream {
            font-size: 1.15rem;
            font-weight: 500;
            color: #ff9900;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .text-stream.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .sub-stream {
            font-size: 0.95rem;
            color: #666677;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
            text-align: center;
        }
        .sub-stream.visible {
            opacity: 0.7;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>CYBER ORCHESTRA: SMALL TOWN STAR</h1>
    <p>Algorithmic frequency generation architecture.</p>

    <div class="matrix-deck">
        <div class="deck-header">
            <div class="status-light">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusTxt">SYSTEM OFFLINE</span>
            </div>
            <button id="playBtn">LAUNCH STREAM</button>
        </div>

        <div class="knobs-panel">
            <div class="knob-box">
                <div class="knob-meta">
                    <span>MASTER VOL</span>
                    <span id="volVal">100%</span>
                </div>
                <input type="range" id="volumeSlider" min="0" max="2" step="0.05" value="1">
            </div>
            <div class="knob-box">
                <div class="knob-meta">
                    <span>CLOCK CADENCE</span>
                    <span id="tempoValue">125 BPM</span>
                </div>
                <input type="range" id="tempoSlider" min="80" max="180" step="1" value="125">
            </div>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="poetry-deck">
            <div id="text1" class="text-stream visible">Engine Standby</div>
            <div id="text2" class="sub-stream visible">Initialize core launcher routing parameters.</div>
        </div>
    </div>
    <script>
        let audioCtx = null;
        let masterOut = null;
        let delayUnit = null;
        let delayGain = null;
        let analyzerUnit = null;
        
        let activeState = false;
        let engineClock = null;
        let indexMarker = 0;
        const terminalIndex = 512;

        const scales = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
        const triadBanks = [
            [130.81, 164.81, 196.00, 261.63], // C Major
            [146.83, 174.61, 220.00, 293.66], // D Minor
            [164.81, 196.00, 246.94, 329.63], // E Minor
            [196.00, 246.94, 293.66, 392.00]  // G Major
        ];

        const lyricTimeline = [
            { step: 0, l1: "I’m a goofball bouncing-off-the-wall-ball", l2: "Everybody knows my name" },
            { step: 16, l1: "Yeah I’ll be a little goofball", l2: "Staying in my own lane" },
            { step: 32, l1: "I’m a low-key pretty goofy really-got-it-good-breezy standing-pretty-tall-ball", l2: "Dancing in the quiet rain" },
            { step: 52, l1: "Just a low-key goofball", l2: "And God made me perfectly okay" },
            { step: 68, l1: "Woke up / Clean slate / Sun's up / Don't wait", l2: "Step out / Big yard / Life's good / Not hard" },
            { step: 88, l1: "Green trees / Clear breeze / Out here / Do what I please", l2: "Big smile / Spark eye / Watch the clouds roll right on by" },
            { step: 108, l1: "No rush / My pace / Wide open / No race", l2: "Fresh air / Cool shade / Sun shine / High sky" },
            { step: 128, l1: "No stress / Time flies / Quiet space / Ground solid", l2: "Real world / Big knowledge / Just growth / Big views" },
            { step: 148, l1: "No stress / Good news / Out back / Chill state", l2: "Everything is looking great / Birds sing" },
            { step: 168, l1: "Warm air / No worries / No care / Right here", l2: "My spot / Appreciate what I got / His design" },
            { step: 188, l1: "Right place / Full of purpose / Full of grace", l2: "Phone rings / Big crowd / They talk / Real loud" },
            { step: 208, l1: "They know me / I'm known / But right now / My zone", l2: "Feet up / Chill mind / One of a kind" },
            { step: 228, l1: "Good joke / Fun time / That's the end of the line", l2: "They call / I decline / My space / All mine" },
            { step: 248, l1: "Top tier / No fear", l2: "I’m the star around here" },
            { step: 264, l1: "Screen bright / App tapped / Class notes / Book wrapped", l2: "Log in / School grind / Sharp brain / Good mind" },
            { step: 284, l1: "Homework / Done fast / A-plus / First class", l2: "Next tab / Beats play / Soundtrack for the day" },
            { step: 304, l1: "Headphones / No need / Speakers loud / Top speed", l2: "Volume up / Track rolls / Deep rhythm / Takes control" },
            { step: 324, l1: "Popular / Well liked / But the focus is spiked", l2: "Peaceful / Rest easy / Everything is going breezy" },
            { step: 344, l1: "Music stops / Heavy silence / World waits / Big reliance", l2: "They look / I stand / Take control / Command" },
            { step: 368, l1: "Lights fade / Stage set / Moment they won't forget", l2: "No mistakes / No flaws / Woven by His holy laws" },
            { step: 392, l1: "Every detail / Every strand", l2: "Held inside a higher hand" },
            { step: 412, l1: "Take a breath / Hear the call", l2: "God made me perfectly after all" },
            { step: 432, l1: "Sun goes down / Stars appear", l2: "Living life / With no fear" },
            { step: 452, l1: "Grateful heart / Peaceful state", l2: "Everything is looking great" },
            { step: 472, l1: "Walking forward / Staying strong", l2: "This is where I belong" },
            { step: 492, l1: "Deep breath / Clear sky / Watch the days fly right on by", l2: "In His hands / Every day / Everything is turning out okay 😁" }
        ];

        function setupHardware() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterOut = audioCtx.createGain();
            masterOut.gain.value = parseFloat(document.getElementById('volumeSlider').value);
            
            delayUnit = audioCtx.createDelay(1.0);
            delayUnit.delayTime.value = 0.3;
            
            delayGain = audioCtx.createGain();
            delayGain.gain.value = 0.4;
            
            analyzerUnit = audioCtx.createAnalyser();
            analyzerUnit.fftSize = 64;
            
            masterOut.connect(delayUnit);
            delayUnit.connect(delayGain);
            delayGain.connect(delayUnit);
            
            masterOut.connect(analyzerUnit);
            delayUnit.connect(analyzerUnit);
            analyzerUnit.connect(audioCtx.destination);
            
            renderFrame();
        }
        function renderFrame() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const binCount = analyzerUnit.frequencyBinCount;
            const dataArray = new Uint8Array(binCount);

            function loop() {
                requestAnimationFrame(loop);
                if (!activeState) return;
                analyzerUnit.getByteFrequencyData(dataArray);

                ctx.fillStyle = '#06060a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let sliceWidth = canvas.width / binCount;
                let currentX = 0;

                ctx.beginPath();
                ctx.strokeStyle = '#ff9900';
                ctx.lineWidth = 3;

                for (let i = 0; i < binCount; i++) {
                    let val = dataArray[i] / 255;
                    let currentY = canvas.height - (val * canvas.height);
                    
                    if (i === 0) ctx.moveTo(currentX, currentY);
                    else ctx.lineTo(currentX, currentY);
                    
                    currentX += sliceWidth;
                }
                ctx.stroke();
            }
            canvas.width = canvas.offsetWidth;
            loop();
        }

        function playFrequency(freq, waveform, level, delay) {
            if (!audioCtx) return;
            const timestamp = audioCtx.currentTime;
            const generator = audioCtx.createOscillator();
            const envelope = audioCtx.createGain();
            
            generator.type = waveform;
            generator.frequency.setValueAtTime(freq, timestamp);
            
            envelope.gain.setValueAtTime(level, timestamp);
            envelope.gain.exponentialRampToValueAtTime(0.001, timestamp + delay);
            
            generator.connect(envelope);
            envelope.connect(masterOut);
            
            generator.start(timestamp);
            generator.stop(timestamp + delay);
        }

        function runClockTick() {
            const bank = triadBanks[Math.floor(indexMarker / 16) % triadBanks.length];
            
            // Harmonic Engine
            if (indexMarker % 4 === 0) {
                bank.forEach(f => playFrequency(f, 'sine', 0.2, 0.35));
            }
            if (indexMarker % 2 === 0) {
                const stepMelody = bank[Math.floor(Math.random() * bank.length)] * 2;
                playFrequency(stepMelody, 'triangle', 0.08, 0.15);
            }

            // Rhythm Engine
            if (indexMarker % 4 === 0) {
                playFrequency(55, 'sine', 0.8, 0.1); // Kick
            }
            if (indexMarker % 4 === 2) {
                playFrequency(9000, 'triangle', 0.02, 0.03); // Hat
            }
            if (indexMarker % 2 === 1) {
                playFrequency(bank[0] / 2, 'sawtooth', 0.1, 0.12); // Bass
            }

            // Timeline Module
            const match = lyricTimeline.reduce((prev, curr) => (indexMarker >= curr.step) ? curr : prev, lyricTimeline);
            const line1 = document.getElementById('text1');
            const line2 = document.getElementById('text2');
            
            if (line1.innerText !== match.l1) {
                line1.classList.remove('visible');
                line2.classList.remove('visible');
                setTimeout(() => {
                    line1.innerText = match.l1;
                    line2.innerText = match.l2;
                    line1.classList.add('visible');
                    line2.classList.add('visible');
                }, 100);
            }

            indexMarker = (indexMarker + 1) % terminalIndex;
        }

        function calculateTempoTime() {
            const bpm = parseInt(document.getElementById('tempoSlider').value);
            return (60000 / bpm) / 4;
        }

        document.getElementById('playBtn').addEventListener('click', function() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            setupHardware();
            
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusTxt');

            if (activeState) {
                clearInterval(engineClock);
                this.innerText = "LAUNCH STREAM";
                this.classList.remove('active');
                dot.classList.remove('active');
                txt.innerText = "SYSTEM OFFLINE";
                activeState = false;
                indexMarker = 0;
            } else {
                this.innerText = "HALT SIGNAL";
                this.classList.add('active');
                dot.classList.add('active');
                txt.innerText = "STREAM RUNNING";
                activeState = true;
                engineClock = setInterval(runClockTick, calculateTempoTime());
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('volVal').innerText = Math.round(val * 100) + '%';
            if (masterOut) masterOut.gain.value = val;
        });

        document.getElementById('tempoSlider').addEventListener('input', (e) => {
            const bpm = e.target.value;
            document.getElementById('tempoValue').innerText = bpm + " BPM";
            if (activeState) {
                clearInterval(engineClock);
                engineClock = setInterval(runClockTick, calculateTempoTime());
            }
        });
    </script>
</body>
</html>

</html>
